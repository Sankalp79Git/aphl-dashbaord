<style>
:root{--bg:#0a0e1a;--bg-2:#0f1421;--panel:#131829;--panel-2:#1a2034;--line:rgba(255,255,255,0.06);--ink:#e5e9f0;--ink-2:#9ba3b4;--ink-3:#5d6478;--accent:#d4ff3a;--accent-2:#a685ff;--good:#5dd39e;--bad:#ff6b6b;--warn:#ffb83a;--crit:#ff3a5d;--info:#3aafff;--shadow:0 6px 24px rgba(0,0,0,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'SF Mono',Monaco,monospace}
.hidden{display:none !important}
button{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);padding:7px 11px;font-size:11px;border-radius:4px;cursor:pointer;font-family:inherit}
button:hover:not(:disabled){background:var(--panel);border-color:rgba(255,255,255,0.15)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.primary{background:var(--accent);color:var(--bg);border:none;font-weight:600}
button.primary:hover:not(:disabled){background:#c4ef2a}
button.danger{background:var(--bad);color:white;border:none}
input,textarea,select{background:var(--bg-2);color:var(--ink);border:1px solid var(--line);padding:7px 10px;font-size:12px;border-radius:4px;font-family:inherit;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
label{font-size:10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:36px 32px;width:380px;box-shadow:var(--shadow)}
.login-logo{font-size:11px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--ink-2);margin-bottom:24px}
.login-input{margin-bottom:12px;padding:10px 12px;font-size:13px}
.login-btn{width:100%;padding:11px;font-size:13px;font-weight:600;background:var(--accent);color:var(--bg);border:none;border-radius:5px;cursor:pointer;margin-top:8px}
.login-err{color:var(--bad);font-size:11px;margin-top:10px;min-height:14px}
.login-spinner{display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.login-note{font-size:10px;color:var(--ink-3);margin-top:14px;line-height:1.5}
.header{display:flex;align-items:center;padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);gap:16px}
.brand-strip{display:flex;align-items:center;gap:11px}
.brand-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:14px}
.brand-text{line-height:1.2}
.brand-text .name{font-weight:600;font-size:13px}
.brand-text .sub{font-size:10px;color:var(--ink-3);letter-spacing:0.05em;text-transform:uppercase}
.tabs{display:flex;gap:2px;flex:1;margin-left:28px}
.tab{padding:7px 14px;font-size:12px;color:var(--ink-2);cursor:pointer;border-radius:4px}
.tab:hover{color:var(--ink);background:var(--panel-2)}
.tab.active{color:var(--accent);background:var(--panel-2);font-weight:500}
.tab-badge{display:inline-block;margin-left:5px;padding:1px 6px;background:var(--bad);color:white;border-radius:8px;font-size:9px;font-weight:700}
.user-chip{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 6px;background:var(--panel-2);border-radius:18px}
.user-avatar{width:26px;height:26px;background:var(--accent-2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:600;font-size:11px}
.user-info{line-height:1.2}
.user-info .email{font-size:11px}
.user-info .role{font-size:9px;color:var(--accent);letter-spacing:0.06em;text-transform:uppercase}
.logout-btn{padding:5px 10px;font-size:10px;background:transparent;border:1px solid var(--line);border-radius:4px;color:var(--ink-2);cursor:pointer}
.main{padding:22px;max-width:1400px;margin:0 auto}
.page-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title h1{font-size:20px;font-weight:600}
.page-title .sub{font-size:12px;color:var(--ink-2);margin-top:3px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px 16px;border-left:3px solid var(--accent)}
.kpi.warn{border-left-color:var(--warn)}
.kpi.bad{border-left-color:var(--bad)}
.kpi.good{border-left-color:var(--good)}
.kpi.crit{border-left-color:var(--crit)}
.kpi-val{font-size:22px;font-weight:600;line-height:1}
.kpi-label{font-size:9px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px}
.kpi-sub{font-size:10px;color:var(--ink-3);margin-top:4px}
.complaint-list{display:grid;gap:8px}
.complaint-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 14px;cursor:pointer;transition:border-color 0.15s;display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center}
.complaint-card:hover{border-color:var(--accent)}
.complaint-id{font-family:'SF Mono',monospace;font-size:11px;color:var(--accent);font-weight:600}
.complaint-main .top{display:flex;gap:8px;align-items:center;margin-bottom:3px;flex-wrap:wrap}
.complaint-main .sku{font-size:12px;font-weight:500}
.complaint-main .meta{font-size:10px;color:var(--ink-3)}
.severity-pill{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:8px;letter-spacing:0.05em}
.severity-CRITICAL{background:rgba(255,58,93,0.15);color:var(--crit)}
.severity-MAJOR{background:rgba(255,184,58,0.15);color:var(--warn)}
.severity-MINOR{background:rgba(93,211,158,0.12);color:var(--good)}
.status-pill{font-size:9px;font-weight:600;text-transform:uppercase;padding:3px 9px;border-radius:10px;letter-spacing:0.05em}
.status-LOGGED{background:rgba(58,175,255,0.15);color:var(--info)}
.status-ACKNOWLEDGED{background:rgba(166,133,255,0.15);color:var(--accent-2)}
.status-INVESTIGATING{background:rgba(255,184,58,0.15);color:var(--warn)}
.status-RD_CONSULT{background:rgba(212,255,58,0.15);color:var(--accent)}
.status-RESOLUTION_PROPOSED{background:rgba(93,211,158,0.15);color:var(--good)}
.status-RESOLVED{background:rgba(93,211,158,0.18);color:var(--good)}
.status-CLOSED{background:rgba(155,163,180,0.18);color:var(--ink-2)}
.tat-indicator{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.tat-ok{background:rgba(93,211,158,0.12);color:var(--good)}
.tat-warn{background:rgba(255,184,58,0.15);color:var(--warn)}
.tat-breach{background:rgba(255,58,93,0.18);color:var(--crit)}
.detail-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--line)}
.panel-title{font-size:13px;font-weight:600}
.panel-sub{font-size:10px;color:var(--ink-3);margin-top:2px}
.panel-body{padding:14px 16px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.field-val{font-size:12px;margin-top:1px;word-break:break-word}
.activity{max-height:320px;overflow-y:auto}
.activity-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:11px}
.activity-item:last-child{border-bottom:none}
.activity-item .who{color:var(--accent);min-width:90px;font-size:10px}
.activity-item .note{flex:1}
.activity-item .ts{font-size:9px;color:var(--ink-3);white-space:nowrap}
.modal-backdrop{position:fixed;inset:0;background:rgba(5,8,15,0.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:8px;max-width:720px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--panel);z-index:1}
.modal-title{font-size:15px;font-weight:600}
.modal-sub{font-size:11px;color:var(--ink-3);margin-top:2px}
.modal-close{background:transparent;padding:4px 8px;font-size:16px;color:var(--ink-2)}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.image-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:6px}
.image-thumb{position:relative;aspect-ratio:1;background:var(--bg-2);border-radius:4px;overflow:hidden;cursor:pointer}
.image-thumb img{width:100%;height:100%;object-fit:cover}
.image-thumb-rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);border:none;padding:2px 6px;border-radius:3px;cursor:pointer;color:white;font-size:11px}
.pipeline{display:flex;gap:0;padding:12px 0;overflow-x:auto}
.pipeline-step{flex:1;min-width:110px;padding:9px 11px;background:var(--bg-2);border-right:1px solid var(--line);font-size:10px;color:var(--ink-3);position:relative}
.pipeline-step:first-child{border-radius:4px 0 0 4px}
.pipeline-step:last-child{border-right:none;border-radius:0 4px 4px 0}
.pipeline-step.done{background:rgba(93,211,158,0.1);color:var(--good)}
.pipeline-step.current{background:rgba(212,255,58,0.12);color:var(--accent);font-weight:600}
.pipeline-step.breach{background:rgba(255,58,93,0.12);color:var(--crit)}
.pipeline-step .step-num{display:block;font-weight:700;margin-bottom:2px}
.pipeline-step .step-tat{display:block;font-size:9px;margin-top:3px;opacity:0.8}
.empty{text-align:center;padding:40px 20px;color:var(--ink-3);font-size:12px;font-style:italic}
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{width:auto;max-width:200px}
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:16px}
.chart-title{font-size:12px;font-weight:600;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:11px}
.bar-label{width:120px;color:var(--ink-2);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:14px;background:var(--bg-2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);transition:width 0.3s}
.bar-fill.bad{background:var(--bad)}
.bar-fill.warn{background:var(--warn)}
.bar-val{width:36px;text-align:right;font-family:'SF Mono',monospace;color:var(--ink)}
.dropdown{position:relative}
.dropdown-menu{position:absolute;top:100%;left:0;right:0;background:var(--panel-2);border:1px solid var(--line);border-radius:4px;max-height:280px;overflow-y:auto;z-index:100;margin-top:2px}
.dropdown-item{padding:8px 11px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--line)}
.dropdown-item:hover{background:var(--panel)}
.dropdown-item:last-child{border-bottom:none}
.refer-banner{background:rgba(212,255,58,0.08);border:1px solid rgba(212,255,58,0.3);padding:10px 14px;border-radius:5px;margin-bottom:12px;font-size:11px;color:var(--accent)}
.warn-banner{background:rgba(255,58,93,0.08);border:1px solid rgba(255,58,93,0.3);padding:10px 14px;border-radius:5px;margin-bottom:12px;font-size:11px;color:var(--bad)}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.back-btn{background:transparent;color:var(--ink-2);border:none;padding:6px 0;font-size:11px;cursor:pointer;margin-bottom:14px}
.back-btn:hover{color:var(--accent)}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">AeliusParallel</div>
    <div class="login-title">Quality Complaints</div>
    <div class="login-sub">Sign in with your AeliusParallel email</div>
    <input class="login-input" type="email" id="login-email" placeholder="you@aphl.in" autocomplete="email"/>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-note">Same credentials as the PMS dashboard. New users (CS, Sales, Marketing) need to be created in Firebase Auth before first use.</div>
  </div>
</div>
<div id="dashboard" class="hidden">
  <div class="header">
    <div class="brand-strip">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <div class="name">Quality Complaints</div>
        <div class="sub">AeliusParallel</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="email" id="user-email">—</div>
        <div class="role" id="user-role">—</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
  <div class="main" id="main"></div>
</div>
<div id="modal-container"></div>
<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
var ROLE_CONFIG = {
  FOUNDERS:    {label:'Founders',canLog:true,canResolve:true,canSeeAll:true,canOverride:true},
  PMS_TRACKER: {label:'PMS',canLog:true,canResolve:false,canSeeAll:true,canOverride:false,canSetPriority:true},
  QC:          {label:'QC',canLog:false,canResolve:true,canSeeAll:true,canOverride:false},
  RD:          {label:'R&D',canLog:false,canResolve:false,canSeeAll:true,canOverride:false,consultOnly:true},
  SOPSO:       {label:'SOPSO',canLog:true,canResolve:false,canSeeAll:false,canOverride:false,veridianOnly:true},
  READONLY:    {label:'Read-only',canLog:false,canResolve:false,canSeeAll:false,canOverride:false}
};
var COMPLAINT_TYPES = {
  quality:           {label:'Product Quality',imgRequired:false},
  packaging:         {label:'Packaging Defect',imgRequired:true},
  allergic_reaction: {label:'Allergic Reaction',imgRequired:false},
  foreign_matter:    {label:'Foreign Matter',imgRequired:true},
  short_fill:        {label:'Short Fill / Underweight',imgRequired:true},
  other:             {label:'Other',imgRequired:false}
};
var SEVERITY = {
  CRITICAL:{label:'Critical',tatHours:48,desc:'Health risk, allergic reaction, contamination'},
  MAJOR:   {label:'Major',tatHours:168,desc:'Functional defect, packaging failure (default)'},
  MINOR:   {label:'Minor',tatHours:336,desc:'Cosmetic issue, minor inconvenience'}
};
var STATUS = {
  LOGGED:{label:'Logged',order:1},
  ACKNOWLEDGED:{label:'Acknowledged',order:2},
  INVESTIGATING:{label:'Investigating',order:3},
  RD_CONSULT:{label:'R&D Consult',order:4},
  RESOLUTION_PROPOSED:{label:'Resolution Proposed',order:5},
  RESOLVED:{label:'Resolved',order:6},
  CLOSED:{label:'Closed',order:7}
};
var CHANNELS = {
  amazon:'Amazon',flipkart:'Flipkart',myntra:'Myntra',
  d2c:'D2C / Brand Website',mt:'Modern Trade',gt:'General Trade',
  pharmacy:'Pharmacy Chain',whatsapp:'WhatsApp / Direct',other:'Other'
};
var RESOLUTION_TYPES = {
  refund:'Refund issued',replacement:'Replacement sent',no_fault:'No fault found',
  process_change:'Process change initiated',recall:'Batch recall raised',no_action:'No action — customer satisfied'
};

// State
var db, auth;
var currentUser=null, currentRole=null, currentTab='inbox';
var selectedComplaint=null;
var pmsData={programmes:[]};
var productionData={bulk:[],fp:[]};
var complaints=[];
var unsubPMS=null, unsubProduction=null, unsubComplaints=null;

// Cutover for batch dropdown — batches manufactured on/after this date are in PMS
var BATCH_DROPDOWN_CUTOVER = '2026-04-01';

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', function() {
  // Diagnostic: check if Firebase SDK loaded at all
  if (typeof firebase === 'undefined') {
    var msg = 'Firebase SDK failed to load. Check internet connection or browser blockers (ad-block / privacy extensions). Refresh the page.';
    console.error('PQC INIT ERROR:', msg);
    var errEl = document.getElementById('login-err');
    if (errEl) errEl.textContent = msg;
    // Force-show the login screen so the error is visible
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    return;
  }
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    auth.onAuthStateChanged(function(user) {
      if (user) onLoggedIn(user);
      else showLoginScreen();
    });
  } catch(e) {
    console.error('PQC INIT ERROR:', e);
    var errEl = document.getElementById('login-err');
    if (errEl) errEl.textContent = 'Firebase init failed: ' + e.message;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
  }
});

function doLogin() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-err');
  if (!email || !pass) { err.textContent = 'Enter email and password.'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>Signing in...';
  err.textContent = '';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e) {
      err.textContent = 'Sign-in failed: ' + (
        e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'
        ? 'Invalid email or password.' : e.message);
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    });
}

function doLogout() {
  if (unsubPMS) unsubPMS();
  if (unsubProduction) unsubProduction();
  if (unsubComplaints) unsubComplaints();
  auth.signOut();
}

function showLoginScreen() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In →';
}

function onLoggedIn(user) {
  currentUser = user;
  var role = window.PQC_ROLE_MAP[user.email.toLowerCase()];
  if (!role) {
    document.getElementById('login-err').textContent =
      'No PQC role configured for ' + user.email + '. Contact admin.';
    auth.signOut();
    return;
  }
  currentRole = role;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('user-avatar').textContent = user.email.charAt(0).toUpperCase();
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-role').textContent = ROLE_CONFIG[role].label;
  subscribeData();
  renderTabs();
  renderMain();
}

function subscribeData() {
  // Read PMS data for SKU list
  unsubPMS = db.collection('pms').doc('data').onSnapshot(function(snap) {
    if (snap.exists) {
      pmsData = snap.data() || {programmes: []};
      var progCount = (pmsData.programmes || []).length;
      var skuCount = 0;
      (pmsData.programmes || []).forEach(function(p) { skuCount += (p.skus || []).length; });
      console.log('[PQC] PMS data loaded: ' + progCount + ' programmes, ' + skuCount + ' SKUs total.');
      if (skuCount === 0 && progCount > 0) {
        console.warn('[PQC] WARNING: programmes exist but contain no skus[] arrays — FG dropdown will be empty.');
      }
    } else {
      pmsData = {programmes: []};
      console.warn('[PQC] PMS document pms/data does not exist in Firestore. FG dropdown will be empty — type FG names manually.');
    }
    if (currentTab === 'inbox' || currentTab === 'all' || currentTab === 'detail') renderMain();
  }, function(err) {
    console.error('[PQC] PMS subscribe error:', err);
  });

  // Read production data for FP batch list
  unsubProduction = db.collection('production').doc('data').onSnapshot(function(snap) {
    if (snap.exists) {
      var d = snap.data() || {};
      productionData = { bulk: d.bulk || [], fp: d.fp || [] };
      console.log('[PQC] Production data loaded: ' + productionData.bulk.length + ' bulk batches, ' + productionData.fp.length + ' FP batches.');
    } else {
      productionData = { bulk: [], fp: [] };
      console.warn('[PQC] Production document production/data does not exist. Batch dropdown will be empty — type batches manually.');
    }
  }, function(err) {
    console.error('[PQC] Production subscribe error:', err);
  });

  // Subscribe to complaints
  unsubComplaints = db.collection('complaints').orderBy('loggedTs', 'desc')
    .onSnapshot(function(snap) {
      complaints = [];
      snap.forEach(function(doc) {
        complaints.push(Object.assign({_id: doc.id}, doc.data()));
      });
      console.log('[PQC] Complaints loaded: ' + complaints.length);
      renderTabs();
      renderMain();
    }, function(err) {
      console.error('[PQC] Complaints subscribe error:', err);
    });
}

// ════════════════════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════════════════════
function renderTabs() {
  var cfg = ROLE_CONFIG[currentRole];
  var tabsEl = document.getElementById('tabs');
  var tabs = [];

  // Inbox: complaints relevant to me
  var myCount = inboxCount();
  tabs.push({id:'inbox', label:'My Inbox', badge:myCount});

  // All complaints (only roles that can see all)
  if (cfg.canSeeAll) tabs.push({id:'all', label:'All Complaints'});

  // Dashboard (Founders + PMS Tracker — track and prioritize)
  if (cfg.canOverride || currentRole === 'PMS_TRACKER') tabs.push({id:'dashboard', label:'Quality Dashboard'});

  tabsEl.innerHTML = tabs.map(function(t) {
    return '<div class="tab '+(currentTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')">'+
           t.label + (t.badge ? '<span class="tab-badge">'+t.badge+'</span>' : '') + '</div>';
  }).join('');
}

function switchTab(id) {
  currentTab = id;
  selectedComplaint = null;
  renderTabs();
  renderMain();
}

function inboxCount() {
  if (currentRole === 'QC') {
    return complaints.filter(function(c) {
      return c.status !== 'CLOSED' && c.status !== 'RD_CONSULT';
    }).length;
  }
  if (currentRole === 'RD') {
    return complaints.filter(function(c) { return c.status === 'RD_CONSULT'; }).length;
  }
  if (currentRole === 'FOUNDERS' || currentRole === 'PMS_TRACKER') {
    return complaints.filter(function(c) {
      return c.status !== 'CLOSED' && (isTatBreached(c) || isTatWarn(c));
    }).length;
  }
  // CS/Sales/Marketing — see complaints they themselves logged
  return complaints.filter(function(c) {
    return c.loggedByEmail === currentUser.email && c.status !== 'CLOSED';
  }).length;
}

// ════════════════════════════════════════════════════════════
// MAIN ROUTER
// ════════════════════════════════════════════════════════════
function renderMain() {
  var main = document.getElementById('main');
  if (selectedComplaint) {
    renderDetailView();
    return;
  }
  if (currentTab === 'dashboard') return renderDashboard();
  renderListView();
}

// ════════════════════════════════════════════════════════════
// LIST VIEW
// ════════════════════════════════════════════════════════════
function renderListView() {
  var main = document.getElementById('main');
  var cfg = ROLE_CONFIG[currentRole];

  var visible = filterComplaintsForTab();

  var html = '<div class="page-title">';
  html += '<div><h1>' + (currentTab === 'inbox' ? 'My Inbox' : 'All Complaints') + '</h1>';
  html += '<div class="sub">' + visible.length + ' complaint' + (visible.length !== 1 ? 's' : '') + '</div></div>';
  if (cfg.canLog) html += '<button class="primary" onclick="openLogComplaint()">+ Log Complaint</button>';
  html += '</div>';

  // KPI row
  html += renderKPIs(visible);

  // Filter bar (only when 'all' tab)
  if (currentTab === 'all' && cfg.canSeeAll) {
    html += renderFilterBar();
  }

  // Complaint list
  if (visible.length === 0) {
    html += '<div class="empty">No complaints to show.</div>';
  } else {
    html += '<div class="complaint-list">';
    visible.forEach(function(c) { html += renderComplaintCard(c); });
    html += '</div>';
  }
  main.innerHTML = html;
}

function filterComplaintsForTab() {
  var cfg = ROLE_CONFIG[currentRole];
  var list = complaints.slice();

  if (currentTab === 'inbox') {
    if (currentRole === 'QC') {
      list = list.filter(function(c) { return c.status !== 'CLOSED' && c.status !== 'RD_CONSULT'; });
    } else if (currentRole === 'RD') {
      list = list.filter(function(c) { return c.status === 'RD_CONSULT' || (c.referredToRDBy && c.status !== 'CLOSED'); });
    } else if (currentRole === 'FOUNDERS' || currentRole === 'PMS_TRACKER') {
      list = list.filter(function(c) { return c.status !== 'CLOSED'; });
    } else {
      list = list.filter(function(c) { return c.loggedByEmail === currentUser.email; });
    }
  }
  // 'all' tab → no filter for canSeeAll roles

  // Apply UI filters from filter-bar
  var fSeverity = window._filterSeverity;
  var fStatus = window._filterStatus;
  var fBrand = window._filterBrand;
  var fSearch = (window._filterSearch || '').toLowerCase().trim();
  if (fSeverity && fSeverity !== 'all') list = list.filter(function(c) { return c.severity === fSeverity; });
  if (fStatus && fStatus !== 'all') list = list.filter(function(c) { return c.status === fStatus; });
  if (fBrand && fBrand !== 'all') list = list.filter(function(c) { return c.brand === fBrand; });
  if (fSearch) list = list.filter(function(c) {
    return (c.id || '').toLowerCase().indexOf(fSearch) > -1 ||
           (c.skuName || '').toLowerCase().indexOf(fSearch) > -1 ||
           (c.customerName || '').toLowerCase().indexOf(fSearch) > -1 ||
           (c.batchNumber || '').toLowerCase().indexOf(fSearch) > -1;
  });
  return list;
}

function renderKPIs(visible) {
  var open = visible.filter(function(c) { return c.status !== 'CLOSED' && c.status !== 'RESOLVED'; }).length;
  var breached = visible.filter(function(c) { return isTatBreached(c) && c.status !== 'CLOSED'; }).length;
  var warning = visible.filter(function(c) { return isTatWarn(c) && c.status !== 'CLOSED'; }).length;
  var closedThisMonth = visible.filter(function(c) {
    if (c.status !== 'CLOSED' || !c.closedTs) return false;
    var d = new Date(c.closedTs);
    var now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  var critical = visible.filter(function(c) { return c.severity === 'CRITICAL' && c.status !== 'CLOSED'; }).length;

  return '<div class="kpi-row">' +
    '<div class="kpi"><div class="kpi-val">'+open+'</div><div class="kpi-label">Open</div><div class="kpi-sub">Not yet closed</div></div>' +
    '<div class="kpi crit"><div class="kpi-val">'+critical+'</div><div class="kpi-label">Critical Open</div><div class="kpi-sub">Severity: critical</div></div>' +
    '<div class="kpi bad"><div class="kpi-val">'+breached+'</div><div class="kpi-label">TAT Breached</div><div class="kpi-sub">Past deadline</div></div>' +
    '<div class="kpi warn"><div class="kpi-val">'+warning+'</div><div class="kpi-label">TAT Warning</div><div class="kpi-sub">&lt; 24h to deadline</div></div>' +
    '<div class="kpi good"><div class="kpi-val">'+closedThisMonth+'</div><div class="kpi-label">Closed (this month)</div><div class="kpi-sub">Resolution rate</div></div>' +
  '</div>';
}

function renderFilterBar() {
  var brands = uniqueBrands();
  var html = '<div class="filter-bar">';
  html += '<input type="text" placeholder="Search ID, SKU, customer, batch..." value="'+(window._filterSearch||'')+'" onkeyup="window._filterSearch=this.value;debouncedRender()" style="min-width:240px"/>';
  html += '<select onchange="window._filterSeverity=this.value;renderMain()"><option value="all">All severities</option>';
  ['CRITICAL','MAJOR','MINOR'].forEach(function(s) {
    html += '<option value="'+s+'"'+(window._filterSeverity===s?' selected':'')+'>'+SEVERITY[s].label+'</option>';
  });
  html += '</select>';
  html += '<select onchange="window._filterStatus=this.value;renderMain()"><option value="all">All statuses</option>';
  Object.keys(STATUS).forEach(function(s) {
    html += '<option value="'+s+'"'+(window._filterStatus===s?' selected':'')+'>'+STATUS[s].label+'</option>';
  });
  html += '</select>';
  if (brands.length > 0) {
    html += '<select onchange="window._filterBrand=this.value;renderMain()"><option value="all">All brands</option>';
    brands.forEach(function(b) {
      html += '<option value="'+escHtml(b)+'"'+(window._filterBrand===b?' selected':'')+'>'+escHtml(b)+'</option>';
    });
    html += '</select>';
  }
  html += '<button onclick="window._filterSeverity=null;window._filterStatus=null;window._filterBrand=null;window._filterSearch=null;renderMain()">Clear</button>';
  html += '</div>';
  return html;
}

var _renderTimer = null;
function debouncedRender() {
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(renderMain, 200);
}

function renderComplaintCard(c) {
  var sev = c.severity || 'MAJOR';
  var status = c.status || 'LOGGED';
  var tatClass = isTatBreached(c) ? 'tat-breach' : (isTatWarn(c) ? 'tat-warn' : 'tat-ok');
  var tatLabel = c.status === 'CLOSED' ? 'Closed' : tatLabelFor(c);

  // Batch display: PMS link or manual flag
  var batchSuffix = '';
  if (c.batchFromPMS) batchSuffix = ' <span style="color:var(--good);font-size:9px">✓PMS</span>';
  else if (c.batchVerificationFlag) batchSuffix = ' <span style="color:var(--warn);font-size:9px">⚠</span>';

  return '<div class="complaint-card" onclick="openComplaint(\''+c._id+'\')">'+
    '<div class="complaint-id">'+escHtml(c.id || c._id.slice(0,10))+'</div>'+
    '<div class="complaint-main">'+
      '<div class="top">'+
        '<span class="sku">'+escHtml(c.skuName || 'Unknown SKU')+'</span>'+
        (c.brand ? '<span style="font-size:10px;color:var(--ink-3)">· '+escHtml(c.brand)+'</span>' : '')+
        (c.batchNumber ? '<span class="mono" style="font-size:10px;color:var(--ink-3)">· '+escHtml(c.batchNumber)+batchSuffix+'</span>' : '')+
      '</div>'+
      '<div class="meta">'+
        escHtml(COMPLAINT_TYPES[c.complaintType] ? COMPLAINT_TYPES[c.complaintType].label : c.complaintType || '—')+
        ' · ' + escHtml(c.customerName || 'Anon')+
        ' · ' + escHtml(c.customerLocation || '—')+
        ' · logged ' + relativeTime(c.loggedTs)+
      '</div>'+
    '</div>'+
    '<span class="severity-pill severity-'+sev+'">'+SEVERITY[sev].label+'</span>'+
    '<span class="status-pill status-'+status+'">'+STATUS[status].label+'</span>'+
    '<span class="tat-indicator '+tatClass+'">'+tatLabel+'</span>'+
  '</div>';
}

// ════════════════════════════════════════════════════════════
// DETAIL VIEW
// ════════════════════════════════════════════════════════════
function openComplaint(id) {
  selectedComplaint = id;
  renderMain();
}

function renderDetailView() {
  var c = complaints.find(function(x) { return x._id === selectedComplaint; });
  if (!c) {
    selectedComplaint = null;
    return renderMain();
  }
  var cfg = ROLE_CONFIG[currentRole];
  var main = document.getElementById('main');
  var sev = c.severity || 'MAJOR';
  var status = c.status || 'LOGGED';

  var html = '<button class="back-btn" onclick="selectedComplaint=null;renderMain()">← Back to list</button>';
  html += '<div class="page-title"><div>';
  html += '<h1 style="display:flex;align-items:center;gap:12px">'+
    '<span class="mono" style="font-size:14px;color:var(--accent)">'+escHtml(c.id || c._id.slice(0,10))+'</span>'+
    '<span class="severity-pill severity-'+sev+'">'+SEVERITY[sev].label+'</span>'+
    '<span class="status-pill status-'+status+'">'+STATUS[status].label+'</span>'+
  '</h1>';
  html += '<div class="sub">Logged ' + relativeTime(c.loggedTs) + ' by ' + escHtml(c.loggedByEmail || 'unknown') + '</div></div></div>';

  // Pipeline / TAT
  html += renderPipeline(c);

  // 2-column grid
  html += '<div class="detail-grid">';

  // LEFT col
  html += '<div>';
  // Product info
  html += '<div class="panel"><div class="panel-hdr"><div class="panel-title">Product</div></div><div class="panel-body">';
  html += '<div class="field-grid">';
  html += '<div><label>Brand</label><div class="field-val">'+escHtml(c.brand||'—')+'</div></div>';
  html += '<div><label>SKU</label><div class="field-val">'+escHtml(c.skuName||'—')+'</div></div>';
  // Batch display with PMS link or verification flag
  var batchHtml = '<span class="mono">'+escHtml(c.batchNumber||'—')+'</span>';
  if (c.batchFromPMS) {
    batchHtml += ' <span style="color:var(--good);font-size:10px;margin-left:6px">✓ PMS</span>';
    if (c.batchMfgDate) batchHtml += '<div style="font-size:10px;color:var(--ink-3);margin-top:2px">Manufactured ' + escHtml(c.batchMfgDate) + (c.batchLine ? ' · ' + escHtml(c.batchLine) : '') + '</div>';
  } else if (c.batchVerificationFlag) {
    batchHtml += ' <span style="color:var(--warn);font-size:10px;margin-left:6px">⚠ Manual entry — verify with QC</span>';
  }
  html += '<div><label>Batch Number</label><div class="field-val">'+batchHtml+'</div></div>';
  html += '<div><label>Date of Sale</label><div class="field-val">'+escHtml(c.dateOfSale||'—')+'</div></div>';
  html += '</div></div></div>';

  // Customer info
  html += '<div class="panel" style="margin-top:14px"><div class="panel-hdr"><div class="panel-title">Customer</div></div><div class="panel-body">';
  html += '<div class="field-grid">';
  html += '<div><label>Name</label><div class="field-val">'+escHtml(c.customerName||'—')+'</div></div>';
  html += '<div><label>Contact</label><div class="field-val">'+escHtml(c.customerContact||'—')+'</div></div>';
  html += '<div><label>Location</label><div class="field-val">'+escHtml(c.customerLocation||'—')+'</div></div>';
  html += '<div><label>Channel</label><div class="field-val">'+escHtml(CHANNELS[c.channel] || c.channel || '—')+'</div></div>';
  html += '</div></div></div>';

  // Complaint
  html += '<div class="panel" style="margin-top:14px"><div class="panel-hdr"><div class="panel-title">Complaint Details</div></div><div class="panel-body">';
  html += '<div class="field-grid"><div><label>Type</label><div class="field-val">'+escHtml(COMPLAINT_TYPES[c.complaintType] ? COMPLAINT_TYPES[c.complaintType].label : c.complaintType || '—')+'</div></div>';
  html += '<div><label>Severity</label><div class="field-val">'+SEVERITY[sev].label+' — TAT '+SEVERITY[sev].tatHours+'h</div></div></div>';
  html += '<div style="margin-top:14px"><label>Description</label><div style="background:var(--bg-2);padding:10px 12px;border-radius:5px;font-size:12px;white-space:pre-wrap">'+escHtml(c.description||'—')+'</div></div>';
  if (c.images && c.images.length > 0) {
    html += '<div style="margin-top:14px"><label>Images ('+c.images.length+')</label>';
    html += '<div class="image-thumbs">';
    c.images.forEach(function(img, i) {
      html += '<div class="image-thumb" onclick="window.open(\''+img+'\',\'_blank\')"><img src="'+img+'"/></div>';
    });
    html += '</div></div>';
  }
  html += '</div></div>';

  // Investigation (if started)
  if (c.investigationNotes || c.rcaNotes || c.rdConsultNotes) {
    html += '<div class="panel" style="margin-top:14px"><div class="panel-hdr"><div class="panel-title">Investigation</div></div><div class="panel-body">';
    if (c.investigationNotes) html += '<div><label>Investigation Notes</label><div style="background:var(--bg-2);padding:10px 12px;border-radius:5px;font-size:12px;white-space:pre-wrap;margin-bottom:10px">'+escHtml(c.investigationNotes)+'</div></div>';
    if (c.rcaNotes) html += '<div><label>Root Cause Analysis</label><div style="background:var(--bg-2);padding:10px 12px;border-radius:5px;font-size:12px;white-space:pre-wrap;margin-bottom:10px">'+escHtml(c.rcaNotes)+'</div></div>';
    if (c.rdConsultNotes) html += '<div class="refer-banner"><strong>R&D Consult:</strong><br/>'+escHtml(c.rdConsultNotes)+'</div>';

    html += '<div><label>Customer Informed</label><div class="field-val">'+(c.customerInformed ? 'Yes — ' + relativeTime(c.customerInformedTs) : 'Not yet')+'</div></div></div>';
    if (c.resolutionNotes) html += '<div style="margin-top:10px"><label>Resolution Notes</label><div style="background:var(--bg-2);padding:10px 12px;border-radius:5px;font-size:12px;white-space:pre-wrap">'+escHtml(c.resolutionNotes)+'</div></div>';
    html += '</div></div>';
  }

  // Action buttons (role-based)
  html += '<div class="action-btns">' + actionButtonsFor(c) + '</div>';

  html += '</div>'; // /left

  // RIGHT col — activity
  html += '<div><div class="panel"><div class="panel-hdr"><div class="panel-title">Activity Log</div><div class="panel-sub">Status changes, notes, resolutions</div></div>';
  html += '<div class="panel-body activity">';
  if (!c.activity || c.activity.length === 0) {
    html += '<div class="empty">No activity yet</div>';
  } else {
    c.activity.slice().reverse().forEach(function(a) {
      html += '<div class="activity-item">'+
        '<span class="who">'+escHtml((window.PQC_ROLE_MAP[a.byEmail] || a.by || '').toLowerCase())+'</span>'+
        '<span class="note">'+escHtml(a.note)+'</span>'+
        '<span class="ts">'+relativeTime(a.ts)+'</span>'+
      '</div>';
    });
  }
  html += '</div>';

  // Add note input (anyone with view access can add a note)
  html += '<div style="padding:12px 16px;border-top:1px solid var(--line);background:var(--bg-2)">';
  html += '<textarea id="note-input" placeholder="Add a note..." rows="2" style="margin-bottom:8px"></textarea>';
  html += '<button class="primary" onclick="addNote()" style="width:100%">Post Note</button>';
  html += '</div>';
  html += '</div></div>';

  html += '</div>'; // /grid
  main.innerHTML = html;
}

function actionButtonsFor(c) {
  var cfg = ROLE_CONFIG[currentRole];
  var status = c.status || 'LOGGED';
  var html = '';

  // QC actions
  if (currentRole === 'QC' || currentRole === 'FOUNDERS') {
    if (status === 'LOGGED') {
      html += '<button class="primary" onclick="advanceTo(\''+c._id+'\',\'ACKNOWLEDGED\')">Acknowledge</button>';
    } else if (status === 'ACKNOWLEDGED') {
      html += '<button class="primary" onclick="openInvestigationModal(\''+c._id+'\')">Start Investigation</button>';
    } else if (status === 'INVESTIGATING') {
      html += '<button class="primary" onclick="openInvestigationModal(\''+c._id+'\')">Update Investigation</button>';
      html += '<button onclick="openReferRDModal(\''+c._id+'\')">Refer to R&D</button>';
      html += '<button onclick="openResolutionModal(\''+c._id+'\')">Propose Resolution</button>';
    } else if (status === 'RD_CONSULT') {
      html += '<button onclick="openInvestigationModal(\''+c._id+'\')">Update Investigation</button>';
      html += '<button onclick="openResolutionModal(\''+c._id+'\')">Propose Resolution</button>';
    } else if (status === 'RESOLUTION_PROPOSED') {
      html += '<button class="primary" onclick="markResolved(\''+c._id+'\')">Mark Resolved</button>';
    } else if (status === 'RESOLVED') {
      html += '<button class="primary" onclick="advanceTo(\''+c._id+'\',\'CLOSED\')">Close Complaint</button>';
    }
  }

  // R&D actions
  if (currentRole === 'RD' && (status === 'RD_CONSULT' || c.referredToRDBy)) {
    html += '<button class="primary" onclick="openRDConsultModal(\''+c._id+'\')">Submit R&D Input</button>';
  }

  // Founders override (always available unless closed)
  if (cfg.canOverride && status !== 'CLOSED') {
    html += '<button onclick="openOverrideModal(\''+c._id+'\')">Override Severity/TAT</button>';
  }

  return html || '<span style="color:var(--ink-3);font-size:11px;font-style:italic">No actions available for your role at this stage</span>';
}

// ════════════════════════════════════════════════════════════
// PIPELINE / TAT
// ════════════════════════════════════════════════════════════
function renderPipeline(c) {
  var status = c.status || 'LOGGED';
  var statusOrder = STATUS[status].order;
  var sevHours = (c.tatOverrideHours || (SEVERITY[c.severity || 'MAJOR'].tatHours));
  var hoursLogged = (Date.now() - c.loggedTs) / 3600000;
  var hoursLeft = sevHours - hoursLogged;

  var milestones = [
    {key:'LOGGED', label:'Logged', tatTarget:'0h'},
    {key:'ACKNOWLEDGED', label:'Acknowledged', tatTarget:'24h'},
    {key:'INVESTIGATING', label:'Investigating', tatTarget:'5d'},
    {key:'RESOLUTION_PROPOSED', label:'Resolution', tatTarget:'6d'},
    {key:'CLOSED', label:'Closed', tatTarget:Math.round(sevHours/24)+'d'}
  ];

  var html = '<div class="panel" style="margin-bottom:18px"><div class="panel-body" style="padding:0 16px">';
  html += '<div class="pipeline">';
  milestones.forEach(function(m, i) {
    var thisOrder = STATUS[m.key].order;
    var cls = thisOrder < statusOrder ? 'done' : (thisOrder === statusOrder ? 'current' : '');
    if (status !== 'CLOSED' && cls === 'current' && hoursLeft < 0) cls = 'breach';
    html += '<div class="pipeline-step '+cls+'">'+
      '<span class="step-num">'+(i+1)+'</span>'+
      m.label+
      '<span class="step-tat">target: '+m.tatTarget+'</span>'+
    '</div>';
  });
  html += '</div>';

  // TAT summary line
  if (status === 'CLOSED') {
    html += '<div style="padding:12px 0;font-size:11px;color:var(--good);border-top:1px solid var(--line)">';
    html += '✓ Closed in ' + Math.round((c.closedTs - c.loggedTs)/3600000) + 'h';
    if (c.tatBreached) html += ' · <span style="color:var(--bad)">TAT breached</span>';
    html += '</div>';
  } else {
    var cls = hoursLeft < 0 ? 'tat-breach' : (hoursLeft < 24 ? 'tat-warn' : 'tat-ok');
    html += '<div style="padding:12px 0;font-size:11px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px">';
    html += '<span class="tat-indicator '+cls+'">'+(hoursLeft >= 0 ? hoursToStr(hoursLeft)+' left' : hoursToStr(-hoursLeft)+' overdue')+'</span>';
    html += '<span style="color:var(--ink-3)">Total TAT for '+SEVERITY[c.severity||'MAJOR'].label+' severity: '+SEVERITY[c.severity||'MAJOR'].tatHours+'h ('+Math.round(SEVERITY[c.severity||'MAJOR'].tatHours/24)+'d)';
    if (c.tatOverrideHours) html += ' — overridden to '+c.tatOverrideHours+'h';
    html += '</span></div>';
  }

  html += '</div></div>';
  return html;
}

function isTatBreached(c) {
  if (c.status === 'CLOSED') return c.tatBreached || false;
  var sevHours = (c.tatOverrideHours || (SEVERITY[c.severity || 'MAJOR'].tatHours));
  return ((Date.now() - c.loggedTs) / 3600000) > sevHours;
}

function isTatWarn(c) {
  if (c.status === 'CLOSED') return false;
  var sevHours = (c.tatOverrideHours || (SEVERITY[c.severity || 'MAJOR'].tatHours));
  var hoursLeft = sevHours - ((Date.now() - c.loggedTs) / 3600000);
  return hoursLeft >= 0 && hoursLeft < 24;
}

function tatLabelFor(c) {
  var sevHours = (c.tatOverrideHours || (SEVERITY[c.severity || 'MAJOR'].tatHours));
  var hoursLeft = sevHours - ((Date.now() - c.loggedTs) / 3600000);
  return hoursLeft >= 0 ? hoursToStr(hoursLeft) + ' left' : hoursToStr(-hoursLeft) + ' overdue';
}

function hoursToStr(h) {
  if (h < 1) return Math.round(h*60) + 'm';
  if (h < 48) return Math.round(h) + 'h';
  return Math.round(h/24) + 'd';
}

  document.getElementById('lc-sku-search').dataset.skuName = '';
  document.getElementById('lc-sku-selected').style.display = 'none';
  filterSkuDropdown();
}

function onTypeChange() {
  var t = document.getElementById('lc-type').value;
  var label = document.getElementById('lc-img-label');
  if (t && COMPLAINT_TYPES[t] && COMPLAINT_TYPES[t].imgRequired) {
    label.innerHTML = 'Images <span style="color:var(--bad)">* required for this type</span>';

    label.textContent = 'Images (optional)';
  }
}

function showSkuDropdown() { filterSkuDropdown(); }

function filterSkuDropdown() {
  var brandEl = document.getElementById('lc-brand');
  var brand = brandEl.value === '__OTHER__' ? document.getElementById('lc-brand-other').value : brandEl.value;
  var search = document.getElementById('lc-sku-search').value.toLowerCase();
  var dd = document.getElementById('lc-sku-dropdown');
  var allSkus = getAllSKUs();
  console.log('[PQC] filterSkuDropdown called. brand=' + brand + ', search="' + search + '", total SKUs from PMS=' + allSkus.length);

  // Diagnostic: PMS data not loaded
  if (allSkus.length === 0) {
    var progCount = (pmsData.programmes || []).length;
    var msg;
    if (progCount === 0) {
      msg = 'PMS data not yet loaded. Type FG name manually below — it will be saved as text.';
    } else {
      msg = progCount + ' programmes found in PMS but no SKUs inside them. Type FG name manually.';
    }
    dd.innerHTML = '<div class="dropdown-item" style="color:var(--warn)">' + msg + '</div>';
    dd.classList.remove('hidden');
    return;
  }

  var skus = allSkus;
  if (brand && brand !== '__OTHER__') {
    var byBrand = skus.filter(function(s) { return s.brand === brand; });
    console.log('[PQC] After brand filter (' + brand + '): ' + byBrand.length + ' of ' + skus.length);
    // If brand filter eliminates everything, show ALL with a hint instead
    if (byBrand.length === 0) {
      dd.innerHTML = '<div class="dropdown-item" style="color:var(--warn);font-size:10px">No SKUs in PMS match brand "' + escHtml(brand) + '". Showing all FG names — pick one or type freely.</div>' +
        skus.slice(0, 25).map(function(s) {
          return '<div class="dropdown-item" onclick="selectSku(\''+escAttr(s.name)+'\',\''+escAttr(brand)+'\')">'+
            escHtml(s.name)+' <span style="color:var(--ink-3);font-size:10px">· '+escHtml(s.brand)+'</span></div>';
        }).join('');
      dd.classList.remove('hidden');
      return;
    }
    skus = byBrand;
  }
  if (search) skus = skus.filter(function(s) { return s.name.toLowerCase().indexOf(search) > -1; });
  skus = skus.slice(0, 25);
  if (skus.length === 0) {
    dd.innerHTML = '<div class="dropdown-item" style="color:var(--ink-3)">No matches for "' + escHtml(search) + '" — type freely above to save as text.</div>';
  } else {
    dd.innerHTML = skus.map(function(s) {
      return '<div class="dropdown-item" onclick="selectSku(\''+escAttr(s.name)+'\',\''+escAttr(s.brand)+'\')">'+
        escHtml(s.name)+' <span style="color:var(--ink-3);font-size:10px">· '+escHtml(s.brand)+'</span></div>';
    }).join('');
  }
  dd.classList.remove('hidden');
}

function onSaleDateOrSkuChange() {

  var batchEl = document.getElementById('lc-batch');
  if (!batchEl) return;
  batchEl.dataset.fromPMS = '';
  renderBatchSuggestions();
  updateBatchStatus();
}

function renderBatchSuggestions() {
  var batchEl = document.getElementById('lc-batch');
  var ddEl = document.getElementById('lc-batch-suggestions');
  if (!batchEl || !ddEl) return;

  var skuEl = document.getElementById('lc-sku-search');
  var saleDateEl = document.getElementById('lc-sale-date');
  var brandSel = document.getElementById('lc-brand');

  var skuName = (skuEl && skuEl.dataset.skuName) || (skuEl && skuEl.value) || '';
  var brand = brandSel.value === '__OTHER__' ? document.getElementById('lc-brand-other').value : brandSel.value;
  var saleDate = saleDateEl ? saleDateEl.value : '';
  var typed = batchEl.value.trim().toLowerCase();

  // If SKU not picked yet, can't filter — hide suggestions
  if (!skuName) {
    ddEl.innerHTML = '<div class="dropdown-item" style="color:var(--ink-3);font-size:10px">Select FG name first to see PMS batches</div>';
    ddEl.classList.remove('hidden');
    return;
  }

  var batches = getBatchesForSku(skuName, brand, saleDate);

  // Filter by typed text if any
  if (typed) {
    batches = batches.filter(function(b) { return b.batch_no.toLowerCase().indexOf(typed) > -1; });
  }
  batches = batches.slice(0, 20);

  if (batches.length === 0) {
    var msg;
    if (saleDate && saleDate < BATCH_DROPDOWN_CUTOVER) {
      msg = 'Date of sale is before PMS cutover (' + BATCH_DROPDOWN_CUTOVER + ') — type batch manually.';
    } else if (productionData.fp.length === 0) {
      msg = 'No batches in PMS yet. Type batch manually.';
    } else {
      msg = 'No matching FP batches in PMS for this SKU. Type batch manually (will flag for QC review).';
    }
    ddEl.innerHTML = '<div class="dropdown-item" style="color:var(--warn);font-size:10px">' + escHtml(msg) + '</div>';
    ddEl.classList.remove('hidden');
    return;
  }

  ddEl.innerHTML = batches.map(function(b) {
    return '<div class="dropdown-item" onclick="selectBatch(\''+escAttr(b.batch_no)+'\',\''+escAttr(b.mfg_date)+'\',\''+escAttr(b.line)+'\')">'+
      '<span class="mono" style="color:var(--accent);font-weight:600">'+escHtml(b.batch_no)+'</span>'+
      ' <span style="color:var(--ink-3);font-size:10px">· Mfd '+escHtml(b.mfg_date)+(b.line ? ' · '+escHtml(b.line) : '')+'</span>'+
      '</div>';
  }).join('');
  ddEl.classList.remove('hidden');
}

function selectBatch(batchNo, mfgDate, line) {
  var batchEl = document.getElementById('lc-batch');
  batchEl.value = batchNo;
  batchEl.dataset.fromPMS = '1';
  batchEl.dataset.mfgDate = mfgDate;
  batchEl.dataset.line = line || '';
  document.getElementById('lc-batch-suggestions').classList.add('hidden');
  updateBatchStatus();
}

function onBatchInput() {
  var batchEl = document.getElementById('lc-batch');
  // If user types after selecting from PMS, treat as manual override
  if (batchEl.dataset.fromPMS === '1') {
    var typed = batchEl.value.trim();
    if (typed !== batchEl.dataset.fromPMSValue) {
      batchEl.dataset.fromPMS = '';
      batchEl.dataset.mfgDate = '';
      batchEl.dataset.line = '';
    }
  }
  renderBatchSuggestions();
  updateBatchStatus();
}

function updateBatchStatus() {
  var batchEl = document.getElementById('lc-batch');
  var statusEl = document.getElementById('lc-batch-status');
  var saleDateEl = document.getElementById('lc-sale-date');
  if (!batchEl || !statusEl) return;
  var val = batchEl.value.trim();
  var saleDate = saleDateEl ? saleDateEl.value : '';

  if (!val) {
    statusEl.innerHTML = '';
    return;
  }

  if (batchEl.dataset.fromPMS === '1') {
    statusEl.innerHTML = '<span style="color:var(--good)">✓ Linked to PMS batch · Mfd '+escHtml(batchEl.dataset.mfgDate)+(batchEl.dataset.line ? ' · '+escHtml(batchEl.dataset.line) : '')+'</span>';
    return;
  }

  // Manual entry
  var preCutover = saleDate && saleDate < BATCH_DROPDOWN_CUTOVER;
  if (preCutover) {
    statusEl.innerHTML = '<span style="color:var(--ink-3)">Pre-cutover sale — manual batch entry expected.</span>';
  } else if (isBatchInPMS(val)) {
    statusEl.innerHTML = '<span style="color:var(--warn)">⚠ This batch exists in PMS but for a different SKU/brand. Verify before submitting.</span>';
  } else {
    statusEl.innerHTML = '<span style="color:var(--warn)">⚠ Manual entry — batch not found in PMS. Will be flagged for QC verification.</span>';
  }
}

function handleImageUpload(e) {
  var files = e.target.files;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (file.size > 1024 * 1024) {
      alert(file.name + ' exceeds 1MB — please compress before upload.');
      continue;
    }
    var reader = new FileReader();
    reader.onload = (function(f) {
      return function(ev) {
        // Compress: render to canvas at max 800px
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var maxDim = 800;
          var w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = h * (maxDim / w); w = maxDim; }
            else { w = w * (maxDim / h); h = maxDim; }
          }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var compressed = canvas.toDataURL('image/jpeg', 0.7);
          draftImages.push(compressed);
          renderImagePreview();
        };
        img.src = ev.target.result;
      };
    })(file);
    reader.readAsDataURL(file);
  }
  e.target.value = '';
}

function renderImagePreview() {
  var prev = document.getElementById('lc-img-preview');
  prev.innerHTML = draftImages.map(function(img, i) {
    return '<div class="image-thumb"><img src="'+img+'"/><button class="image-thumb-rm" onclick="draftImages.splice('+i+',1);renderImagePreview()">×</button></div>';
  }).join('');
}

function submitComplaint() {
  var err = document.getElementById('lc-err');
  err.textContent = '';

  var brandSel = document.getElementById('lc-brand').value;
  var brand = brandSel === '__OTHER__' ? document.getElementById('lc-brand-other').value.trim() : brandSel;
  var skuName = document.getElementById('lc-sku-search').value.trim();
  var batchEl = document.getElementById('lc-batch');
  var batch = batchEl.value.trim();
  var batchFromPMS = batchEl.dataset.fromPMS === '1';
  var batchMfgDate = batchEl.dataset.mfgDate || '';
  var batchLine = batchEl.dataset.line || '';
  var saleDate = document.getElementById('lc-sale-date').value;
  var custName = document.getElementById('lc-cust-name').value.trim();
  var custContact = document.getElementById('lc-cust-contact').value.trim();
  var custLoc = document.getElementById('lc-cust-loc').value.trim();
  var channel = document.getElementById('lc-channel').value;
  var type = document.getElementById('lc-type').value;
  var sev = document.getElementById('lc-severity').value;
  var desc = document.getElementById('lc-desc').value.trim();

  if (!brand) return err.textContent = 'Brand required';
  // SOPSO can only log against Veridian brands — guard against form tampering
  var roleCfg = ROLE_CONFIG[currentRole] || {};
  if (roleCfg.veridianOnly && window.VERIDIAN_BRANDS.indexOf(brand) === -1) {
    return err.textContent = 'As SOPSO, you can only log complaints for Veridian brands (Azevita, DeadSea, KeraSoul, SeaSoul). Third-party complaints are logged by PMS.';
  }
  if (!skuName) return err.textContent = 'SKU required';
  if (!batch) return err.textContent = 'Batch number required';
  if (!saleDate) return err.textContent = 'Date of sale required';
  if (!custName) return err.textContent = 'Customer name required';
  if (!custContact) return err.textContent = 'Customer contact required';
  if (!channel) return err.textContent = 'Channel required';
  if (!type) return err.textContent = 'Complaint type required';
  if (!sev) return err.textContent = 'Severity required';
  if (!desc) return err.textContent = 'Description required';
  if (COMPLAINT_TYPES[type].imgRequired && draftImages.length === 0) {
    return err.textContent = 'Images required for ' + COMPLAINT_TYPES[type].label;
  }

  // Detect "post-cutover but manual entry" → flag for QC verification
  var batchManualPostCutover = !batchFromPMS && saleDate >= BATCH_DROPDOWN_CUTOVER;

  var now = Date.now();
  var year = new Date(now).getFullYear();
  var idNum = (complaints.filter(function(c) { return (c.id||'').indexOf('PQC-'+year) === 0; }).length + 1).toString().padStart(4, '0');
  var id = 'PQC-' + year + '-' + idNum;

  var loggedNote = 'Complaint logged · ' + sev + ' severity · ' + COMPLAINT_TYPES[type].label;
  if (batchFromPMS) loggedNote += ' · batch linked to PMS (Mfd '+batchMfgDate+')';
  else if (batchManualPostCutover) loggedNote += ' · ⚠ batch manually entered, flagged for QC verification';

  var payload = {
    id: id,
    loggedTs: now,
    loggedByEmail: currentUser.email,
    loggedByRole: currentRole,
    brand: brand,
    skuName: skuName,
    batchNumber: batch,
    batchFromPMS: batchFromPMS,
    batchMfgDate: batchFromPMS ? batchMfgDate : null,
    batchLine: batchFromPMS ? batchLine : null,
    batchVerificationFlag: batchManualPostCutover,
    dateOfSale: saleDate,
    customerName: custName,
    customerContact: custContact,
    customerLocation: custLoc,
    channel: channel,
    complaintType: type,
    severity: sev,
    description: desc,
    images: draftImages.slice(),
    status: 'LOGGED',
    activity: [{
      ts: now, by: currentRole, byEmail: currentUser.email,
      note: loggedNote
    }]
  };

  db.collection('complaints').add(payload)
    .then(function(ref) {
      closeModal();
      draftImages = [];
      // Auto-open the new complaint
      setTimeout(function() {
        selectedComplaint = ref.id;
        renderMain();
      }, 300);
    })
    .catch(function(e) {
      err.textContent = 'Save failed: ' + e.message;
    });
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function advanceTo(id, newStatus) {
  var c = complaints.find(function(x) { return x._id === id; });
  if (!c) return;
  var update = { status: newStatus };
  var now = Date.now();
  var noteText = 'Status: ' + STATUS[c.status].label + ' → ' + STATUS[newStatus].label;
  if (newStatus === 'ACKNOWLEDGED') update.acknowledgedTs = now;
  if (newStatus === 'CLOSED') {
    update.closedTs = now;
    update.closedByEmail = currentUser.email;
    update.tatBreached = ((now - c.loggedTs) / 3600000) > (c.tatOverrideHours || SEVERITY[c.severity || 'MAJOR'].tatHours);
  }
  update.activity = (c.activity || []).concat([{
    ts: now, by: currentRole, byEmail: currentUser.email, note: noteText
  }]);
  db.collection('complaints').doc(id).update(update).catch(function(e) { alert('Update failed: '+e.message); });
}

function openInvestigationModal(id) {
  var c = complaints.find(function(x) { return x._id === id; });
  if (!c) return;

// DASHBOARD

function renderDashboard() {
  var main = document.getElementById('main');
  var open = complaints.filter(function(c) { return c.status !== 'CLOSED'; });
  var closed = complaints.filter(function(c) { return c.status === 'CLOSED'; });
  var breached = complaints.filter(function(c) { return isTatBreached(c) && c.status !== 'CLOSED'; });

  var avgResolution = closed.length === 0 ? 0 :
    Math.round(closed.reduce(function(s, c) { return s + ((c.closedTs - c.loggedTs) / 3600000); }, 0) / closed.length);
  var tatCompliance = closed.length === 0 ? 100 :
    Math.round(closed.filter(function(c) { return !c.tatBreached; }).length * 100 / closed.length);

  var html = '<div class="page-title"><div><h1>Quality Dashboard</h1><div class="sub">Real-time complaint pipeline overview</div></div></div>';

  html += '<div class="kpi-row">';
  html += '<div class="kpi"><div class="kpi-val">'+complaints.length+'</div><div class="kpi-label">Total Complaints</div><div class="kpi-sub">All time</div></div>';
  html += '<div class="kpi warn"><div class="kpi-val">'+open.length+'</div><div class="kpi-label">Open</div><div class="kpi-sub">Not yet closed</div></div>';
  html += '<div class="kpi bad"><div class="kpi-val">'+breached.length+'</div><div class="kpi-label">TAT Breached</div><div class="kpi-sub">Past deadline</div></div>';
  html += '<div class="kpi good"><div class="kpi-val">'+avgResolution+'h</div><div class="kpi-label">Avg Resolution</div><div class="kpi-sub">Closed complaints</div></div>';
  html += '<div class="kpi '+(tatCompliance > 80 ? 'good' : tatCompliance > 60 ? 'warn' : 'bad')+'"><div class="kpi-val">'+tatCompliance+'%</div><div class="kpi-label">TAT Compliance</div><div class="kpi-sub">Closed within target</div></div>';
  html += '</div>';

  html += '<div class="dashboard-grid">';

  // By brand
  html += '<div class="chart-card"><div class="chart-title">Complaints by Brand</div>' + barChart(byKey(complaints, 'brand')) + '</div>';

  // By complaint type
  html += '<div class="chart-card"><div class="chart-title">By Complaint Type</div>' + barChart(byKey(complaints, 'complaintType', function(k) { return COMPLAINT_TYPES[k] ? COMPLAINT_TYPES[k].label : k; })) + '</div>';

  // By severity
  html += '<div class="chart-card"><div class="chart-title">By Severity</div>' + barChart(byKey(complaints, 'severity', function(k) { return SEVERITY[k] ? SEVERITY[k].label : k; })) + '</div>';

  // By channel
  html += '<div class="chart-card"><div class="chart-title">By Channel</div>' + barChart(byKey(complaints, 'channel', function(k) { return CHANNELS[k] || k; })) + '</div>';

  // Top SKUs
  html += '<div class="chart-card" style="grid-column:span 2"><div class="chart-title">Top SKUs by Complaint Count</div>' + barChart(byKey(complaints, 'skuName').slice(0, 10)) + '</div>';

  html += '</div>';
  main.innerHTML = html;
}

function byKey(arr, key, labelFn) {
  var counts = {};
  arr.forEach(function(item) {
    var k = item[key] || '—';
    counts[k] = (counts[k] || 0) + 1;
  });
  var rows = Object.keys(counts).map(function(k) {
    return { label: labelFn ? labelFn(k) : k, value: counts[k] };
  });
  rows.sort(function(a, b) { return b.value - a.value; });
  return rows;
}

function barChart(rows) {
  if (rows.length === 0) return '<div class="empty" style="padding:14px">No data yet</div>';
  var max = Math.max.apply(null, rows.map(function(r) { return r.value; }));
  return rows.map(function(r) {
    var pct = max > 0 ? (r.value * 100 / max) : 0;
    return '<div class="bar-row"><div class="bar-label" title="'+escAttr(r.label)+'">'+escHtml(r.label)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="bar-val">'+r.value+'</div></div>';
  }).join('');
}

// Get FP batches for a given FG/SKU, filtered by manufacturing date >= cutover and <= dateOfSale
// Returns array of {batch_no, mfg_date, line, brand, sku} sorted newest first
function getBatchesForSku(skuName, brand, dateOfSaleStr) {
  if (!skuName) return [];
  var skuLower = skuName.toLowerCase().trim();
  var brandLower = (brand || '').toLowerCase().trim();
  var fp = productionData.fp || [];

  var matches = fp.filter(function(r) {
    if (!r || !r.batch_no || !r.date) return false;
    // Match SKU name (case-insensitive, allows partial match in either direction)
    var rSku = (r.sku || '').toLowerCase();
    var skuMatch = rSku === skuLower || rSku.indexOf(skuLower) > -1 || skuLower.indexOf(rSku) > -1;
    if (!skuMatch) return false;
    // Brand check (skip if either is missing)
    if (brandLower && r.brand) {
      if (r.brand.toLowerCase() !== brandLower) return false;
    }
    // Manufacturing date >= cutover
    if (r.date < BATCH_DROPDOWN_CUTOVER) return false;
    // Manufacturing date <= date of sale (can't sell unmade product)
    if (dateOfSaleStr && r.date > dateOfSaleStr) return false;
    return true;
  });

  // Dedupe by batch_no (FP can have multiple runs per batch)
  var seen = {};
  var unique = [];
  matches.forEach(function(r) {
    if (!seen[r.batch_no]) {
      seen[r.batch_no] = true;
      unique.push({
        batch_no: r.batch_no,
        mfg_date: r.date,
        line: r.line || '',
        brand: r.brand || '',
        sku: r.sku || ''
      });
    }
  });

  // Sort by mfg_date desc (newest first)
  unique.sort(function(a, b) { return b.mfg_date.localeCompare(a.mfg_date); });
  return unique;
}

// Check if a given batch_no exists in PMS production data
function isBatchInPMS(batchNo) {
  if (!batchNo) return false;
  var bn = batchNo.trim().toLowerCase();
  return (productionData.fp || []).some(function(r) { return (r.batch_no || '').toLowerCase() === bn; });
}

function getAllSKUs() {
  var skus = [];
  (pmsData.programmes || []).forEach(function(prog) {
    var brand = inferBrandFromProgramme(prog);
    (prog.skus || []).forEach(function(sku) {
      if (sku.name) skus.push({ name: sku.name, brand: brand, programme: prog.name });
    });
  });
  // Dedupe by name+brand
  var seen = {};
  var unique = [];
  skus.forEach(function(s) {
    var key = s.name + '|' + s.brand;
    if (!seen[key]) { seen[key] = true; unique.push(s); }
  });
  return unique;
}

function inferBrandFromProgramme(prog) {
  // Programmes are named like "Azevita Apr 2026" or "AzevitaSkincare-2026" — extract brand
  if (!prog || !prog.name) return 'Unknown';
  var name = prog.name;
  var brands = ['Azevita', 'DeadSea', 'KeraSoul', 'SeaSoul'];
  for (var i = 0; i < brands.length; i++) {
    if (name.indexOf(brands[i]) > -1) return brands[i];
  }
  // Fallback: first word
  return name.split(/[\s\-_]/)[0];
}

function uniqueBrands() {
  var brands = {};
  (pmsData.programmes || []).forEach(function(prog) {
    var b = inferBrandFromProgramme(prog);
    if (b && b !== 'Unknown') brands[b] = true;
  });
  // Always include the 4 known brands
  ['Azevita', 'DeadSea', 'KeraSoul', 'SeaSoul'].forEach(function(b) { brands[b] = true; });
  return Object.keys(brands).sort();
}

function relativeTime(ts) {
  if (!ts) return '—';
  var diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.round(diff / 60) + 'm ago';
  if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.round(diff / 86400) + 'd ago';
  var d = new Date(ts);
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' });
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) {
  return escHtml(s).replace(/'/g, '&#39;');
}
