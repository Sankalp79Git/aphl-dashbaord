<style>
:root{--bg:#0a0e1a;--bg-2:#0f1421;--panel:#131829;--panel-2:#1a2034;
  --line:rgba(255,255,255,0.08);--ink:#e5e9f0;--ink-2:#9ba3b4;--ink-3:#5d6478;
  --accent:#d4ff3a;--accent-2:#a685ff;--good:#5dd39e;--warn:#ffb83a;--bad:#ff6b6b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;padding:30px;
  max-width:1100px;margin:0 auto}
h1{font-size:22px;color:var(--accent);margin-bottom:6px}
.sub{font-size:12px;color:var(--ink-2);margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:20px;margin-bottom:14px}
.hidden{display:none !important}
.mono{font-family:'SF Mono',Monaco,monospace}
button{font-family:inherit;border-radius:5px;font-size:12px;padding:7px 12px;
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line);cursor:pointer}
button:hover:not(:disabled){background:var(--panel)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.primary{background:var(--accent);color:var(--bg);border:none;font-weight:600}
button.primary:hover:not(:disabled){background:#c4ef2a}
input,select{font-family:inherit;background:var(--bg-2);color:var(--ink);
  border:1px solid var(--line);padding:7px 10px;font-size:12px;border-radius:4px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.login-card{max-width:380px;margin:80px auto}
.login-input{margin-bottom:12px}
.login-btn{width:100%;padding:11px;font-size:13px;font-weight:600}
.login-err{color:var(--bad);font-size:11px;margin-top:10px;min-height:14px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:14px 16px;border-left:3px solid var(--accent)}
.kpi.good{border-left-color:var(--good)}
.kpi.warn{border-left-color:var(--warn)}
.kpi.info{border-left-color:var(--accent-2)}
.kpi-val{font-size:22px;font-weight:600;line-height:1}
.kpi-label{font-size:9px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px}

.row{padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.row-current{font-weight:600;font-size:13px}
.row-meta{font-size:10px;color:var(--ink-3)}
.confidence-pill{font-size:9px;font-weight:700;text-transform:uppercase;
  padding:2px 7px;border-radius:8px;letter-spacing:0.05em}
.confidence-HIGH{background:rgba(93,211,158,0.18);color:var(--good)}
.confidence-MEDIUM{background:rgba(255,184,58,0.18);color:var(--warn)}
.confidence-LOW{background:rgba(255,107,107,0.15);color:var(--bad)}

.action-row{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:center;margin-top:6px}
.action-label{font-size:10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.05em}
.skip-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);margin-top:4px}
.skip-toggle input{width:auto}

.banner{padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:12px}
.banner.info{background:rgba(166,133,255,0.08);border:1px solid rgba(166,133,255,0.3);color:var(--accent-2)}
.banner.warn{background:rgba(255,184,58,0.08);border:1px solid rgba(255,184,58,0.3);color:var(--warn)}
.banner.good{background:rgba(93,211,158,0.08);border:1px solid rgba(93,211,158,0.3);color:var(--good)}

.user-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;
  padding:10px 14px;background:var(--panel);border-radius:6px;border:1px solid var(--line)}
.user-info{font-size:11px;color:var(--ink-2)}
.user-info strong{color:var(--accent)}
</style>

<script>
var db, auth, currentUser, currentRole;
var productionData = { bulk: [], fp: [] };
var reconciliationData = null;
var userChoices = {};  // { pmsName: { newName: '...', skip: false } }
var alreadyApplied = false;

document.addEventListener('DOMContentLoaded', function() {
  // Load embedded reconciliation suggestions
  try {
    var seed = document.getElementById('recon-data');
    reconciliationData = JSON.parse(seed.textContent);
    console.log('[RENAME] Reconciliation data loaded:', reconciliationData);
  } catch(e) {
    console.error('[RENAME] Failed to parse recon data:', e);
    reconciliationData = { fgMapping: [], bulkMapping: [], canonicalList: [] };
  }

  if (typeof firebase === 'undefined') {
    document.getElementById('login-err').textContent = 'Firebase failed to load';
    return;
  }
  firebase.initializeApp(window.FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
  auth.onAuthStateChanged(function(user) {
    if (user) onLoggedIn(user);
    else showLogin();
  });
});

function showLogin() {
  document.getElementById('login-card').classList.remove('hidden');
  document.getElementById('main').classList.add('hidden');
  document.getElementById('loading-card').classList.add('hidden');
}

function doLogin() {
  var email = document.getElementById('email').value.trim().toLowerCase();
  var pass = document.getElementById('pass').value;
  var err = document.getElementById('login-err');
  if (!email || !pass) { err.textContent = 'Email and password required'; return; }
  err.textContent = '';
  document.getElementById('login-btn').disabled = true;
  auth.signInWithEmailAndPassword(email, pass).catch(function(e) {
    err.textContent = 'Sign-in failed: ' + (e.code === 'auth/invalid-credential' ? 'wrong email or password' : e.message);
    document.getElementById('login-btn').disabled = false;
  });
}

function doLogout() {
  auth.signOut().then(function() { window.location.reload(); });
}

function onLoggedIn(user) {
  currentUser = user;
  currentRole = window.RENAME_ROLE_MAP[user.email.toLowerCase()];
  if (!currentRole) {
    document.getElementById('login-err').textContent = 'No access for ' + user.email;
    auth.signOut();
    return;
  }
  document.getElementById('login-card').classList.add('hidden');
  document.getElementById('loading-card').classList.remove('hidden');
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-role').textContent = currentRole;
  loadProductionData();
}

function loadProductionData() {
  db.collection('production').doc('data').get().then(function(snap) {
    if (!snap.exists) {
      document.getElementById('loading-card').innerHTML = '<div style="color:var(--bad)">production/data does not exist!</div>';
      return;
    }
    var data = snap.data();
    productionData = { bulk: data.bulk || [], fp: data.fp || [], _full: data };
    console.log('[RENAME] FP records:', productionData.fp.length, 'Bulk:', productionData.bulk.length);

    // Check if already applied — look for _fgRenameApplied flag
    alreadyApplied = !!data._fgRenameApplied;

    // Initialize user choices with the auto-suggestions
    reconciliationData.fgMapping.forEach(function(m) {
      userChoices[m.pmsName] = {
        newName: m.suggestedCanonical || m.pmsName,
        skip: false,
        confidence: m.confidence
      };
    });

    document.getElementById('loading-card').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    render();
  }).catch(function(e) {
    document.getElementById('loading-card').innerHTML = '<div style="color:var(--bad)">Load failed: ' + e.message + '</div>';
  });
}

function render() {
  renderKPIs();
  renderBanner();
  renderRenameList();
  renderActionArea();
}

function renderKPIs() {
  var fgRows = reconciliationData.fgMapping || [];
  var willRename = fgRows.filter(function(m) {
    var c = userChoices[m.pmsName];
    return c && !c.skip && c.newName && c.newName !== m.pmsName;
  });
  var willSkip = fgRows.filter(function(m) {
    var c = userChoices[m.pmsName];
    return c && (c.skip || !c.newName || c.newName === m.pmsName);
  });
  var totalBatchAffected = willRename.reduce(function(sum, m) { return sum + m.batchCount; }, 0);

  document.getElementById('kpi-area').innerHTML = '<div class="kpi-row">' +
    '<div class="kpi info"><div class="kpi-val">' + fgRows.length + '</div><div class="kpi-label">Unique FGs in PMS</div></div>' +
    '<div class="kpi good"><div class="kpi-val">' + willRename.length + '</div><div class="kpi-label">Will rename</div></div>' +
    '<div class="kpi warn"><div class="kpi-val">' + willSkip.length + '</div><div class="kpi-label">Will skip / unchanged</div></div>' +
    '<div class="kpi"><div class="kpi-val">' + totalBatchAffected + '</div><div class="kpi-label">FP batches affected</div></div>' +
  '</div>';
}

function renderBanner() {
  var area = document.getElementById('banner-area');
  if (alreadyApplied) {
    area.innerHTML = '<div class="banner good">✓ FG rename was already applied. Re-running will overwrite previous changes.</div>';
  } else {
    var lowCount = (reconciliationData.fgMapping || []).filter(function(m) { return m.confidence === 'LOW'; }).length;
    var medCount = (reconciliationData.fgMapping || []).filter(function(m) { return m.confidence === 'MEDIUM'; }).length;
    if (lowCount + medCount > 0) {
      area.innerHTML = '<div class="banner warn">⚠ ' + lowCount + ' LOW and ' + medCount + ' MEDIUM confidence matches need review. Verify each row before applying.</div>';
    } else {
      area.innerHTML = '<div class="banner info">All matches are HIGH confidence. Review the proposals below and apply.</div>';
    }
  }
}

function renderRenameList() {
  var list = document.getElementById('rename-list');
  var fgRows = reconciliationData.fgMapping || [];
  var canonicalList = (reconciliationData.canonicalWithMeta || []).map(function(c) { return c.name; });

  var html = '<div class="card"><h3 style="font-size:14px;margin-bottom:14px">Review each rename</h3>';
  fgRows.forEach(function(m, idx) {
    var choice = userChoices[m.pmsName] || { newName: m.suggestedCanonical, skip: false };
    var optionsHtml = '<option value="">— No change / skip —</option>';
    canonicalList.forEach(function(c) {
      var sel = c === choice.newName ? ' selected' : '';
      optionsHtml += '<option value="' + escAttr(c) + '"' + sel + '>' + escHtml(c) + '</option>';
    });

    html += '<div class="row">';
    html += '<div class="row-hdr">';
    html += '<div>';
    html += '<div class="row-current"><span class="mono" style="color:var(--accent)">[' + escHtml(m.pmsBrand) + ']</span> ' + escHtml(m.pmsName) + '</div>';
    html += '<div class="row-meta">' + m.batchCount + ' FP batch' + (m.batchCount !== 1 ? 'es' : '') + ' use this name · auto-match score ' + m.matchScore + '</div>';
    html += '</div>';
    html += '<span class="confidence-pill confidence-' + m.confidence + '">' + m.confidence + '</span>';
    html += '</div>';

    html += '<div class="action-row">';
    html += '<div class="action-label">Rename to →</div>';
    html += '<select onchange="updateChoice(' + idx + ', this.value)">' + optionsHtml + '</select>';
    html += '</div>';

    html += '<div class="skip-toggle"><input type="checkbox" id="skip-' + idx + '" ' + (choice.skip ? 'checked' : '') + ' onchange="updateSkip(' + idx + ', this.checked)"/><label for="skip-' + idx + '">Skip this row (keep current PMS name)</label></div>';
    html += '</div>';
  });
  html += '</div>';
  list.innerHTML = html;
}

function updateChoice(idx, newName) {
  var pmsName = reconciliationData.fgMapping[idx].pmsName;
  if (!userChoices[pmsName]) userChoices[pmsName] = {};
  userChoices[pmsName].newName = newName;
  userChoices[pmsName].skip = !newName;  // empty means skip
  renderKPIs();
}

function updateSkip(idx, skip) {
  var pmsName = reconciliationData.fgMapping[idx].pmsName;
  if (!userChoices[pmsName]) userChoices[pmsName] = {};
  userChoices[pmsName].skip = skip;
  renderKPIs();
}

function renderActionArea() {
  var area = document.getElementById('action-area');
  var fgRows = reconciliationData.fgMapping || [];
  var willRename = fgRows.filter(function(m) {
    var c = userChoices[m.pmsName];
    return c && !c.skip && c.newName && c.newName !== m.pmsName;
  });

  var html = '<div class="card" style="background:var(--panel-2)">';
  html += '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
  html += '<button class="primary" onclick="confirmApply()" ' + (willRename.length === 0 ? 'disabled' : '') + ' style="font-size:13px;padding:9px 18px">';
  html += '⚡ Apply ' + willRename.length + ' rename' + (willRename.length !== 1 ? 's' : '');
  html += '</button>';
  html += '<button onclick="downloadPreview()">📥 Download preview CSV</button>';
  html += '<div style="flex:1;text-align:right;font-size:11px;color:var(--ink-3)">Each rename updates <code>production/data.fp[].sku</code> for matching batches.</div>';
  html += '</div></div>';
  area.innerHTML = html;
}

function confirmApply() {
  var willRename = (reconciliationData.fgMapping || []).filter(function(m) {
    var c = userChoices[m.pmsName];
    return c && !c.skip && c.newName && c.newName !== m.pmsName;
  });
  if (willRename.length === 0) return;

  var msg = 'Apply ' + willRename.length + ' rename(s) to PMS production records?\n\n';
  willRename.forEach(function(m) {
    msg += '• ' + m.pmsName + '\n  → ' + userChoices[m.pmsName].newName + '\n  (' + m.batchCount + ' batch' + (m.batchCount !== 1 ? 'es' : '') + ')\n\n';
  });
  msg += 'This is reversible via audit log. Continue?';

  if (!confirm(msg)) return;
  applyRename(willRename);
}

function applyRename(willRename) {
  // Build rename map
  var renameMap = {};
  willRename.forEach(function(m) {
    renameMap[m.pmsName] = userChoices[m.pmsName].newName;
  });

  // Snapshot original for audit
  var originalFP = JSON.parse(JSON.stringify(productionData.fp));

  // Apply renames to fp array
  var renamedCount = 0;
  var newFP = productionData.fp.map(function(record) {
    if (record.sku && renameMap[record.sku]) {
      var newRecord = Object.assign({}, record, {
        sku: renameMap[record.sku],
        _previousSku: record.sku,
        _renamedTs: Date.now(),
        _renamedBy: currentUser.email
      });
      renamedCount++;
      return newRecord;
    }
    return record;
  });

  // Build new production data — preserve everything else
  var newProductionData = Object.assign({}, productionData._full || {}, {
    fp: newFP,
    _fgRenameApplied: true,
    _fgRenameAppliedTs: Date.now(),
    _fgRenameAppliedBy: currentUser.email
  });

  // Atomic write: production data + audit log
  var batch = db.batch();
  batch.set(db.collection('production').doc('data'), newProductionData);
  batch.set(db.collection('rename_audit').doc(String(Date.now())), {
    ts: Date.now(),
    by: currentUser.email,
    role: currentRole,
    type: 'FG_BATCH_RENAME',
    renameMap: renameMap,
    affectedRecords: renamedCount,
    snapshotFP: originalFP.filter(function(r) { return r.sku && renameMap[r.sku]; }).map(function(r) {
      return { sku: r.sku, batch_no: r.batch_no, date: r.date, brand: r.brand };
    })
  });

  batch.commit().then(function() {
    alert('Successfully renamed ' + renamedCount + ' FP records!\n\n' +
      'Affected ' + Object.keys(renameMap).length + ' unique FG names.\n\n' +
      'Audit log written. You can now close this tool.');
    alreadyApplied = true;
    productionData.fp = newFP;
    productionData._full = newProductionData;
    render();
  }).catch(function(e) {
    alert('Rename failed: ' + e.message);
    console.error(e);
  });
}

function downloadPreview() {
  var rows = (reconciliationData.fgMapping || []).map(function(m) {
    var c = userChoices[m.pmsName] || {};
    return {
      pmsName: m.pmsName,
      brand: m.pmsBrand,
      batchCount: m.batchCount,
      proposedNewName: c.newName || '',
      skip: c.skip ? 'YES' : '',
      confidence: m.confidence,
      matchScore: m.matchScore
    };
  });
  var headers = ['pmsName', 'brand', 'batchCount', 'proposedNewName', 'skip', 'confidence', 'matchScore'];
  var csv = headers.join(',') + '\n';
  rows.forEach(function(r) {
    csv += headers.map(function(h) {
      var v = String(r[h] == null ? '' : r[h]);
      return v.indexOf(',') > -1 || v.indexOf('"') > -1 ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',') + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fg_rename_preview.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }
</script>
</body>
</html>
