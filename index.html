    </div></div>`;
  } else if (state.modal.kind==='edit-fixed-cc') {
    const sku = state.skus.find(s => s.sno === state.modal.sno);
    if (!sku) return;
    el.innerHTML = `<div class="modal-bg" onclick="closeModalIfBg(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3>Edit Fixed CC</h3>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:14px 16px;margin-bottom:16px;font-size:13px">
        <div style="color:#e8ecf0;font-weight:600;margin-bottom:4px">SKU ${sku.sno}: ${sku.name}</div>
        <div style="color:#8a95a3;font-size:12px">Manual cost addition on top of formulation-based RM cost (₹/unit)</div>
      </div>
      <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Current Fixed CC</label>
      <input type="text" value="₹${fmt(sku.fixed_cc||0, 2)} per unit" disabled style="width:100%;background:#161e26;border:1px solid #1f2a35;color:#5b6775;padding:9px 12px;border-radius:4px;font-family:inherit;font-size:14px;margin-bottom:14px">
      <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">New Fixed CC (₹/unit) <span style="color:#d4664e">*</span></label>
      <input type="number" id="fixed-cc-new" step="0.01" value="${sku.fixed_cc||0}" style="width:100%;background:#0a0e13;border:1px solid #1f2a35;color:#e8ecf0;padding:9px 12px;border-radius:4px;font-family:inherit;font-size:14px;margin-bottom:14px" autofocus>
      <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Reason <span style="color:#d4664e">*</span></label>
      <textarea id="fixed-cc-reason" rows="3" placeholder="e.g. Tier change · Manual override for prototype run" style="width:100%;background:#0a0e13;border:1px solid #1f2a35;color:#e8ecf0;padding:9px 12px;border-radius:4px;font-family:inherit;font-size:13px;margin-bottom:14px;resize:vertical"></textarea>
      <div class="modal-buttons"><button class="btn" onclick="closeModalCancel()">Cancel</button><button class="btn btn-primary" onclick="confirmEditFixedCc()">Save</button></div>
    </div></div>`;
    setTimeout(() => document.getElementById('fixed-cc-new')?.focus(), 50);
  } else if (state.modal.kind==='toggle-status') {
    const sku = state.skus.find(s => s.sno === state.modal.sno);
    if (!sku) return;
    const goingInactive = (sku.status !== 'inactive');
    const action = goingInactive ? 'Deactivate' : 'Activate';

    // Compute future-month forecasts that will be zeroed (only applicable for deactivation)
    let futureForecasts = [];
    if (goingInactive) {
      Object.values(state.allRecons).forEach(recon => {
        if (recon.status !== 'open') return;
        if (recon.monthCode === state.currentMonthCode) return; // current month preserved
        if (recon.monthCode.localeCompare(state.currentMonthCode) <= 0) return; // past months untouched
        const row = (recon.rows || []).find(r => r.sno === sku.sno);
        if (row && Number(row.forecast) > 0) {
          futureForecasts.push({ monthCode: recon.monthCode, month: recon.month, forecast: Number(row.forecast) });
        }
      });
    }
    // Current month forecast (informational)
    let currentForecast = 0;
    if (goingInactive && state.currentMonthCode) {
      const cur = state.allRecons[state.currentMonthCode];
      if (cur) {
        const row = (cur.rows || []).find(r => r.sno === sku.sno);
        if (row) currentForecast = Number(row.forecast) || 0;
      }
    }

    const futureWarn = goingInactive && futureForecasts.length > 0 ? `
      <div class="banner banner-warn" style="margin-bottom:14px">
        <strong>Will zero out ${futureForecasts.length} future forecast${futureForecasts.length===1?'':'s'}:</strong><br>
        ${futureForecasts.map(f => `${f.month}: ${fmt(f.forecast,0)} units`).join('<br>')}
        ${currentForecast > 0 ? `<br><br><span style="color:#85b7eb">Current month (${state.allRecons[state.currentMonthCode]?.month}: ${fmt(currentForecast,0)} units) will be preserved.</span>` : ''}
      </div>
    ` : (goingInactive && currentForecast > 0 ? `
      <div class="banner banner-info" style="margin-bottom:14px">Current month forecast (${fmt(currentForecast,0)} units) will be preserved. No future month forecasts to zero out.</div>
    ` : '');

    el.innerHTML = `<div class="modal-bg" onclick="closeModalIfBg(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3>${action} SKU?</h3>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:14px 16px;margin-bottom:16px;font-size:13px">
        <div style="color:#e8ecf0;font-weight:600;margin-bottom:4px">SKU ${sku.sno}: ${sku.name}</div>
        <div style="color:#8a95a3;font-size:12px">${sku.size}${sku.unit} · Currently <strong style="color:${sku.status==='inactive'?'#d4664e':'#7fb069'}">${sku.status==='inactive'?'INACTIVE':'ACTIVE'}</strong></div>
      </div>
      ${futureWarn}
      <div class="modal-body">
        ${goingInactive
          ? 'Deactivated SKUs are greyed out on the dashboard with an INACTIVE tag. They are still visible (costs still computed), but excluded from future-month reconciliation forecasts.'
          : 'Activating restores the SKU to normal display. Forecasts are not auto-populated — you can add them manually as needed.'}
      </div>
      <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Reason <span style="color:#d4664e">*</span></label>
      <textarea id="toggle-reason" rows="3" placeholder="${goingInactive ? 'e.g. SKU EOL after current month · Pilgrim discontinued' : 'e.g. SKU re-launched · Pilgrim resumed orders'}" style="width:100%;background:#0a0e13;border:1px solid #1f2a35;color:#e8ecf0;padding:9px 12px;border-radius:4px;font-family:inherit;font-size:13px;margin-bottom:14px;resize:vertical"></textarea>
      <div class="modal-buttons"><button class="btn" onclick="closeModalCancel()">Cancel</button><button class="btn ${goingInactive?'btn-danger':'btn-primary'}" onclick="confirmToggleStatus()">${action}</button></div>
    </div></div>`;
    setTimeout(() => document.getElementById('toggle-reason')?.focus(), 50);
  } else if (state.modal.kind === 'reject-proposal') {
    const p = state.proposals.find(x => x.id === state.modal.proposalId);
    if (!p) return;
    el.innerHTML = `<div class="modal-bg" onclick="closeModalIfBg(event)"><div class="modal" onclick="event.stopPropagation()">
      <h3>Reject proposal?</h3>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:14px 16px;margin-bottom:16px;font-size:13px">
        <div style="color:#e8ecf0;font-weight:600;margin-bottom:4px">${p.target_label}</div>
        <div style="color:#8a95a3;font-size:12px">${p.before_summary} → <span style="color:#7fb069">${p.after_summary}</span></div>
        <div style="color:#5b6775;font-size:11px;margin-top:6px">Proposer: ${p.proposer_name} · ${p.reason}</div>
      </div>
      <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Reason for rejection <span style="color:#d4664e">*</span></label>
      <textarea id="reject-reason" rows="3" placeholder="e.g. Vendor revision not yet confirmed · Need quotation document" style="width:100%;background:#0a0e13;border:1px solid #1f2a35;color:#e8ecf0;padding:9px 12px;border-radius:4px;font-family:inherit;font-size:13px;margin-bottom:14px;resize:vertical"></textarea>
      <div class="modal-buttons"><button class="btn" onclick="closeModalCancel()">Cancel</button><button class="btn btn-danger" onclick="confirmRejectProposal()">Reject proposal</button></div>
    </div></div>`;
    setTimeout(() => document.getElementById('reject-reason')?.focus(), 50);
  }
}

// CHUNK 2: tolerance editable on any open month (not just current)
window.updateTolerance = v => {
  const recon = viewingRecon();
  if (!recon || recon.status !== 'open') return;
  if (state.realRole !== 'admin' || state.previewRole !== 'admin') return;
  recon.tolerance_pct = Number(v) || 0;
  state.allRecons[state.viewingMonthCode] = recon;
  renderReconFull();
  scheduleReconSave();
};
window.simulateScenario = kind => {
  if (state.realRole!=='admin' || state.previewRole!=='admin' || state.viewingMonthCode!==state.currentMonthCode) return;
  const recon = state.allRecons[state.currentMonthCode];
  recon.rows.forEach(r => {
    const f = Number(r.forecast) || 0;
    if (f===0) { r.actual = null; return; }
    if (kind==='shortfall') r.actual = Math.round(f * (0.35 + Math.random()*0.2));
    else if (kind==='over') r.actual = Math.round(f * (1.4 + Math.random()*0.4));
    else if (kind==='tolerance') r.actual = Math.round(f * (0.96 + Math.random()*0.06));
    else if (kind==='mixed') {
      const x = Math.random();
      if (x<0.3) r.actual = Math.round(f * (0.4 + Math.random()*0.3));
      else if (x<0.5) r.actual = Math.round(f * (1.3 + Math.random()*0.5));
      else r.actual = Math.round(f * (0.93 + Math.random()*0.14));
    }
  });
  renderReconFull(); scheduleReconSave();
};
window.resetActuals = () => {
  if (state.realRole!=='admin' || state.previewRole!=='admin' || state.viewingMonthCode!==state.currentMonthCode) return;
  state.allRecons[state.currentMonthCode].rows.forEach(r => r.actual = null);
  renderReconFull(); scheduleReconSave();
};
window.copyFromPrev = () => {
  if (state.realRole!=='admin' || state.previewRole!=='admin') return;
  const recon = viewingRecon();
  if (!recon || recon.status !== 'open') return;
  copyFromPrevious();
};

  if (!comp.hasAny) { showToast("Enter actuals first.", true); return; }
  state.modal = { kind:'close' };
  renderModal();
};

window.confirmEditRM = async () => {
  const rmId = state.modal.rmId;
  const r = state.rms.find(x => x.id === rmId);
  if (!r) { showToast("RM not found", true); return; }
  const newRateStr = document.getElementById('rm-new-rate').value;
  const reason = document.getElementById('rm-reason').value.trim();
  const newRate = Number(newRateStr);
  if (!newRateStr || !isFinite(newRate) || newRate <= 0) { showToast("Enter a valid new rate.", true); return; }
  if (reason.length < 3) { showToast("Reason must be at least 3 characters.", true); return; }
  if (newRate === r.rate) { showToast("New rate is the same as current rate.", true); return; }

  const oldRate = r.rate;
  const aff = countAffectedSKUs(r.name);

  // EDITOR PATH: submit as proposal instead of writing live
  if (!canWriteDirectly()) {
    try {
      await submitProposal({
        entity: 'rm_edit',
        target_id: rmId,
        target_label: r.name,
        before_summary: '₹' + fmt(oldRate, 2) + '/kg',
        after_summary: '₹' + fmt(newRate, 2) + '/kg',
        payload: { rmId, oldRate, newRate, rmName: r.name, affectedSKUCount: aff.count },
        reason
      });
      state.modal = null;
      renderModal();
      showToast(`Proposal submitted: ${r.name} → ₹${fmt(newRate,0)}/kg. Awaiting admin approval.`);
    } catch (err) {
      console.error("Proposal submit error:", err);
      showToast("Submission failed: " + err.message, true);
    }
    return;
  }

  // ADMIN PATH: write directly
  try {
    // Atomic-ish: update rm_prices, write change_log, write rm_price_history snapshot
    await setDoc(doc(db, 'rm_prices', rmId), {
      ...r,
      rate: newRate,
      old_rate: oldRate,
      updatedAt: new Date().toISOString(),
      updatedBy: state.userProfile.name
    });
    await setDoc(doc(db, 'change_log', 'rm_edit_' + rmId + '_' + Date.now()), {
      ts: new Date().toISOString(),
      user: state.userProfile.name,
      uid: state.currentUser.uid,
      role: state.realRole,
      entity: 'RM Price',
      action: 'Edited rate for ' + r.name,
      before: '₹' + fmt(oldRate, 2) + '/kg',
      after: '₹' + fmt(newRate, 2) + '/kg',
      reason: reason,
      details: {
        rmId: rmId,
        rmName: r.name,
        oldRate: oldRate,
        newRate: newRate,
        deltaPct: ((newRate - oldRate) / oldRate * 100),
        affectedSKUCount: aff.count,
        affectedSKUs: aff.skus.map(s => s.sno)
      }
    });
    // Snapshot to rm_price_history (seed for future trend chart)
    await setDoc(doc(db, 'rm_price_history', rmId + '_' + Date.now()), {
      rmId: rmId,
      rmName: r.name,
      rate: newRate,
      previousRate: oldRate,
      changedAt: new Date().toISOString(),
      changedBy: state.userProfile.name,
      reason: reason
    });

    // Update local state
    r.rate = newRate;
    r.old_rate = oldRate;
    invalidateRMLookup();

    state.modal = null;
    renderModal();
    document.getElementById('main').innerHTML = renderRM();
    showToast(`Updated ${r.name}: ₹${fmt(oldRate,0)} → ₹${fmt(newRate,0)} · ${aff.count} SKU${aff.count===1?'':'s'} affected`);
  } catch (err) {
    console.error("RM edit error:", err);
    showToast("Save failed: " + err.message, true);
  }
};

window.confirmAddRM = async () => {
  const name = document.getElementById('add-rm-name').value.trim();
  const make = document.getElementById('add-rm-make').value.trim();
  const inci = document.getElementById('add-rm-inci').value.trim();
  const rateStr = document.getElementById('add-rm-rate').value;
  const reason = document.getElementById('add-rm-reason').value.trim();
  const rate = Number(rateStr);

  if (!name) { showToast("Trade name is required.", true); return; }
  if (!rateStr || !isFinite(rate) || rate <= 0) { showToast("Enter a valid rate.", true); return; }
  if (reason.length < 3) { showToast("Reason must be at least 3 characters.", true); return; }

  // Check for duplicate
  const dup = state.rms.find(x => String(x.name||'').trim().toLowerCase() === name.toLowerCase());
  if (dup) { showToast(`"${name}" already exists in the chart (SKU# ${dup.sno}). Edit it instead.`, true); return; }

  const nextSno = Math.max(0, ...state.rms.map(x => x.sno||0)) + 1;
  const newId = 'rm_' + nextSno;
  const aff = countAffectedSKUs(name);

  // EDITOR PATH: submit as proposal
  if (!canWriteDirectly()) {
    try {
      await submitProposal({
        entity: 'rm_add',
        target_id: newId,
        target_label: name,
        before_summary: 'not in chart',
        after_summary: '₹' + fmt(rate, 2) + '/kg',
        payload: { sno: nextSno, name, make, inci, rate, unblockedSKUCount: aff.count },
        reason
      });
      state.modal = null;
      renderModal();
      showToast(`Proposal submitted: add ${name} at ₹${fmt(rate,0)}/kg. Awaiting admin approval.`);
    } catch (err) {
      console.error("Proposal submit error:", err);
      showToast("Submission failed: " + err.message, true);
    }
    return;
  }

  try {
    const newDoc = {
      sno: nextSno,
      name: name,
      make: make,
      inci: inci,
      rate: rate,
      old_rate: null,
      createdAt: new Date().toISOString(),
      createdBy: state.userProfile.name
    };
    await setDoc(doc(db, 'rm_prices', newId), newDoc);
    await setDoc(doc(db, 'change_log', 'rm_add_' + newId + '_' + Date.now()), {
      ts: new Date().toISOString(),
      user: state.userProfile.name,
      uid: state.currentUser.uid,
      role: state.realRole,
      entity: 'RM Price',
      action: 'Added new RM: ' + name,
      before: 'not in chart',
      after: '₹' + fmt(rate, 2) + '/kg',
      reason: reason,
      details: {
        rmId: newId,
        rmName: name,
        rate: rate,
        make: make,
        inci: inci,
        unblockedSKUCount: aff.count,
        unblockedSKUs: aff.skus.map(s => s.sno)
      }
    });
    await setDoc(doc(db, 'rm_price_history', newId + '_' + Date.now()), {
      rmId: newId,
      rmName: name,
      rate: rate,
      previousRate: null,
      changedAt: new Date().toISOString(),
      changedBy: state.userProfile.name,
      reason: 'Initial entry · ' + reason
    });

    // Update local state
    state.rms.push({ id: newId, ...newDoc });
    state.rms.sort((a,b) => (a.sno||0)-(b.sno||0));
    invalidateRMLookup();

    state.modal = null;
    renderModal();
    document.getElementById('main').innerHTML = renderRM();
    showToast(`Added "${name}" at ₹${fmt(rate,0)}/kg${aff.count>0?` · unblocked ${aff.count} SKU${aff.count===1?'':'s'}`:''}`);
  } catch (err) {
    console.error("Add RM error:", err);
    showToast("Add failed: " + err.message, true);
  }
};

window.confirmEditPm = async () => {
  const sno = state.modal.sno;
  const sku = state.skus.find(s => s.sno === sno);
  if (!sku) { showToast("SKU not found", true); return; }
  const reason = document.getElementById('pm-reason').value.trim();
  if (reason.length < 3) { showToast("Reason must be at least 3 characters.", true); return; }

  // Collect changes (only fields that actually changed)
  const inputs = document.querySelectorAll('.pm-edit-input');
  const changes = {};
  let hasChanges = false;
  inputs.forEach(inp => {
    const key = inp.dataset.key;
    const newVal = Number(inp.value);
    const oldVal = Number(sku[key] || 0);
    if (!isFinite(newVal) || newVal < 0) return;
    if (Math.abs(newVal - oldVal) > 1e-6) {
      changes[key] = { old: oldVal, new: newVal };
      hasChanges = true;
    }
  });

  if (!hasChanges) { showToast("No values changed.", true); return; }

  // EDITOR PATH: submit as proposal
  if (!canWriteDirectly()) {
    const beforeText = Object.entries(changes).map(([k, v]) => `${k}=₹${fmt(v.old, 2)}`).join('; ');
    const afterText = Object.entries(changes).map(([k, v]) => `${k}=₹${fmt(v.new, 2)}`).join('; ');
    try {
      await submitProposal({
        entity: 'pm_edit',
        target_id: sku.id,
        target_label: `SKU ${sku.sno}: ${sku.name}`,
        before_summary: beforeText,
        after_summary: afterText,
        payload: { skuId: sku.id, sno: sku.sno, skuName: sku.name, changes },
        reason
      });
      state.modal = null;
      renderModal();
      showToast(`Proposal submitted: ${Object.keys(changes).length} PM field${Object.keys(changes).length===1?'':'s'} for SKU ${sku.sno}. Awaiting admin approval.`);
    } catch (err) {
      console.error("Proposal submit error:", err);
      showToast("Submission failed: " + err.message, true);
    }
    return;
  }

  try {
    // Build updated SKU doc
    const updatedSku = { ...sku };
    Object.entries(changes).forEach(([key, { new: newVal }]) => {
      updatedSku[key] = newVal;
    });
    updatedSku.pm_updatedAt = new Date().toISOString();
    updatedSku.pm_updatedBy = state.userProfile.name;

    // Strip the local 'id' field before writing (Firestore doesn't need it in the doc)
    const { id, ...skuToWrite } = updatedSku;
    await setDoc(doc(db, 'skus', sku.id), skuToWrite);

    // Build human-readable change description
    const changeText = Object.entries(changes).map(([k, v]) => `${k}: ₹${fmt(v.old, 2)} → ₹${fmt(v.new, 2)}`).join('; ');
    const beforeText = Object.entries(changes).map(([k, v]) => `${k}=₹${fmt(v.old, 2)}`).join('; ');
    const afterText = Object.entries(changes).map(([k, v]) => `${k}=₹${fmt(v.new, 2)}`).join('; ');

    await setDoc(doc(db, 'change_log', 'pm_edit_' + sku.id + '_' + Date.now()), {
      ts: new Date().toISOString(),
      user: state.userProfile.name,
      uid: state.currentUser.uid,
      role: state.realRole,
      entity: 'PM Costs',
      action: `Edited PM costs for SKU ${sku.sno}: ${sku.name}`,
      before: beforeText,
      after: afterText,
      reason: reason,

window.confirmToggleStatus = async () => {
  const sno = state.modal.sno;
  const sku = state.skus.find(s => s.sno === sno);
  if (!sku) { showToast("SKU not found", true); return; }
  const reason = document.getElementById('toggle-reason').value.trim();
  if (reason.length < 3) { showToast("Reason must be at least 3 characters.", true); return; }

  const goingInactive = (sku.status !== 'inactive');
  const newStatus = goingInactive ? 'inactive' : 'active';
  const oldStatus = sku.status || 'active';

  // Identify future-month forecasts to zero out (only on deactivation)
  const futureToZero = [];
  if (goingInactive) {
    Object.values(state.allRecons).forEach(recon => {
      if (recon.status !== 'open') return;
      if (recon.monthCode === state.currentMonthCode) return;
      if (recon.monthCode.localeCompare(state.currentMonthCode) <= 0) return;
      const row = (recon.rows || []).find(r => r.sno === sku.sno);
      if (row && Number(row.forecast) > 0) {
        futureToZero.push({ recon, row, oldForecast: Number(row.forecast) });
      }
    });
  }

  // EDITOR PATH: submit as proposal
  if (!canWriteDirectly()) {
    try {
      await submitProposal({
        entity: 'sku_status',
        target_id: sku.id,
        target_label: `SKU ${sku.sno}: ${sku.name}`,
        before_summary: oldStatus,
        after_summary: newStatus,
        payload: { skuId: sku.id, sno: sku.sno, skuName: sku.name, oldStatus, newStatus, futureForecastsToZero: futureToZero.length },
        reason
      });
      state.modal = null;
      renderModal();
      showToast(`Proposal submitted: ${goingInactive?'deactivate':'activate'} SKU ${sku.sno}. Awaiting admin approval.`);
    } catch (err) {
      console.error("Proposal submit error:", err);
      showToast("Submission failed: " + err.message, true);
    }
    return;
  }

  try {
    // 1. Update SKU doc with new status
    const updatedSku = { ...sku, status: newStatus, status_updatedAt: new Date().toISOString(), status_updatedBy: state.userProfile.name };
    const { id, ...skuToWrite } = updatedSku;
    await setDoc(doc(db, 'skus', sku.id), skuToWrite);

    // 2. Zero out future-month forecasts for this SKU
    for (const item of futureToZero) {
      const updatedRows = item.recon.rows.map(r => r.sno === sku.sno ? { ...r, forecast: 0 } : r);
      await setDoc(doc(db, 'reconciliations', item.recon.monthCode), {
        ...item.recon,
        rows: updatedRows,
        updatedAt: new Date().toISOString(),
        updatedBy: state.userProfile.name
      });
      // Update local state too
      item.row.forecast = 0;
    }

    // 3. Write change_log
    const futureSummary = futureToZero.length > 0 ? ` · zeroed ${futureToZero.length} future forecast${futureToZero.length===1?'':'s'}` : '';
    await setDoc(doc(db, 'change_log', 'sku_status_' + sku.id + '_' + Date.now()), {
      ts: new Date().toISOString(),
      user: state.userProfile.name,
      uid: state.currentUser.uid,
      role: state.realRole,
      entity: 'SKU Status',
      action: `${goingInactive?'Deactivated':'Activated'} SKU ${sku.sno}: ${sku.name}${futureSummary}`,
      before: oldStatus,
      after: newStatus,
      reason: reason,
      details: {
        skuId: sku.id,
        sno: sku.sno,
        skuName: sku.name,
        oldStatus: oldStatus,
        newStatus: newStatus,
        zeroedForecasts: futureToZero.map(f => ({ monthCode: f.recon.monthCode, oldForecast: f.oldForecast }))
      }
    });

    // Update local state
    sku.status = newStatus;
    sku.status_updatedAt = updatedSku.status_updatedAt;
    sku.status_updatedBy = updatedSku.status_updatedBy;

    state.modal = null;
    renderModal();
    document.getElementById('main').innerHTML = renderDashboard();
    showToast(`${goingInactive?'Deactivated':'Activated'} SKU ${sku.sno}${futureSummary}`);
  } catch (err) {
    console.error("Toggle status error:", err);
    showToast("Save failed: " + err.message, true);
  }
};

window.approveProposal = async (proposalId) => {
  if (!canWriteDirectly()) return;
  const p = state.proposals.find(x => x.id === proposalId);
  if (!p) { showToast("Proposal not found", true); return; }
  if (p.status !== 'pending') { showToast("Proposal is no longer pending", true); return; }

  // Apply the proposal by routing to the appropriate live-write logic based on entity type
  try {
    const decidedAt = new Date().toISOString();
    const decisionReason = `Approved by ${state.userProfile.name}`;

    if (p.entity === 'rm_edit') {
      const { rmId, oldRate, newRate, rmName } = p.payload;
      const r = state.rms.find(x => x.id === rmId);
      if (!r) { showToast("RM no longer exists in chart", true); return; }
      await setDoc(doc(db, 'rm_prices', rmId), { ...r, rate: newRate, old_rate: r.rate, updatedAt: decidedAt, updatedBy: state.userProfile.name });
      await setDoc(doc(db, 'rm_price_history', rmId + '_' + Date.now()), { rmId, rmName, rate: newRate, previousRate: r.rate, changedAt: decidedAt, changedBy: state.userProfile.name, reason: 'Proposal approved · ' + p.reason });
      r.old_rate = r.rate; r.rate = newRate;
      invalidateRMLookup();
    } else if (p.entity === 'rm_add') {
      const { sno, name, make, inci, rate } = p.payload;
      const dup = state.rms.find(x => String(x.name||'').trim().toLowerCase() === name.toLowerCase());
      if (dup) { showToast(`"${name}" already exists in chart now (added by another action)`, true); return; }
      const newId = 'rm_' + sno;
      const newDoc = { sno, name, make, inci, rate, old_rate: null, createdAt: decidedAt, createdBy: state.userProfile.name };
      await setDoc(doc(db, 'rm_prices', newId), newDoc);
      await setDoc(doc(db, 'rm_price_history', newId + '_' + Date.now()), { rmId: newId, rmName: name, rate, previousRate: null, changedAt: decidedAt, changedBy: state.userProfile.name, reason: 'Initial entry via approved proposal · ' + p.reason });
      state.rms.push({ id: newId, ...newDoc });
      state.rms.sort((a,b) => (a.sno||0)-(b.sno||0));
      invalidateRMLookup();
    } else if (p.entity === 'pm_edit') {
      const { skuId, changes } = p.payload;
      const sku = state.skus.find(s => s.id === skuId);
      if (!sku) { showToast("SKU no longer exists", true); return; }
      const updatedSku = { ...sku };
      Object.entries(changes).forEach(([key, { new: newVal }]) => { updatedSku[key] = newVal; });
      updatedSku.pm_updatedAt = decidedAt;
      updatedSku.pm_updatedBy = state.userProfile.name;
      const { id, ...skuToWrite } = updatedSku;
      await setDoc(doc(db, 'skus', skuId), skuToWrite);
      Object.entries(changes).forEach(([key, { new: newVal }]) => { sku[key] = newVal; });
    } else if (p.entity === 'fixed_cc_edit') {
      const { skuId, newVal } = p.payload;
      const sku = state.skus.find(s => s.id === skuId);
      if (!sku) { showToast("SKU no longer exists", true); return; }
      const updatedSku = { ...sku, fixed_cc: newVal, pm_updatedAt: decidedAt, pm_updatedBy: state.userProfile.name };
      const { id, ...skuToWrite } = updatedSku;
      await setDoc(doc(db, 'skus', skuId), skuToWrite);
      sku.fixed_cc = newVal;
    } else if (p.entity === 'sku_status') {
      const { skuId, newStatus } = p.payload;
      const sku = state.skus.find(s => s.id === skuId);
      if (!sku) { showToast("SKU no longer exists", true); return; }
      const updatedSku = { ...sku, status: newStatus, status_updatedAt: decidedAt, status_updatedBy: state.userProfile.name };
      const { id, ...skuToWrite } = updatedSku;
      await setDoc(doc(db, 'skus', skuId), skuToWrite);
      sku.status = newStatus;
      // Note: future-month forecast zeroing is NOT done on approval — admin should do it manually if needed (would have been done by editor in their proposal context, but data may have moved)
    } else {
      showToast("Unknown proposal entity: " + p.entity, true);
      return;
    }

    // Mark proposal as approved
    await setDoc(doc(db, 'proposals', proposalId), {
      ...p,
      status: 'approved',
      decided_at: decidedAt,
      decided_by: state.userProfile.name,
      decision_reason: decisionReason
    });

    // Write change_log entry for the approval
    await setDoc(doc(db, 'change_log', 'proposal_approved_' + proposalId + '_' + Date.now()), {
      ts: decidedAt,
      user: state.userProfile.name,
      uid: state.currentUser.uid,
      role: state.realRole,
      entity: 'Proposal Approved',
      action: `Approved ${p.entity}: ${p.target_label}`,
      before: p.before_summary,
      after: p.after_summary,
      reason: 'Proposal by ' + p.proposer_name + ': ' + p.reason,
      details: { proposalId, originalProposer: p.proposer_name, originalReason: p.reason }
    });

    // Update local state
    p.status = 'approved';
    p.decided_at = decidedAt;
    p.decided_by = state.userProfile.name;
    p.decision_reason = decisionReason;

    document.getElementById('main').innerHTML = renderApprovals();
    renderNav();
    showToast(`Approved: ${p.target_label}`);
  } catch (err) {
    console.error("Approve error:", err);
    showToast("Approve failed: " + err.message, true);
  }
};

async function loadPurchaseHistory() {

function renderPurchaseHistoryView() {
  const all = state.purchaseHistory || [];
  const q = (state.phSearch || '').toLowerCase();
  const filtered = q
    ? all.filter(r => String(r.item_name||'').toLowerCase().includes(q) || String(r.supplier||'').toLowerCase().includes(q))
    : all;

  if (all.length === 0) {
    return `
      <div class="section-header">
        <div>
          <div class="section-title">Purchase History</div>
          <div class="section-sub">Tally Purchase Register data — historical actuals for RM and PM purchases</div>
        </div>
      </div>
      <div class="placeholder">
        <h3>No purchase history yet</h3>
        <p style="margin-top:8px;line-height:1.7">Use the standalone import tool to load your Tally Purchase Register Excel:</p>
        <p style="margin-top:8px"><a href="purchase_history.html" style="color:#d4a574">Open import tool →</a></p>
        <p style="margin-top:8px;color:#5b6775;font-size:12px">After importing, refresh this tab to see the data.</p>
      </div>`;
  }

  // Stats
  const distinctItems = new Set(all.map(r => String(r.item_name||'').toUpperCase())).size;
  const distinctSuppliers = new Set(all.map(r => r.supplier).filter(Boolean)).size;
  const totalSpend = all.reduce((a, b) => a + (Number(b.value) || 0), 0);
  const dates = all.map(r => r.date).filter(Boolean).sort();
  const dateRange = dates.length > 0 ? `${dates[0].substring(0,7)} → ${dates[dates.length-1].substring(0,7)}` : '—';

  // Per-item aggregates for filtered set
  const byItem = {};
  filtered.forEach(r => {
    const k = String(r.item_name || '').toUpperCase();
    if (!byItem[k]) byItem[k] = { name: r.item_name, count: 0, totalQty: 0, totalValue: 0, rates: [], suppliers: new Set(), latestDate: '', latestRate: null };
    byItem[k].count++;
    byItem[k].totalQty += Number(r.qty) || 0;
    byItem[k].totalValue += Number(r.value) || 0;
    if (r.rate != null) byItem[k].rates.push(Number(r.rate));
    if (r.supplier) byItem[k].suppliers.add(r.supplier);
    if (String(r.date || '') > byItem[k].latestDate) {
      byItem[k].latestDate = String(r.date || '');
      byItem[k].latestRate = r.rate != null ? Number(r.rate) : null;
    }
  });

  const itemRows = Object.values(byItem)
    .sort((a, b) => b.totalValue - a.totalValue)
    .slice(0, 200) // cap at 200 to keep render fast
    .map(item => {
      const minRate = item.rates.length > 0 ? Math.min(...item.rates) : null;
      const maxRate = item.rates.length > 0 ? Math.max(...item.rates) : null;
      const avgRate = item.rates.length > 0 ? item.rates.reduce((a,b) => a+b, 0) / item.rates.length : null;
      const rateRange = minRate !== null
        ? (Math.abs(maxRate - minRate) < 0.01
            ? `₹${fmt(avgRate, 0)}`
            : `₹${fmt(minRate, 0)}–₹${fmt(maxRate, 0)}`)
        : '—';
      const latestDateStr = item.latestDate ? item.latestDate.substring(0, 10) : '—';
      return `<tr>
        <td class="left" style="color:#e8ecf0">${item.name}</td>
        <td>${item.count}</td>
        <td>${item.totalQty.toLocaleString('en-IN', {maximumFractionDigits: 0})}</td>
        <td style="color:#d4a574">₹${fmt(item.totalValue, 0)}</td>
        <td>${rateRange}</td>
        <td>${item.latestRate != null ? '₹'+fmt(item.latestRate, 0) : '—'}</td>
        <td class="left" style="color:#5b6775;font-size:11px">${latestDateStr}</td>
        <td>${item.suppliers.size}</td>
      </tr>`;
    }).join('');

  return `
    <div class="section-header">
      <div>
        <div class="section-title">Purchase History</div>
        <div class="section-sub">${all.length.toLocaleString('en-IN')} purchase rows · ${distinctItems} distinct items · ${distinctSuppliers} suppliers · ${dateRange}</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="search-wrap"><span class="search-icon">⌕</span><input type="search" placeholder="Search item or supplier" value="${state.phSearch}" oninput="updatePhSearch(this.value)"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
        <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Total spend</div>
        <div style="color:#d4a574;font-size:22px;font-weight:600;margin-top:4px">₹${(totalSpend/10000000).toFixed(2)} Cr</div>
        <div style="color:#5b6775;font-size:10px;margin-top:2px">${dateRange}</div>
      </div>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
        <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Purchase rows</div>
        <div style="color:#e8ecf0;font-size:22px;font-weight:600;margin-top:4px">${all.length.toLocaleString('en-IN')}</div>
        <div style="color:#5b6775;font-size:10px;margin-top:2px">filtered: ${filtered.length.toLocaleString('en-IN')}</div>
      </div>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
        <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Distinct items</div>
        <div style="color:#e8ecf0;font-size:22px;font-weight:600;margin-top:4px">${distinctItems}</div>
        <div style="color:#5b6775;font-size:10px;margin-top:2px">RMs + PMs combined</div>
      </div>
      <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
        <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Suppliers</div>
        <div style="color:#e8ecf0;font-size:22px;font-weight:600;margin-top:4px">${distinctSuppliers}</div>
      </div>
    </div>
    <h3 style="font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#8a95a3;margin-bottom:10px;font-weight:600">By item · top 200 by total spend</h3>
