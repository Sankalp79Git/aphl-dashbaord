<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, writeBatch, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA74TGZkHW1XgsmTvrQ8Q6S58OL0oSq0yg",
  authDomain: "aphl-pilgrim-open-costing.firebaseapp.com",
  projectId: "aphl-pilgrim-open-costing",
  storageBucket: "aphl-pilgrim-open-costing.firebasestorage.app",
  messagingSenderId: "1044680408642",
  appId: "1:1044680408642:web:a7625eb185ec4b547237db"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const REOPEN_WINDOW_DAYS = 7;
const HORIZON_MONTHS = 6;

const state = {
  currentUser: null, userProfile: null, realRole: null, previewRole: null,
  tab: 'dashboard',
  settings: null, skus: [], rms: [], cc_matrix: null, formulations: {}, historicalDemand: {},
  searchQuery: '', expandedSku: null,
  loaded: false,
  allRecons: {}, viewingMonthCode: null, currentMonthCode: null,
  history: [],
  changeLog: [], changeLogFilter: 'all', changeLogLimit: 50,
  proposals: [], proposalsFilter: 'pending',
  scenario: { rmId: null, deltaPct: null, customPct: '', result: null },
  purchaseHistory: [], phSearch: '', phLoaded: false,
  saveTimer: null, saveStatus: 'idle',
  sortByAccuracy: false, hideOutOfScope: false,
  modal: null, toast: null
};

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const monthCodeName = mc => { const [y,m] = mc.split('-').map(Number); return MONTHS[m-1] + ' ' + y; };
const monthCodeShort = mc => { const [y,m] = mc.split('-').map(Number); return MONTHS_SHORT[m-1] + " '" + String(y).slice(2); };
const nextMC = mc => { const [y,m] = mc.split('-').map(Number); const nm = m===12?1:m+1; const ny = m===12?y+1:y; return ny + '-' + String(nm).padStart(2,'0'); };
const prevMC = mc => { const [y,m] = mc.split('-').map(Number); const pm = m===1?12:m-1; const py = m===1?y-1:y; return py + '-' + String(pm).padStart(2,'0'); };
const todayMC = () => { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0'); };
const daysSince = iso => Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
const isMini = name => /mini|miniature|8gm/i.test(name);

function calcSKU(sku, s) {
  const rm_w_f = (sku.rm_cost_kg_base || 0) * (1 + s.freight_pct);
  const rm_margin = rm_w_f * s.rm_margin_pct;
  const rm_wst = s.pm_handling_pct * (rm_w_f + rm_margin);
  const rm_kg = rm_w_f + rm_margin + rm_wst + s.utilities_per_kg;
  const rm_unit_raw = (rm_kg / 1000) * (sku.size || 0);
  const rm_unit = rm_unit_raw + (sku.fixed_cc || 0);
  const pm_items = (sku.jar_bottle||0)+(sku.cap_pump||0)+(sku.label||0)+(sku.monocarton||0)+(sku.shrink||0);
  const pm_h = pm_items * s.pm_handling_pct;
  const pm_total = pm_items + pm_h + (sku.freight_pm||0)+(sku.freight_label||0)+(sku.freight_mono||0)+(sku.outer_carton||0)+(sku.ink||0);
  const total = rm_unit + pm_total;
  const exf = total * (1 + s.gst_pct);
  return { rm_w_f, rm_margin, rm_wst, rm_kg, rm_unit_raw, rm_unit, pm_items, pm_h, pm_total, total, exf };
}

// === LIVE RM COST CALCULATION ===
// Computes effective rm_cost_kg_base for a SKU live from its formulation × current RM rates.
// Returns { cost, unresolved: [...trade names], source: 'live'|'cached'|'live-with-fallback' }
function liveRMCost(sku) {
  const formulation = state.formulations[String(sku.sno)] || state.formulations[sku.sno];
  if (!formulation || !formulation.ingredients || formulation.ingredients.length === 0) {
    return { cost: Number(sku.rm_cost_kg_base) || 0, unresolved: [], source: 'cached' };
  }
  // Build rmLookup if not yet built (cached on state for performance)
  if (!state._rmLookup || state._rmLookupVersion !== state.rms.length) {
    state._rmLookup = {};
    state.rms.forEach(r => {
      if (r.name) state._rmLookup[String(r.name).trim().toLowerCase()] = Number(r.rate) || 0;
    });
    state._rmLookupVersion = state.rms.length;
  }
  let cost = 0;
  const unresolved = [];
  formulation.ingredients.forEach(ing => {
    const trade = String(ing.trade || '').trim();
    const lookupKey = trade.toLowerCase();
    const liveRate = state._rmLookup[lookupKey];
    let rateUsed = null;
    if (liveRate != null) {
      rateUsed = liveRate;
    } else if (ing.hardcoded_rate != null) {
      rateUsed = Number(ing.hardcoded_rate);
    }
    if (rateUsed != null && rateUsed > 0) {
      cost += (Number(ing.qty_pct) / 100) * rateUsed;
    } else {
      unresolved.push(trade);
    }
  });
  return { cost: Math.round(cost * 10000) / 10000, unresolved, source: unresolved.length > 0 ? 'live-partial' : 'live' };
}

// === HISTORICAL DEMAND & FORECAST ===
// Get historical demand series for a SKU as [{monthCode, units}] sorted ascending
function getHistorySeries(sno) {
  const series = [];
  Object.values(state.historicalDemand).forEach(d => {
    if (Number(d.sno) === Number(sno)) {
      series.push({ monthCode: d.monthCode, units: Number(d.units) || 0 });
    }
  });
  series.sort((a, b) => a.monthCode.localeCompare(b.monthCode));
  return series;
}

// Compute data quality assessment for a SKU based on its historical demand data.
// Returns { months, status: 'excellent'|'good'|'limited'|'insufficient'|'none', label }
function dataQuality(sno) {
  const series = getHistorySeries(sno);
  const n = series.length;
  if (n === 0) return { months: 0, status: 'none', label: 'No historical data' };
  if (n < 6) return { months: n, status: 'insufficient', label: `${n} months · insufficient for forecast` };
  if (n < 12) return { months: n, status: 'limited', label: `${n} months · limited history` };
  if (n < 24) return { months: n, status: 'good', label: `${n} months · good history` };
  return { months: n, status: 'excellent', label: `${n} months · excellent history` };
}

// Compute next monthCode after a given one (e.g. "2026-04" -> "2026-05")
function nextMonth(mc) {
  const [y, m] = mc.split('-').map(Number);
  return m === 12 ? `${y + 1}-01` : `${y}-${String(m + 1).padStart(2, '0')}`;
}

// Linear regression on [{x, y}] points, returns {slope, intercept}
function linearRegression(points) {
  const n = points.length;
  if (n < 2) return { slope: 0, intercept: points[0]?.y || 0 };
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  points.forEach(p => { sx += p.x; sy += p.y; sxy += p.x * p.y; sxx += p.x * p.x; });
  const slope = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const intercept = (sy - slope * sx) / n;
  return { slope: isFinite(slope) ? slope : 0, intercept: isFinite(intercept) ? intercept : 0 };
}

// Compute forecast for next 6 months for a SKU.
// Returns { history: [{monthCode, units, isHistory: true}],
//           forecast: [{monthCode, low, mid, high, isHistory: false}],
//           quality, residualStdDev, hasForecast }
function computeForecast(sno, forecastMonths = 6) {
  const series = getHistorySeries(sno);
  const quality = dataQuality(sno);

  // Mark all historical points
  const history = series.map(s => ({ ...s, isHistory: true }));

  // No forecast for insufficient/none
  if (quality.status === 'none' || quality.status === 'insufficient') {
    return { history, forecast: [], quality, residualStdDev: 0, hasForecast: false };
  }

  // Build linear trend from points indexed 0..n-1
  const points = series.map((s, i) => ({ x: i, y: s.units }));
  const { slope, intercept } = linearRegression(points);

  // Compute residuals to estimate uncertainty (std deviation of points around trend line)
  let sumSqResid = 0;
  points.forEach(p => {
    const predicted = intercept + slope * p.x;
    sumSqResid += Math.pow(p.y - predicted, 2);
  });
  const residualStdDev = points.length > 1 ? Math.sqrt(sumSqResid / (points.length - 1)) : 0;

  // For seasonality, only use if 24+ months: compute month-of-year multiplier
  // (Average ratio of month X to overall average, across years)
  let seasonalityFactors = {}; // key: month (1-12), val: multiplier
  if (quality.status === 'excellent' && series.length >= 24) {
    const overallAvg = series.reduce((a, b) => a + b.units, 0) / series.length;
    if (overallAvg > 0) {
      const byMonth = {};
      series.forEach(s => {
        const m = Number(s.monthCode.split('-')[1]);
        if (!byMonth[m]) byMonth[m] = [];
        byMonth[m].push(s.units);
      });
      for (let m = 1; m <= 12; m++) {
        if (byMonth[m] && byMonth[m].length >= 2) {
          const monthAvg = byMonth[m].reduce((a, b) => a + b, 0) / byMonth[m].length;
          // Dampen the factor — pure ratio is too aggressive for lumpy data
          const rawFactor = monthAvg / overallAvg;
          seasonalityFactors[m] = 0.5 + 0.5 * rawFactor; // 50% blend toward 1.0
        } else {
          seasonalityFactors[m] = 1.0;
        }
      }
    }
  }

  // Generate forecast points
  const lastMonthCode = series[series.length - 1].monthCode;
  const forecast = [];
  let curMonth = lastMonthCode;
  for (let k = 1; k <= forecastMonths; k++) {
    curMonth = nextMonth(curMonth);
    const x = series.length - 1 + k;
    let trendValue = Math.max(0, intercept + slope * x);
    const monthNum = Number(curMonth.split('-')[1]);
    if (seasonalityFactors[monthNum]) {
      trendValue *= seasonalityFactors[monthNum];
    }
    // Confidence band widens with forecast distance (sqrt of months ahead)
    const widening = Math.sqrt(k);
    const sigma = residualStdDev * widening;
    const low = Math.max(0, trendValue - sigma);
    const high = Math.max(0, trendValue + sigma);
    forecast.push({
      monthCode: curMonth,
      low: Math.round(low),
      mid: Math.round(trendValue),
      high: Math.round(high),
      isHistory: false
    });
  }

  return { history, forecast, quality, residualStdDev, hasForecast: true };
}

// Format month code like "2024-08" -> "Aug 24"
function shortMonth(mc) {
  const [y, m] = mc.split('-').map(Number);
  return `${MONTHS_SHORT[m - 1]} ${String(y).slice(2)}`;
}

// Render an SVG bar chart showing history + forecast for one SKU
// Returns HTML string.
function renderDemandChart(sno) {
  const fc = computeForecast(sno, 6);
  if (fc.quality.status === 'none') {
    return `<div style="text-align:center;color:#5b6775;padding:24px;font-size:12px">No historical demand data available for this SKU.</div>`;
  }

  // Combine history + forecast for axes scaling, but render separately
  const allValues = [
    ...fc.history.map(p => p.units),
    ...fc.forecast.map(p => p.high)
  ];
  const maxVal = Math.max(...allValues, 1);

  // Show only last 24 months of history to keep chart readable
  const visibleHistory = fc.history.slice(-24);
  const allPoints = [...visibleHistory, ...fc.forecast];
  const totalBars = allPoints.length;

  if (totalBars === 0) {
    return `<div style="text-align:center;color:#5b6775;padding:24px;font-size:12px">No data to chart.</div>`;
  }

  // SVG dimensions
  const W = 720, H = 200;
  const PAD_T = 12, PAD_B = 38, PAD_L = 50, PAD_R = 12;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_T - PAD_B;
  const barW = plotW / totalBars;
  const innerBarW = Math.max(2, barW - 3);

  // Compute trend line (simple linear regression on history for visual)
  let trendLine = '';
  if (visibleHistory.length >= 2) {
    const tpoints = visibleHistory.map((p, i) => ({ x: i, y: p.units }));
    const lr = linearRegression(tpoints);
    // Project trend line through history and forecast x-range
    const x1 = 0;
    const y1 = lr.intercept;
    const x2 = totalBars - 1;
    const y2 = lr.intercept + lr.slope * (x2 - 0); // continue through forecast period
    const sx1 = PAD_L + (0 + 0.5) * barW;
    const sy1 = PAD_T + plotH - (Math.max(0, y1) / maxVal) * plotH;
    const sx2 = PAD_L + (x2 + 0.5) * barW;
    const sy2 = PAD_T + plotH - (Math.max(0, y2) / maxVal) * plotH;
    trendLine = `<line x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>`;
  }

  // Render bars
  const barsHtml = allPoints.map((p, i) => {
    const x = PAD_L + i * barW + (barW - innerBarW) / 2;
    if (p.isHistory) {
      const h = (p.units / maxVal) * plotH;
      const y = PAD_T + plotH - h;
      const tooltip = `${shortMonth(p.monthCode)}: ${p.units.toLocaleString('en-IN')} units (actual)`;
      return `<rect x="${x}" y="${y}" width="${innerBarW}" height="${h}" fill="#85b7eb" opacity="0.85"><title>${tooltip}</title></rect>`;
    } else {
      // Forecast: show a "high-low" band as a slim rect, with mid as a marker
      const lowH = (p.low / maxVal) * plotH;
      const lowY = PAD_T + plotH - lowH;
      const highH = (p.high / maxVal) * plotH;
      const highY = PAD_T + plotH - highH;
      const midH = (p.mid / maxVal) * plotH;
      const midY = PAD_T + plotH - midH;
      const bandH = lowY - highY;
      const tooltip = `${shortMonth(p.monthCode)}: ${p.mid.toLocaleString('en-IN')} units (forecast · range ${p.low.toLocaleString('en-IN')}-${p.high.toLocaleString('en-IN')})`;
      // Band rect (high to low, transparent)
      // Mid bar (solid)
      return `
        <rect x="${x}" y="${highY}" width="${innerBarW}" height="${bandH}" fill="#d4a574" opacity="0.18"><title>${tooltip}</title></rect>
        <rect x="${x}" y="${midY}" width="${innerBarW}" height="${midH}" fill="#d4a574" opacity="0.55"><title>${tooltip}</title></rect>
      `;
    }
  }).join('');

  // X-axis labels (every 3rd month to avoid clutter)
  const labelInterval = Math.ceil(totalBars / 12);
  const xLabels = allPoints.map((p, i) => {
    if (i % labelInterval !== 0 && i !== totalBars - 1) return '';
    const x = PAD_L + i * barW + barW / 2;
    const y = H - 18;
    const label = shortMonth(p.monthCode);
    return `<text x="${x}" y="${y}" text-anchor="middle" font-size="9" fill="#5b6775" font-family="-apple-system,BlinkMacSystemFont,sans-serif">${label}</text>`;
  }).join('');

  // Y-axis: 4 grid lines
  const yLabels = [];
  const gridLines = [];
  for (let i = 0; i <= 3; i++) {
    const v = (maxVal / 3) * (3 - i);
    const y = PAD_T + (plotH / 3) * i;
    yLabels.push(`<text x="${PAD_L - 6}" y="${y + 3}" text-anchor="end" font-size="9" fill="#5b6775" font-family="-apple-system,BlinkMacSystemFont,sans-serif">${v >= 1000 ? (v/1000).toFixed(0)+'K' : Math.round(v)}</text>`);
    gridLines.push(`<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#1f2a35" stroke-width="0.5"/>`);
  }

  // Vertical separator between history and forecast
  let separator = '';
  if (fc.history.length > 0 && fc.forecast.length > 0) {
    const sepX = PAD_L + visibleHistory.length * barW;
    separator = `<line x1="${sepX}" y1="${PAD_T}" x2="${sepX}" y2="${H - PAD_B}" stroke="#5b6775" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"/>
                 <text x="${sepX + 4}" y="${PAD_T + 9}" font-size="9" fill="#d4a574" font-family="-apple-system,BlinkMacSystemFont,sans-serif">forecast →</text>`;
  }

  // Quality badge color
  const qColor = {
    'excellent': '#7fb069', 'good': '#85b7eb', 'limited': '#e6b447',
    'insufficient': '#d4664e', 'none': '#5b6775'
  }[fc.quality.status];

  // Compute summary stats
  const histTotal = fc.history.reduce((a, b) => a + b.units, 0);
  const histAvg = fc.history.length > 0 ? Math.round(histTotal / fc.history.length) : 0;
  const recentAvg = fc.history.length >= 6 ? Math.round(fc.history.slice(-6).reduce((a, b) => a + b.units, 0) / 6) : null;

  // Forecast summary
  let forecastSummary = '';
  if (fc.hasForecast) {
    const next3Mid = fc.forecast.slice(0, 3).reduce((a, b) => a + b.mid, 0);
    const next3Low = fc.forecast.slice(0, 3).reduce((a, b) => a + b.low, 0);
    const next3High = fc.forecast.slice(0, 3).reduce((a, b) => a + b.high, 0);
    forecastSummary = `<div style="font-size:11px;color:#8a95a3;margin-top:8px">Next 3 months forecast: <strong style="color:#d4a574">${(next3Mid/1000).toFixed(1)}K</strong> units (range ${(next3Low/1000).toFixed(1)}K – ${(next3High/1000).toFixed(1)}K)</div>`;
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div style="font-size:11px;color:#8a95a3">
        <span style="background:${qColor}22;color:${qColor};padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:0.05em">${fc.quality.label}</span>
        <span style="margin-left:10px">All-time avg: ${histAvg.toLocaleString('en-IN')}/mo</span>
        ${recentAvg !== null ? `<span style="margin-left:10px">Last 6mo avg: ${recentAvg.toLocaleString('en-IN')}/mo</span>` : ''}
      </div>
      <div style="font-size:10px;color:#5b6775;display:flex;gap:12px;align-items:center">
        <span><span style="display:inline-block;width:10px;height:10px;background:#85b7eb;opacity:0.85;vertical-align:middle"></span> Actual</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#d4a574;opacity:0.55;vertical-align:middle"></span> Forecast (mid)</span>
        <span><span style="display:inline-block;width:10px;height:10px;background:#d4a574;opacity:0.18;vertical-align:middle"></span> Range (low–high)</span>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;display:block">
      ${gridLines.join('')}
      ${barsHtml}
      ${trendLine}
      ${separator}
      ${yLabels.join('')}
      ${xLabels}
    </svg>
    ${forecastSummary}
    <div style="font-size:10px;color:#5b6775;margin-top:6px;font-style:italic">Forecast assumes recent trend continues. Doesn't account for marketing pushes, supply changes, or external events.</div>
  `;
}

const fmt = (v,d=2) => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtINR = v => '₹' + fmt(v,2);
const fmtINR0 = v => '₹' + fmt(Math.round(v),0);
function pickTier(t) { const tiers = state.cc_matrix?.tiers||[]; return tiers.find(x => x.max===null || t<=x.max) || tiers[tiers.length-1]; }

function computeRecon(rows, tolerance) {
  const minisAdd = state.cc_matrix?.minis_additional || 4;
  const inScope = rows.filter(r => Number(r.forecast)>0 || (r.actual!==null && r.actual!==undefined && r.actual!==''));
  const outOfScope = rows.filter(r => !inScope.includes(r));
  const missing = rows.filter(r => Number(r.forecast)>0 && (r.actual===null || r.actual===undefined || r.actual===''));
  const hasAny = inScope.some(r => r.actual!==null && r.actual!==undefined && r.actual!=='');
  const hasFull = missing.length===0;
  const hasAnyForecast = rows.some(r => Number(r.forecast)>0);
  const totalFC = rows.reduce((a,r) => a + (Number(r.forecast)||0), 0);
  const totalAct = hasAny ? rows.reduce((a,r) => a + (Number(r.actual)||0), 0) : null;
  const tierFC = pickTier(totalFC);
  const tierAct = totalAct!==null ? pickTier(totalAct) : null;
  const billedFC = rows.reduce((a,r) => a + (Number(r.forecast)||0) * (tierFC.rate + (r.mini?minisAdd:0)), 0);
  const shouldBe = totalAct!==null ? rows.reduce((a,r) => a + (Number(r.actual)||0) * (tierAct.rate + (r.mini?minisAdd:0)), 0) : null;
  const delta = shouldBe!==null ? billedFC - shouldBe : null;
  const variance = totalAct!==null && totalFC>0 ? ((totalAct-totalFC)/totalFC*100) : null;
  const tierShifted = tierAct && tierAct.rate !== tierFC.rate;
  const withinTol = variance!==null && Math.abs(variance)<=tolerance && !tierShifted;
  return { hasAny, hasFull, hasAnyForecast, missing, inScope, outOfScope, totalFC, totalAct, tierFC, tierAct, billedFC, shouldBe, delta, variance, tierShifted, withinTol };
}
function deriveSettlement(comp) {
  if (!comp.hasFull || !comp.hasAny) return null;
  if (comp.withinTol || Math.abs(comp.delta)<1) return { kind:'nil', amount:0 };
  if (comp.delta>0) return { kind:'cn', amount: comp.delta };
  return { kind:'invoice', amount: -comp.delta };
}

    } catch (e) { console.error('proposals load failed:', e); state.proposals = []; }
    await loadAllReconciliations();
    state.loaded = true;
  } catch (err) { console.error(err); alert("Load failed: " + err.message); }
}

async function loadAllReconciliations() {
  const snap = await getDocs(collection(db,'reconciliations'));
  state.allRecons = {};
  snap.docs.forEach(d => { state.allRecons[d.id] = { id:d.id, ...d.data() }; });
  const openCodes = Object.keys(state.allRecons).filter(c => state.allRecons[c].status==='open').sort();
  if (openCodes.length>0) state.currentMonthCode = openCodes[0];
  else {
    state.currentMonthCode = todayMC();
    if (!state.allRecons[state.currentMonthCode]) state.allRecons[state.currentMonthCode] = blankRecon(state.currentMonthCode);
  }
  if (!state.viewingMonthCode || !state.allRecons[state.viewingMonthCode]) state.viewingMonthCode = state.currentMonthCode;
  state.history = Object.values(state.allRecons).filter(r => r.status==='closed' || r.status==='superseded');
}

function monthStripCodes() {
  const codes = new Set();
  const closed = Object.keys(state.allRecons).filter(c => state.allRecons[c].status==='closed' || state.allRecons[c].status==='superseded').sort().slice(-2);
  closed.forEach(c => codes.add(c));
  codes.add(state.currentMonthCode);
  let n = nextMC(state.currentMonthCode);
  for (let i = 0; i < HORIZON_MONTHS - 1; i++) { codes.add(n); n = nextMC(n); }
  Object.keys(state.allRecons).forEach(c => { if (state.allRecons[c].status==='open' && c.localeCompare(state.currentMonthCode)>0) codes.add(c); });
  return [...codes].sort();
}

// Ensure a recon exists for a given month code (creates blank in memory if missing)
function ensureReconExists(monthCode) {
  if (!state.allRecons[monthCode]) state.allRecons[monthCode] = blankRecon(monthCode);
  return state.allRecons[monthCode];
}

// CHUNK 2 CHANGE: Save can now happen for current OR future open months
function scheduleReconSave() {
  const r = viewingRecon();
  if (!r) return;
  if (r.status !== 'open') return;  // closed months never save
  // Allow save for current month OR any future open month
  const isFutureOrCurrent = state.viewingMonthCode === state.currentMonthCode || state.viewingMonthCode.localeCompare(state.currentMonthCode) > 0;
  if (!isFutureOrCurrent) return;

  if (state.saveTimer) clearTimeout(state.saveTimer);
  state.saveStatus = 'saving'; updateSaveIndicator();
  state.saveTimer = setTimeout(async () => {
    try {
      await setDoc(doc(db,'reconciliations',state.viewingMonthCode), { ...state.allRecons[state.viewingMonthCode], updatedAt: new Date().toISOString(), updatedBy: state.userProfile.name });
      state.saveStatus = 'saved'; updateSaveIndicator();
      setTimeout(() => { state.saveStatus = 'idle'; updateSaveIndicator(); }, 2000);
    } catch (err) { console.error(err); state.saveStatus = 'idle'; updateSaveIndicator(); showToast("Save failed: " + err.message, true); }
  }, 1500);
}
function updateSaveIndicator() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  if (state.saveStatus==='saving') { el.textContent = 'Saving…'; el.className = 'save-indicator saving'; }
  else if (state.saveStatus==='saved') { el.textContent = '✓ Saved'; el.className = 'save-indicator saved'; }
  else { el.textContent = ''; el.className = 'save-indicator'; }
}
function showToast(msg, err) {
  state.toast = { msg, isError: !!err };
  renderToast();
  setTimeout(() => { state.toast = null; renderToast(); }, 6000);
}
function renderToast() {
  const el = document.getElementById('toast-container');
  if (!state.toast) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="toast ${state.toast.isError?'error':''}">${state.toast.msg}</div>`;
}

async function closeMonth() {
  const recon = state.allRecons[state.currentMonthCode];
  if (!recon || recon.status!=='open') { showToast("Current month not open.", true); return; }
  const comp = computeRecon(recon.rows, recon.tolerance_pct);
  if (!comp.hasAnyForecast) { showToast("No forecasts entered.", true); return; }
  if (!comp.hasFull) { showToast(comp.missing.length + " in-scope SKU(s) need actuals.", true); return; }
  try {
    const refNumber = await runTransaction(db, async tx => {
      // ===== ALL READS FIRST (Firestore requires reads before writes) =====
      const nmCode = nextMC(recon.monthCode);
      const nmDoc = await tx.get(doc(db,'reconciliations',nmCode));
      let shouldRoll = true;
      if (nmDoc.exists()) {
        const ex = nmDoc.data();
        if (ex.rows && ex.rows.some(r => Number(r.forecast)>0)) shouldRoll = false;
      }

      // ===== Build reference (purely a closed-month identifier, not a settlement number) =====
      const ref = 'CLOSED/' + recon.monthCode;

      // ===== ALL WRITES AFTER ALL READS =====
      // Build close payload defensively — never let undefined values into Firestore
      const closedDoc = {
        month: recon.month || monthCodeName(recon.monthCode),
        monthCode: recon.monthCode,
        status: 'closed',
        tolerance_pct: Number(recon.tolerance_pct) || 5,
        rows: recon.rows || [],
        createdAt: recon.createdAt || new Date().toISOString(),
        createdBy: recon.createdBy || state.userProfile.name,
        closedAt: new Date().toISOString(),
        closedBy: state.userProfile.name,
        closedByUid: state.currentUser.uid,
        refNumber: ref,
        totals: {
          forecast: Number(comp.totalFC) || 0,
          actual: comp.totalAct == null ? 0 : Number(comp.totalAct),
          tierFC: comp.tierFC ? Number(comp.tierFC.rate) || 0 : 0,
          tierAct: comp.tierAct ? Number(comp.tierAct.rate) || 0 : 0,
          variance: comp.variance == null ? 0 : Number(comp.variance),
          tierShifted: !!comp.tierShifted,
          inScopeCount: comp.inScope.length,
          outOfScopeCount: comp.outOfScope.length
        }
      };
      // Preserve rolledFrom if present (audit trail)
      if (recon.rolledFrom) closedDoc.rolledFrom = recon.rolledFrom;
      tx.set(doc(db,'reconciliations',recon.monthCode), closedDoc);
      tx.set(doc(db,'change_log','close_'+recon.monthCode+'_'+Date.now()), {
        ts: new Date().toISOString(), user: state.userProfile.name, uid: state.currentUser.uid, role: state.realRole,
        entity: 'Month Close', action: 'Closed ' + (recon.month || recon.monthCode), before: 'open', after: 'closed',
        reason: comp.tierShifted ? `Tier shifted from ₹${comp.tierFC.rate} to ₹${comp.tierAct.rate}/unit` : 'Volume within tier — no rate change',
        monthCode: recon.monthCode, variance_pct: Number(comp.variance) || 0
      });
      if (shouldRoll) {
        tx.set(doc(db,'reconciliations',nmCode), {
          month: monthCodeName(nmCode), monthCode: nmCode, status: 'open', tolerance_pct: recon.tolerance_pct,
          rows: state.skus.map(s => {
            const prev = recon.rows.find(r => r.sno===s.sno);
            const wasInScope = prev && (Number(prev.forecast)>0 || (prev.actual!==null && prev.actual!==undefined && prev.actual!==''));
            return { sno: s.sno, name: s.name, mini: isMini(s.name), forecast: wasInScope ? (Number(prev.actual)||0) : 0, actual: null };
          }),
          createdAt: new Date().toISOString(), createdBy: state.userProfile.name, rolledFrom: recon.monthCode
        });
      }
      return ref;
    });
    await loadAllReconciliations();
    state.viewingMonthCode = state.currentMonthCode;
    state.modal = null; renderModal();
    render();
    showToast(`Closed ${recon.month}.`);
  } catch (err) { console.error(err); showToast("Close failed: " + err.message, true); }
}

async function reopenMonth(mc) {
  const h = state.allRecons[mc];
  if (!h || h.status!=='closed') { showToast("Month not closed.", true); return; }
  if (daysSince(h.closedAt) > REOPEN_WINDOW_DAYS) { showToast("Beyond " + REOPEN_WINDOW_DAYS + "-day window.", true); return; }
  try {
    const batch = writeBatch(db);
    batch.set(doc(db,'reconciliations',mc), {
      month: h.month, monthCode: h.monthCode, status:'open', tolerance_pct: h.tolerance_pct, rows: h.rows,
      createdAt: h.createdAt, createdBy: h.createdBy,
      reopenedAt: new Date().toISOString(), reopenedBy: state.userProfile.name,
      previous_close: { refNumber: h.refNumber, closedAt: h.closedAt, closedBy: h.closedBy, settlement: h.settlement, totals: h.totals }
    });
    batch.set(doc(db,'change_log','reopen_'+mc+'_'+Date.now()), {
      ts: new Date().toISOString(), user: state.userProfile.name, uid: state.currentUser.uid, role: state.realRole,
      entity: 'Month Reopen', action: 'Reopened ' + h.month, before: 'closed · ' + h.refNumber, after: 'open',
      reason: 'Admin correction. Original ' + h.refNumber + ' superseded.', monthCode: mc
    });
    await batch.commit();
    await loadAllReconciliations();
    state.viewingMonthCode = mc;
    state.modal = null; renderModal();
    render();
    showToast(`${h.month} reopened.`);
  } catch (err) { console.error(err); showToast("Reopen failed: " + err.message, true); }
}

// CHUNK 2 NEW: Copy from previous month
function copyFromPrevious() {
  const recon = viewingRecon();
  if (!recon) return;
  const prevCode = prevMC(state.viewingMonthCode);
  const prev = state.allRecons[prevCode];
  if (!prev) {
    showToast("No previous month data exists for " + monthCodeName(prevCode) + ".", true);
    return;
  }
  // For each row in current, copy forecast from prev (use prev's actual if closed, else prev's forecast)
  const isPrevClosed = prev.status === 'closed';
  let copied = 0;
  recon.rows.forEach(r => {
    const prevRow = prev.rows.find(p => p.sno === r.sno);
    if (!prevRow) return;
    const sourceVal = isPrevClosed ? Number(prevRow.actual) || 0 : Number(prevRow.forecast) || 0;
    if (sourceVal > 0) copied++;
    r.forecast = sourceVal;
  });
  state.allRecons[state.viewingMonthCode] = recon;
  renderReconFull();
  scheduleReconSave();
  showToast(`Copied ${copied} forecast value(s) from ${prev.month}'s ${isPrevClosed ? 'actuals' : 'forecasts'}.`);
}

      <td class="left" style="color:#e8ecf0;max-width:240px">${p.target_label||'—'}</td>
      <td class="left" style="color:#5b6775;font-size:11px;font-family:'SF Mono',Menlo,monospace">${p.before_summary||'—'}</td>
      <td class="left" style="color:#7fb069;font-size:11px;font-family:'SF Mono',Menlo,monospace">${p.after_summary||'—'}</td>
      <td class="left" style="color:#8a95a3;font-size:12px;max-width:280px">${p.reason||'—'}</td>
      <td class="left"><span class="pill" style="background:${statusColor(p.status)}22;color:${statusColor(p.status)};margin-bottom:4px;display:inline-block">${(p.status||'').toUpperCase()}</span><br><span style="font-size:11px">${decisionInfo}</span></td>
    </tr>${decisionReasonRow}`;
  }).join('');

  return head + `<div class="table-wrap"><table>
    <thead><tr>
      <th class="left" style="width:90px">Submitted</th>
      <th class="left" style="width:100px">Type</th>
      <th class="left">Target</th>
      <th class="left">Before</th>
      <th class="left">After</th>
      <th class="left">Your reason</th>
      <th class="left" style="width:160px">Status</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div class="footer-note">Pending proposals are awaiting admin review. Rejected proposals can be resubmitted via the original Edit/Propose flow with revised rationale.</div>`;
}

// === SCENARIO ENGINE ===
// For a given RM (by id) and delta % change, compute the impact on every SKU.
// Returns: { changedRm, scenarioRate, currentRate, perSku: [...{sno, name, status, currentTotal, scenarioTotal, delta, deltaPct, hardcoded, unaffected, monthlyVol, monthlyDelta, quarterlyDelta}], summary: {affected, avgPct, maxPct, maxSku, totalDelta, totalMonthlyDelta, totalQuarterlyDelta, skusWithVol} }
function runScenario(rmId, deltaPct) {
  const rm = state.rms.find(r => r.id === rmId);
  if (!rm) return null;
  const s = state.settings || {};
  const currentRate = Number(rm.rate) || 0;
  const scenarioRate = currentRate * (1 + deltaPct / 100);

  // Build current and scenario rate lookups
  const currentLookup = {};
  state.rms.forEach(r => { if (r.name) currentLookup[String(r.name).trim().toLowerCase()] = Number(r.rate) || 0; });
  const scenLookup = { ...currentLookup };
  scenLookup[String(rm.name).trim().toLowerCase()] = scenarioRate;

  // Helper: compute rm_cost_kg from formulation × given rate lookup
  const rmCostFromFormulation = (formulation, lookup) => {
    let cost = 0;
    formulation.ingredients.forEach(ing => {
      const trade = String(ing.trade || '').trim().toLowerCase();
      const rate = lookup[trade] != null ? lookup[trade] : (ing.hardcoded_rate != null ? Number(ing.hardcoded_rate) : 0);
      cost += (Number(ing.qty_pct) / 100) * rate;
    });
    return cost;
  };

  // Helper: average monthly volume from recent 6 months (or however many available)
  const avgMonthlyVolume = (sno) => {
    const series = getHistorySeries(sno);
    if (series.length === 0) return null;
    const recent = series.slice(-6); // last 6 months or fewer
    const total = recent.reduce((a, b) => a + Number(b.units || 0), 0);
    return Math.round(total / recent.length);
  };

  // For each SKU: compute current and scenario totals BOTH from formulation
  // This gives apples-to-apples comparison. The SKU's stored rm_cost_kg_base
  // is a cached snapshot and may differ from formulation-derived cost.
  const perSku = state.skus.map(sku => {
    const formulation = state.formulations[String(sku.sno)] || state.formulations[sku.sno];
    const isInactive = sku.status === 'inactive';
    const isKorean = sku.sno >= 18 && sku.sno <= 27;
    const monthlyVol = avgMonthlyVolume(sku.sno);

    // Korean SKUs: hardcoded rm_cost_kg_base, no formulation — flag as unmodeled
    if (isKorean || !formulation || !formulation.ingredients || formulation.ingredients.length === 0) {
      const storedCalc = calcSKU(sku, s);
      return {
        sno: sku.sno, name: sku.name, status: sku.status || 'active', isInactive,
        currentTotal: storedCalc.exf, scenarioTotal: storedCalc.exf, delta: 0, deltaPct: 0,
        hardcoded: isKorean, unaffected: !isKorean,
        usesThisRm: false,
        monthlyVol, monthlyDelta: 0, quarterlyDelta: 0
      };
    }

    // Check if this SKU's formulation actually uses the changed RM
    const targetRmName = String(rm.name).trim().toLowerCase();
    const usesThisRm = formulation.ingredients.some(ing => String(ing.trade||'').trim().toLowerCase() === targetRmName);

    if (!usesThisRm) {
      const storedCalc = calcSKU(sku, s);
      return {
        sno: sku.sno, name: sku.name, status: sku.status || 'active', isInactive,
        currentTotal: storedCalc.exf, scenarioTotal: storedCalc.exf, delta: 0, deltaPct: 0,
        hardcoded: false, unaffected: true, usesThisRm: false,
        monthlyVol, monthlyDelta: 0, quarterlyDelta: 0
      };
    }

    // BOTH current and scenario computed from formulation × respective rates
    const currentRmKg = rmCostFromFormulation(formulation, currentLookup);
    const scenRmKg = rmCostFromFormulation(formulation, scenLookup);

    const currentSku = { ...sku, rm_cost_kg_base: currentRmKg };
    const scenSku = { ...sku, rm_cost_kg_base: scenRmKg };
    const currentCalc = calcSKU(currentSku, s);
    const scenCalc = calcSKU(scenSku, s);
    const currentTotal = currentCalc.exf;
    const scenarioTotal = scenCalc.exf;
    const delta = scenarioTotal - currentTotal;
    const deltaPct = currentTotal > 0 ? (delta / currentTotal) * 100 : 0;
    const monthlyDelta = monthlyVol != null ? delta * monthlyVol : null;
    const quarterlyDelta = monthlyDelta != null ? monthlyDelta * 3 : null;

    return {
      sno: sku.sno, name: sku.name, status: sku.status || 'active', isInactive,
      currentTotal, scenarioTotal, delta, deltaPct,
      hardcoded: false, unaffected: false, usesThisRm: true,
      monthlyVol, monthlyDelta, quarterlyDelta
    };
  });

  // Summary stats — only across SKUs that are actually affected (uses the RM and active)
  const affectedRows = perSku.filter(r => r.usesThisRm && !r.isInactive);
  const affected = affectedRows.length;
  const avgPct = affected > 0 ? affectedRows.reduce((a,b) => a + b.deltaPct, 0) / affected : 0;
  let maxRow = null;
  affectedRows.forEach(r => { if (!maxRow || Math.abs(r.deltaPct) > Math.abs(maxRow.deltaPct)) maxRow = r; });
  const totalDelta = affectedRows.reduce((a,b) => a + b.delta, 0);

  // Volume-weighted totals (only sums where monthlyVol is available)
  const rowsWithVol = affectedRows.filter(r => r.monthlyVol != null);
  const skusWithVol = rowsWithVol.length;
  const totalMonthlyDelta = rowsWithVol.reduce((a,b) => a + b.monthlyDelta, 0);
  const totalQuarterlyDelta = totalMonthlyDelta * 3;

  return {
    changedRm: rm,
    currentRate, scenarioRate,
    deltaPct,
    perSku,
    summary: { affected, avgPct, maxPct: maxRow?.deltaPct || 0, maxSku: maxRow, totalDelta, totalMonthlyDelta, totalQuarterlyDelta, skusWithVol }
  };
}

function renderScenarios() {
  const scen = state.scenario;
  const presets = [-20, -10, -5, 5, 10, 15, 20];

  // RM dropdown options — sorted by name
  const rmOpts = [...state.rms].sort((a,b) => (a.name||'').localeCompare(b.name||''))
    .map(r => `<option value="${r.id}" ${scen.rmId===r.id?'selected':''}>${r.name} · ₹${fmt(r.rate, 0)}/kg</option>`).join('');

  const presetBtns = presets.map(p => {
    const active = scen.deltaPct === p;
    const sign = p > 0 ? '+' : '';
    const color = p > 0 ? '#d4664e' : '#7fb069';
    return `<button class="btn ${active?'btn-primary':''}" style="padding:6px 12px;font-size:12px;color:${active?'':color}" onclick="setScenarioDelta(${p})">${sign}${p}%</button>`;
  }).join('');

  const customActive = scen.customPct !== '' && Number(scen.customPct) === scen.deltaPct;

  // Selected RM info
  let rmInfo = '';
  if (scen.rmId) {
    const rm = state.rms.find(r => r.id === scen.rmId);
    if (rm && scen.deltaPct != null) {
      const newRate = Number(rm.rate) * (1 + scen.deltaPct / 100);
      const sign = scen.deltaPct > 0 ? '+' : '';
      rmInfo = `<div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:14px 18px;margin:14px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <div style="color:#8a95a3;font-size:11px;text-transform:uppercase;letter-spacing:0.1em">Scenario rate</div>
          <div style="color:#e8ecf0;font-size:18px;font-weight:600;margin-top:4px">${rm.name}</div>
          <div style="color:#5b6775;font-size:12px;margin-top:2px">₹${fmt(rm.rate,0)} <span style="color:${scen.deltaPct>0?'#d4664e':'#7fb069'}">${sign}${scen.deltaPct}%</span> → <span style="color:#d4a574;font-weight:600">₹${fmt(newRate,0)}/kg</span></div>
        </div>
        <button class="btn btn-primary" onclick="executeScenario()" style="padding:8px 18px">Run scenario</button>
      </div>`;
    }
  }

  // Build the interactive controls
  const controls = `
    <div class="section-header">
      <div>
        <div class="section-title">Scenarios</div>
        <div class="section-sub">Stress-test cost impact of RM rate changes · internal use, not visible to Pilgrim</div>
      </div>
    </div>
    <div style="background:#161e26;border:1px solid #1f2a35;border-radius:6px;padding:18px;margin-bottom:18px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:end">
        <div>
          <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Pick a raw material</label>
          <select id="scen-rm" onchange="setScenarioRm(this.value)" style="width:100%;background:#0a0e13;border:1px solid #1f2a35;color:#e8ecf0;padding:10px 12px;border-radius:4px;font-family:inherit;font-size:13px">
            <option value="">— Select an RM —</option>
            ${rmOpts}
          </select>
        </div>
        <div>
          <label style="display:block;font-size:11px;color:#8a95a3;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">Apply % change</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            ${presetBtns}
            <input type="number" id="scen-custom" placeholder="Custom" value="${scen.customPct||''}" oninput="setScenarioCustom(this.value)" style="width:90px;background:#0a0e13;border:1px solid ${customActive?'#d4a574':'#1f2a35'};color:#e8ecf0;padding:6px 10px;border-radius:4px;font-family:inherit;font-size:12px;margin-left:6px">
            <span style="color:#5b6775;font-size:12px">%</span>
          </div>
        </div>
      </div>
      ${rmInfo}
    </div>
  `;

  // Result section
  let resultSection = '';
  if (scen.result) {
    const r = scen.result;
    const sum = r.summary;
    const sign = r.deltaPct > 0 ? '+' : '';

    // Summary stats
    // Format helper for large rupee amounts (lakhs/crores)
    const fmtLargeINR = (v) => {
      const a = Math.abs(v);
      const sign = v < 0 ? '-' : (v > 0 ? '+' : '');
      if (a >= 10000000) return sign + '₹' + fmt(a/10000000, 2) + ' Cr';
      if (a >= 100000) return sign + '₹' + fmt(a/100000, 2) + ' L';
      if (a >= 1000) return sign + '₹' + fmt(a/1000, 1) + 'K';
      return sign + '₹' + fmt(a, 0);
    };

    const hasVolData = sum.skusWithVol > 0;
    const quarterlyCard = hasVolData
      ? `<div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Quarterly ₹ exposure</div>
          <div style="color:${sum.totalQuarterlyDelta>0?'#d4664e':sum.totalQuarterlyDelta<0?'#7fb069':'#e8ecf0'};font-size:22px;font-weight:600;margin-top:4px">${fmtLargeINR(sum.totalQuarterlyDelta)}</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">at last 6mo avg vol · ${sum.skusWithVol} of ${sum.affected} SKUs</div>
        </div>`
      : `<div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Quarterly ₹ exposure</div>
          <div style="color:#5b6775;font-size:14px;font-weight:600;margin-top:4px">No vol data</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">no historical demand for affected SKUs</div>
        </div>`;

    const summaryStats = `
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px">
        <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">SKUs affected</div>
          <div style="color:#e8ecf0;font-size:22px;font-weight:600;margin-top:4px">${sum.affected}</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">of ${state.skus.filter(s => s.status !== 'inactive').length} active</div>
        </div>
        <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Avg COGS impact</div>
          <div style="color:${sum.avgPct>0?'#d4664e':sum.avgPct<0?'#7fb069':'#e8ecf0'};font-size:22px;font-weight:600;margin-top:4px">${sum.avgPct>0?'+':''}${fmt(sum.avgPct,2)}%</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">across affected SKUs</div>
        </div>
        <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Max impact</div>
          <div style="color:${sum.maxPct>0?'#d4664e':sum.maxPct<0?'#7fb069':'#e8ecf0'};font-size:22px;font-weight:600;margin-top:4px">${sum.maxPct>0?'+':''}${fmt(sum.maxPct,2)}%</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">${sum.maxSku ? 'SKU '+sum.maxSku.sno+': '+(sum.maxSku.name||'').substring(0,18) : '—'}</div>
        </div>
        <div style="background:#0a0e13;border:1px solid #1f2a35;border-radius:4px;padding:12px 14px">
          <div style="color:#5b6775;font-size:10px;text-transform:uppercase;letter-spacing:0.1em">Δ/unit summed</div>
          <div style="color:${sum.totalDelta>0?'#d4664e':sum.totalDelta<0?'#7fb069':'#e8ecf0'};font-size:22px;font-weight:600;margin-top:4px">${sum.totalDelta>0?'+':''}₹${fmt(sum.totalDelta,2)}</div>
          <div style="color:#5b6775;font-size:10px;margin-top:2px">across SKUs</div>
        </div>
        ${quarterlyCard}
      </div>
    `;

    // Sort: affected by impact desc, then unaffected, then hardcoded
    const sorted = [...r.perSku].sort((a,b) => {
      if (a.usesThisRm !== b.usesThisRm) return b.usesThisRm - a.usesThisRm;
      if (a.unaffected !== b.unaffected) return a.unaffected - b.unaffected;
      if (a.hardcoded !== b.hardcoded) return a.hardcoded - b.hardcoded;
      return Math.abs(b.deltaPct) - Math.abs(a.deltaPct);
    });

    const tableRows = sorted.map(row => {
      const inactiveStyle = row.isInactive ? 'opacity:0.5' : '';
      let statusCell = '';
      if (row.hardcoded) statusCell = `<span class="pill" style="background:#1f2a35;color:#5b6775;font-size:9px">HARDCODED · NOT MODELED</span>`;
      else if (row.unaffected) statusCell = `<span style="color:#5b6775;font-size:11px">does not use this RM</span>`;
      else if (row.isInactive) statusCell = `<span class="pill" style="background:#5b677522;color:#5b6775;font-size:9px">INACTIVE</span>`;
      else statusCell = '';

      const dColor = row.delta > 0 ? '#d4664e' : row.delta < 0 ? '#7fb069' : '#5b6775';
      const dSign = row.delta > 0 ? '+' : '';

      // Volume cell
      const volCell = row.monthlyVol != null
        ? `<td style="color:#8a95a3">${row.monthlyVol.toLocaleString('en-IN')}</td>`
        : `<td style="color:#5b6775;font-size:10px">no data</td>`;

      // Quarterly delta cell
      const qDelta = row.quarterlyDelta;
      const qSign = qDelta > 0 ? '+' : '';
      const qCell = (row.usesThisRm && !row.hardcoded && qDelta != null && qDelta !== 0)
        ? `<td style="color:${dColor};font-weight:600">${qSign}₹${fmt(qDelta, 0)}</td>`
        : `<td style="color:#5b6775">—</td>`;

      const valueCells = (row.usesThisRm && !row.hardcoded)
        ? `<td style="color:#e8ecf0">₹${fmt(row.currentTotal,2)}</td>
           <td style="color:#e8ecf0;font-weight:600">₹${fmt(row.scenarioTotal,2)}</td>
           <td style="color:${dColor};font-weight:600">${dSign}₹${fmt(row.delta,2)}</td>
           <td style="color:${dColor};font-weight:600">${dSign}${fmt(row.deltaPct,2)}%</td>`
        : `<td style="color:#5b6775">₹${fmt(row.currentTotal,2)}</td>
           <td style="color:#5b6775">—</td>
           <td style="color:#5b6775">—</td>
           <td style="color:#5b6775">—</td>`;

      return `<tr style="${inactiveStyle}">
        <td style="color:#5b6775">${row.sno}</td>
        <td class="left" style="color:#e8ecf0">${(row.name||'').substring(0,40)}</td>
        ${valueCells}
        ${volCell}
        ${qCell}
        <td class="left">${statusCell}</td>
      </tr>`;
    }).join('');

    resultSection = `
      <div style="margin-top:24px">
        <h3 style="font-size:13px;text-transform:uppercase;letter-spacing:0.1em;color:#8a95a3;margin-bottom:12px">Impact</h3>
        ${summaryStats}
        <div class="table-wrap"><table>
          <thead><tr>
            <th style="width:32px">#</th>
            <th class="left">SKU</th>
            <th>Current ex-fact</th>
            <th>Scenario ex-fact</th>
            <th>Δ ₹/unit</th>
            <th>Δ %</th>
            <th title="Avg monthly units from last 6 months of historical demand">Avg vol/mo</th>
            <th title="Δ × monthly volume × 3 months">Quarterly Δ</th>
            <th class="left" style="width:160px">Note</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table></div>
        <div class="footer-note">Scenario uses formulation × rate for the new RM cost per kg, then applies your full cost cascade (freight, margin, wastage, utilities, GST). PM costs and Fixed CC are held constant. Volume = avg of last 6 months from historical demand. Quarterly Δ = Δ/unit × avg monthly volume × 3. Korean SKUs (18-27) have hardcoded rates and are not modeled here.</div>
      </div>
    `;
  } else {
    resultSection = `
      <div class="placeholder" style="margin-top:18px">
        <h3>Pick an RM and a % change to see impact</h3>
        <p style="margin-top:8px;line-height:1.7">Choose any raw material from your chart, apply a percentage change (preset or custom), and click "Run scenario" to see how it cascades through every SKU's cost.<br><br>This is your stress-test sandbox — useful for "what if Argan Oil moves up 15%?" or "what if BTMS drops 5%?" conversations.</p>
      </div>
    `;
  }

  return controls + resultSection;
}

function renderDashboard() {
  const isS = effectiveRole()==='viewer-pilgrim';
  const s = state.settings || {};
  const live = useLiveCalc();
  const rows = state.skus.map(sku => {
    let effectiveSku = sku;
    let liveInfo = null;
    if (live) {
      liveInfo = liveRMCost(sku);
      effectiveSku = { ...sku, rm_cost_kg_base: liveInfo.cost };
    }
    return { ...effectiveSku, calc: calcSKU(effectiveSku, s), _liveInfo: liveInfo, _cachedRMCost: sku.rm_cost_kg_base };
  });
  const q = state.searchQuery.toLowerCase();
  const filt = q ? rows.filter(r => (r.name||'').toLowerCase().includes(q)) : rows;
  const avgRM = filt.length ? filt.reduce((a,r) => a + (r.calc.rm_unit/r.calc.total*100), 0) / filt.length : 0;
  const avgPM = filt.length ? filt.reduce((a,r) => a + (r.calc.pm_total/r.calc.total*100), 0) / filt.length : 0;
  const skuRows = filt.map(r => {
    const ex = state.expandedSku===r.sno;
    const li = r._liveInfo;
    const isIncomplete = li && li.unresolved && li.unresolved.length > 0;
    const incompleteTooltip = isIncomplete ? li.unresolved.join('\n').replace(/"/g,'&quot;') : '';
    const warnTag = isIncomplete ? ` <span class="pill" style="background:#3d2a0a;color:#e6b447;font-size:9px;cursor:help" title="Missing RMs:&#10;${incompleteTooltip}">⚠ ${li.unresolved.length}</span>` : '';
    const isInactive = r.status === 'inactive';
    const inactiveTag = isInactive ? ` <span class="pill" style="background:#1f0a0a;color:#d4664e;font-size:9px;letter-spacing:0.05em">INACTIVE</span>` : '';
    const rowStyle = isInactive ? 'opacity:0.5' : '';
    return `<tr class="dash-row ${ex?'expanded':''}" style="${rowStyle}" onclick="toggleExpand(${r.sno})">
      <td style="color:#5b6775">${r.sno}</td><td class="left" style="color:#e8ecf0">${r.name}${warnTag}${inactiveTag}</td><td style="color:#8a95a3">${r.size}${r.unit}</td>
      ${!isS?`<td>${fmt(r.rm_cost_kg_base)}</td><td style="color:#8a95a3">${fmt(r.calc.rm_w_f-r.rm_cost_kg_base)}</td><td style="color:#8a95a3">${fmt(r.calc.rm_margin)}</td><td style="color:#8a95a3">${fmt(r.calc.rm_wst)}</td>`:''}

}

// Helper: count SKUs whose formulations reference a given RM trade name
function countAffectedSKUs(tradeName) {
  if (!tradeName) return { count: 0, skus: [] };
  const target = String(tradeName).trim().toLowerCase();
  const affected = [];
  Object.values(state.formulations).forEach(f => {
    if (!f.ingredients) return;
    const matches = f.ingredients.some(ing => String(ing.trade||'').trim().toLowerCase() === target);
    if (matches) affected.push({ sno: f.sno, name: f.name });
  });
  return { count: affected.length, skus: affected };
}

function renderReconFull() {
  // CHUNK 2: ensure recon exists for any month we navigate to (creates blank in memory if needed)
  if (state.viewingMonthCode) ensureReconExists(state.viewingMonthCode);
  const recon = viewingRecon();
  if (!recon) { document.getElementById('main').innerHTML = '<div class="placeholder"><h3>No data</h3></div>'; return; }

  const role = effectiveRole();
  const isAdmin = state.realRole==='admin' && role==='admin';
  const canE = canEdit(); // admin or editor — both can do recon data entry
  const isViewingCurrent = state.viewingMonthCode === state.currentMonthCode;
  const isViewingFuture = state.viewingMonthCode.localeCompare(state.currentMonthCode) > 0;
  const isViewingClosed = recon.status==='closed' || recon.status==='superseded';

  // CHUNK 2 RULES (updated):
  // - Closed/superseded → all read-only (everyone)
  // - Forecast: editable by admin OR editor on any open month
  // - Actual: editable by admin OR editor, but only for current month
  // - Close month: admin ONLY (commits settlement, locks data)
  // - Tolerance settings: admin ONLY (strategic, affects every dispute)
  const canEditForecast = canE && !isViewingClosed;
  const canEditActual = canE && isViewingCurrent && !isViewingClosed;
  const canClose = isAdmin && isViewingCurrent && !isViewingClosed; // admin-only commit
  const canEditTolerance = isAdmin && !isViewingClosed; // admin-only setting
  const canCopyFromPrevious = canEditForecast;

  const stripCodes = monthStripCodes();
  const stripCards = stripCodes.map(c => {
    const r = state.allRecons[c];
    const isClosed = r && (r.status==='closed' || r.status==='superseded');
    const isCur = c === state.currentMonthCode;
    const isFut = c.localeCompare(state.currentMonthCode) > 0;
    const isAct = c === state.viewingMonthCode;
    const cls = `month-card ${isAct?'active':''} ${isClosed?'closed':isFut?'future':''}`;
    let status = '', detail = '';
    if (isClosed) { status = r.status==='superseded'?'Superseded':'Closed'; detail = r.refNumber || ''; }
    else if (isCur) { const t = r ? r.rows.reduce((a,x) => a + (Number(x.forecast)||0), 0) : 0; status = '★ Current'; detail = t>0 ? fmt(t,0)+' fc' : 'no forecast'; }
    else { const t = r ? r.rows.reduce((a,x) => a + (Number(x.forecast)||0), 0) : 0; status = 'Future'; detail = t>0 ? fmt(t,0)+' fc' : 'empty'; }
    return `<button class="${cls}" onclick="setViewingMonth('${c}')"><div class="month-card-label">${monthCodeShort(c)}</div><div class="month-card-status">${status}</div><div class="month-card-detail">${detail}</div></button>`;
  }).join('');

  const comp = computeRecon(recon.rows, recon.tolerance_pct);

  let banner = '';
  if (isViewingClosed) {
    const totals = recon.totals || {};
    const tierMsg = totals.tierShifted
      ? ` · Tier shifted ₹${totals.tierFC} → ₹${totals.tierAct}/unit`
      : (totals.tierFC ? ` · Tier ₹${totals.tierFC}/unit (unchanged)` : '');
    banner = `<div class="closed-banner"><strong>Month closed</strong> ${recon.closedAt ? 'on ' + new Date(recon.closedAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}) + ' by ' + recon.closedBy : ''}.${tierMsg}</div>`;
  } else if (isViewingFuture) {
    // CHUNK 2: future month is now editable for forecasts
    banner = `<div class="future-banner"><strong>Future month — forecast only.</strong> You're viewing ${recon.month}. Enter Pilgrim's projected forecasts here. Actuals are locked until this becomes the current month. Closing happens chronologically — close ${monthCodeName(state.currentMonthCode)} first.</div>`;
  } else if (!comp.hasAnyForecast) {
    banner = `<div class="banner banner-info"><strong>Forecast stage.</strong> Enter forecasts for SKUs that will ship.</div>`;
  } else if (!comp.hasAny) {
    banner = `<div class="banner banner-info"><strong>${fmt(comp.totalFC,0)} units across ${comp.inScope.length} SKUs.</strong> Tier: ₹${comp.tierFC.rate}/unit.</div>`;
  } else if (!comp.hasFull) {
    banner = `<div class="banner banner-warn"><strong>Partial actuals.</strong> ${comp.missing.length} blank.</div>`;
  } else if (!comp.tierShifted) {
    banner = `<div class="banner banner-good"><strong>Tier unchanged at ₹${comp.tierAct.rate}/unit.</strong> Volume variance ${comp.variance>0?'+':''}${comp.variance.toFixed(1)}% — same tier slab applies.</div>`;
  } else if (comp.tierAct.rate < comp.tierFC.rate) {
    banner = `<div class="banner banner-good"><strong>Tier shifted down ₹${comp.tierFC.rate} → ₹${comp.tierAct.rate}/unit.</strong> Volume +${comp.variance.toFixed(1)}% pushed into a higher slab — per-unit CC is lower.</div>`;
  } else {
    banner = `<div class="banner banner-warn"><strong>Tier shifted up ₹${comp.tierFC.rate} → ₹${comp.tierAct.rate}/unit.</strong> Volume ${comp.variance.toFixed(1)}% dropped to a lower slab — per-unit CC is higher.</div>`;
  }

  // Tier shift impact (purely informational — what the rate change means in rupees)
  const tierShiftImpact = (comp.tierShifted && comp.totalAct)
    ? (comp.tierAct.rate - comp.tierFC.rate) * comp.totalAct
    : 0;

  const stats = `<div class="stats-row">
    <div class="stat"><div class="stat-label">Forecast units</div><div class="stat-value">${fmt(comp.totalFC,0)}</div><div class="stat-sub">${comp.inScope.length} in scope · ₹${comp.tierFC.rate}/unit</div></div>
    <div class="stat"><div class="stat-label">Actual units</div><div class="stat-value">${comp.totalAct===null?'—':fmt(comp.totalAct,0)}</div><div class="stat-sub">${comp.tierAct?'₹'+comp.tierAct.rate+'/unit':isViewingFuture?'future':'pending'}</div></div>
    <div class="stat"><div class="stat-label">Volume variance</div><div class="stat-value" style="color:${comp.variance===null?'#e8ecf0':'#e8ecf0'}">${comp.variance===null?'—':(comp.variance>0?'+':'')+comp.variance.toFixed(1)+'%'}</div><div class="stat-sub">informational</div></div>
    <div class="stat"><div class="stat-label">Tier impact</div><div class="stat-value" style="color:${!comp.tierShifted?'#5b6775':tierShiftImpact<0?'#7fb069':'#e6b447'}">${!comp.tierShifted?'No shift':(tierShiftImpact<0?'-':'+')+'₹'+fmt(Math.abs(tierShiftImpact),0)}</div><div class="stat-sub">${!comp.tierShifted?'same tier':'CC rate × actual units'}</div></div>
  </div>`;

  // CHUNK 2: controls vary by current vs future
  let controls = '';
  if (canEditForecast) {
    const monthClass = isViewingFuture ? 'future' : '';
    const monthSuffix = isViewingFuture ? ' · FUTURE' : ' · CURRENT';
    controls = `<div class="control-bar">
      <span class="month-display ${monthClass}">${recon.month}${monthSuffix}</span>
      <label class="filter-toggle"><input type="checkbox" ${state.hideOutOfScope?'checked':''} onchange="toggleHideOutOfScope()">Hide out-of-scope</label>
      ${canEditActual ? `<label class="sort-toggle"><input type="checkbox" ${state.sortByAccuracy?'checked':''} onchange="toggleSort()">Sort by accuracy</label>` : ''}
      <span id="save-indicator" class="save-indicator"></span>
      <div class="spacer"></div>
      ${canCopyFromPrevious ? `<button class="btn" onclick="copyFromPrev()" title="Copy forecasts from ${monthCodeName(prevMC(state.viewingMonthCode))}">Copy from previous</button>` : ''}
      ${canEditActual ? `<button class="btn" onclick="simulateScenario('mixed')">Demo: mixed</button><button class="btn" onclick="simulateScenario('shortfall')">Demo: shortfall</button><button class="btn" onclick="resetActuals()">Clear actuals</button>` : ''}
      ${canClose ? `<button class="btn btn-primary" id="close-month-btn" ${comp.hasFull && comp.hasAnyForecast && comp.hasAny ? '' : 'disabled'} onclick="openCloseModal()">Close ${recon.month}</button>` : ''}
    </div>`;
  } else if (isViewingClosed && isAdmin) {
    const days = recon.closedAt ? daysSince(recon.closedAt) : 999;
    const canRe = days<=REOPEN_WINDOW_DAYS && recon.status==='closed';
    controls = `<div class="control-bar"><span class="month-display closed">${recon.month} · ${recon.status==='superseded'?'SUPERSEDED':'CLOSED'}</span><div class="spacer"></div>${canRe?`<button class="btn btn-danger" onclick="openReopenModal('${state.viewingMonthCode}')">Reopen</button>`:`<span style="font-size:11px;color:#5b6775">${recon.status==='superseded'?'Superseded':'Locked · '+days+'d of '+REOPEN_WINDOW_DAYS}</span>`}</div>`;
  } else {
    controls = `<div class="control-bar"><span class="month-display ${isViewingClosed?'closed':isViewingFuture?'future':''}">${recon.month}</span><div class="spacer"></div><span style="font-size:11px;color:#5b6775">Read-only</span></div>`;
  }

  let footerNote = '';
  if (isViewingFuture && canEditForecast) {
    footerNote = `<strong>Future month tip:</strong> Use <em>Copy from previous</em> to seed forecasts from ${monthCodeName(prevMC(state.viewingMonthCode))}, then edit individual SKUs to reflect Pilgrim's revisions. Forecasts here save automatically — closing ${monthCodeName(state.currentMonthCode)} will <em>not</em> overwrite anything you've already entered here.`;
  } else if (isViewingCurrent) {
    footerNote = `<strong>Scope rule:</strong> Forecast = 0 means SKU is out of scope. <strong>Closing</strong> locks the month, archives it to history, and rolls actuals forward to next month as starting forecasts (if empty). Pre-filled future months are preserved. CN/DN settlements are handled separately in your accounting system.`;
  } else if (isViewingClosed) {
    footerNote = `Within ${REOPEN_WINDOW_DAYS} days of close, admin can reopen. After that, adjustments require a future-month entry.`;
  }

  document.getElementById('main').innerHTML = `<div class="section-header"><div><div class="section-title">Volume Reconciliation</div><div class="section-sub">Rolling ${HORIZON_MONTHS}-month horizon · click any month</div></div></div>
    <div class="month-strip">${stripCards}</div>
    ${banner}${stats}${controls}
    <div id="recon-table-wrap"></div>
    ${footerNote ? `<div class="footer-note">${footerNote}</div>` : ''}`;

  refreshReconTable(canEditForecast, canEditActual);
}

function refreshReconTable(canEditFc, canEditAct) {
  const recon = viewingRecon();
  if (!recon) return;
  const comp = computeRecon(recon.rows, recon.tolerance_pct);
  const minisAdd = state.cc_matrix?.minis_additional || 4;
  const indexed = recon.rows.map((r,i) => ({r,i}));
  let visible = indexed;
  if (state.hideOutOfScope) visible = visible.filter(({r}) => Number(r.forecast)>0 || (r.actual!==null && r.actual!==undefined && r.actual!==''));
  if (state.sortByAccuracy && comp.hasAny) visible = [...visible].sort((a,b) => {
    const aA = a.r.actual!==null && a.r.actual!=='' && a.r.forecast>0 ? Math.abs(Number(a.r.actual)/Number(a.r.forecast)*100-100) : -1;
    const bA = b.r.actual!==null && b.r.actual!=='' && b.r.forecast>0 ? Math.abs(Number(b.r.actual)/Number(b.r.forecast)*100-100) : -1;
    return bA - aA;
  });

  const skuRows = visible.map(({r,i}) => {
    const oos = Number(r.forecast)===0 && (r.actual===null||r.actual===undefined||r.actual==='');
    const fcR = comp.tierFC.rate + (r.mini?minisAdd:0);
    const aR = comp.tierAct ? comp.tierAct.rate + (r.mini?minisAdd:0) : null;
    const fcA = (Number(r.forecast)||0) * fcR;
    const hA = r.actual!==null && r.actual!==undefined && r.actual!=='';
    const aA = hA ? Number(r.actual) * aR : null;
    const acc = hA && r.forecast>0 ? Number(r.actual)/Number(r.forecast)*100 : null;
    const aC = acc===null ? '' : Math.abs(acc-100)<=recon.tolerance_pct ? 'acc-good' : Math.abs(acc-100)<=recon.tolerance_pct*3 ? 'acc-warn' : 'acc-bad';
    const miss = !hA && Number(r.forecast)>0;
    return `<tr class="recon-row ${oos?'out-of-scope':''}" data-row-index="${i}">
      <td style="color:#5b6775">${r.sno}</td>
      <td class="left">${r.name}${r.mini?' <span class="pill pill-mini">MINI</span>':''}${oos?' <span class="pill pill-out-of-scope">OUT OF SCOPE</span>':''}</td>
      <td><input type="number" class="vol-input forecast-input" value="${r.forecast||''}" data-row="${i}" placeholder="0" ${canEditFc?'':'readonly'}></td>

      <td><input type="number" class="vol-input actual-input ${miss?'missing':''}" value="${hA?r.actual:''}" placeholder="${miss?'REQUIRED':'—'}" data-row="${i}" ${canEditAct?'':'readonly'}></td>

  }).join('');

  const el = document.getElementById('recon-table-wrap');
  if (!el) return;

  if (canEditFc) el.querySelectorAll('.forecast-input').forEach(inp => {

  });
  if (canEditAct) el.querySelectorAll('.actual-input').forEach(inp => {

}

function renderHistory() {
  const closed = state.history.filter(h => h.status==='closed');
  const tierShifted = closed.filter(h => h.totals?.tierShifted).length;
  const head = `<div class="section-header"><div><div class="section-title">Settlement History</div><div class="section-sub">${closed.length} closed · ${tierShifted} with tier shifts</div></div></div>`;
  const stats = `<div class="stats-row">
    <div class="stat"><div class="stat-label">Closed months</div><div class="stat-value">${closed.length}</div></div>
    <div class="stat"><div class="stat-label">Tier shifts</div><div class="stat-value" style="color:${tierShifted>0?'#e6b447':'#7fb069'}">${tierShifted}</div><div class="stat-sub">CC rate moved between tiers</div></div>
    <div class="stat"><div class="stat-label">Stable months</div><div class="stat-value" style="color:#7fb069">${closed.length-tierShifted}</div><div class="stat-sub">tier unchanged</div></div>
    <div class="stat"><div class="stat-label">Total units shipped</div><div class="stat-value">${fmt(closed.reduce((a,h) => a+(h.totals?.actual||0),0),0)}</div><div class="stat-sub">across closed months</div></div>
  </div>`;
  if (state.history.length===0) return head + stats + `<div class="placeholder"><h3>No closed months</h3></div>`;
  const sorted = [...state.history].sort((a,b) => (b.monthCode||'').localeCompare(a.monthCode||''));
  const rows = sorted.map(h => {
    const days = h.closedAt ? daysSince(h.closedAt) : 999;
    const isAdmin = state.realRole==='admin' && state.previewRole==='admin';
    const canRe = isAdmin && h.status==='closed' && days<=REOPEN_WINDOW_DAYS;
    const isSup = h.status==='superseded';
    const t = h.totals || {};
    const tierShiftCell = t.tierShifted
      ? `<span style="color:#e6b447;font-weight:600">₹${t.tierFC} → ₹${t.tierAct}</span>`
      : (t.tierFC ? `<span style="color:#7fb069">₹${t.tierFC}/unit</span>` : '—');
    return `<tr style="cursor:pointer" onclick="viewClosedMonth('${h.monthCode}')">
      <td class="left"><div><strong>${h.month}</strong></div><div style="font-size:10px;color:#5b6775">${h.closedAt?'closed '+new Date(h.closedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' by '+h.closedBy:''}</div></td>
      <td class="left"><span class="pill ${isSup?'pill-superseded':'pill-locked'}">${isSup?'Superseded':'Closed'}</span></td>
      <td>${fmt(t.forecast||0,0)}</td><td>${fmt(t.actual||0,0)}</td>
      <td style="color:${t.variance!=null?'#e8ecf0':'#5b6775'}">${t.variance!=null?(t.variance>0?'+':'')+t.variance.toFixed(1)+'%':'—'}</td>
      <td>${tierShiftCell}</td>
      <td onclick="event.stopPropagation()">${canRe?`<button class="btn btn-danger" style="padding:3px 8px;font-size:11px" onclick="openReopenModal('${h.monthCode}')">Reopen</button>`:isSup?'<span class="pill pill-locked">Sup.</span>':`<span class="pill pill-locked">Locked · ${days}d</span>`}</td>
    </tr>`;
  }).join('');
  return head + stats + `<div class="table-wrap"><table><thead><tr><th class="left">Month</th><th class="left">Status</th><th>Forecast</th><th>Actual</th><th>Variance</th><th>CC Rate</th><th></th></tr></thead><tbody>${rows}</tbody></table></div><div class="footer-note">Archive of closed reconciliation cycles. CN/DN settlements are handled separately in your accounting system. Click row to view month details.</div>`;
}

function renderChangeLog() {
  // Filter by entity (RM Price, PM Costs, Fixed CC, Month Close, Month Reopen, Formulations Import, etc.)
  const allEntries = state.changeLog || [];

  // Get all unique entities for filter pills
  const entities = [...new Set(allEntries.map(e => e.entity || 'Other'))].sort();

  // Apply entity filter
  let filtered = state.changeLogFilter === 'all' ? allEntries : allEntries.filter(e => e.entity === state.changeLogFilter);

  // Apply search across reason, action, user, after, before
  const q = (state.searchQuery || '').toLowerCase();
  if (q) {
    filtered = filtered.filter(e =>
      (e.reason||'').toLowerCase().includes(q) ||
      (e.action||'').toLowerCase().includes(q) ||
      (e.user||'').toLowerCase().includes(q) ||
      (e.after||'').toLowerCase().includes(q) ||
      (e.before||'').toLowerCase().includes(q) ||
      (e.entity||'').toLowerCase().includes(q)
    );
  }

  // Limit display
  const limit = state.changeLogLimit || 50;
  const visible = filtered.slice(0, limit);
  const hasMore = filtered.length > limit;

  // Color map for entity types
  const entityColor = (ent) => {
    if (ent === 'RM Price') return '#d4a574';
    if (ent === 'PM Costs') return '#85b7eb';
    if (ent === 'Fixed CC') return '#85b7eb';
    if (ent === 'Month Close') return '#7fb069';
    if (ent === 'Month Reopen') return '#e6b447';
    if (ent === 'Formulations Import' || ent === 'Formulations Seed') return '#e6b447';
    return '#8a95a3';
  };

  const filterPills = ['all', ...entities].map(ent => {
    const active = state.changeLogFilter === ent;
    const count = ent === 'all' ? allEntries.length : allEntries.filter(e => e.entity === ent).length;
    return `<button class="btn ${active?'btn-primary':''}" style="padding:4px 10px;font-size:11px" onclick="setChangeLogFilter('${ent}')">${ent === 'all' ? 'All' : ent} <span style="opacity:0.7">·${count}</span></button>`;
  }).join('');

  const head = `
    <div class="section-header">
      <div>
        <div class="section-title">Change Log</div>
        <div class="section-sub">${allEntries.length} entries · immutable audit trail</div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" placeholder="Reason, user, action…" value="${state.searchQuery||''}" oninput="updateSearch(this.value)">
      </div>
    </div>
    <div class="control-bar" style="flex-wrap:wrap;gap:6px">${filterPills}</div>
  `;

  if (allEntries.length === 0) {
    return head + `<div class="placeholder"><h3>No change log entries yet</h3><p>Edits to RM rates, PM costs, formulations, and month closes will appear here.</p></div>`;
  }

  if (visible.length === 0) {
    return head + `<div class="placeholder"><h3>No matches</h3><p>Try clearing the filter or search.</p></div>`;
  }

  const rows = visible.map(e => {
    const dt = e.ts ? new Date(e.ts) : null;
    const dtValid = dt && !isNaN(dt.getTime());
    const dateStr = dtValid ? dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}) : '—';
    const timeStr = dtValid ? dt.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) : '';
    const ent = e.entity || 'Other';
    const beforeStr = (e.before||'').toString();
    const afterStr = (e.after||'').toString();
    const beforeShort = beforeStr.length > 60 ? beforeStr.substring(0, 60) + '…' : beforeStr;
    const afterShort = afterStr.length > 60 ? afterStr.substring(0, 60) + '…' : afterStr;
    return `<tr>
      <td style="color:#8a95a3;font-size:11px;white-space:nowrap">
        <div style="color:#e8ecf0">${dateStr}</div>
        <div style="color:#5b6775">${timeStr}</div>
      </td>
      <td><span class="pill" style="background:#161e26;color:${entityColor(ent)};border:1px solid #1f2a35">${ent}</span></td>
      <td class="left" style="color:#e8ecf0">${e.action || '—'}</td>
      <td class="left" style="color:#5b6775;font-size:11px;font-family:'SF Mono',Menlo,monospace" title="${beforeStr.replace(/"/g,'&quot;')}">${beforeShort||'—'}</td>
      <td class="left" style="color:#7fb069;font-size:11px;font-family:'SF Mono',Menlo,monospace" title="${afterStr.replace(/"/g,'&quot;')}">${afterShort||'—'}</td>
      <td class="left" style="color:#8a95a3;font-size:12px;max-width:300px">${e.reason || '—'}</td>
      <td class="left" style="color:#8a95a3;font-size:11px;white-space:nowrap">
        <div>${e.user || '—'}</div>
        <div style="color:#5b6775;font-size:10px">${e.role || ''}</div>
      </td>
    </tr>`;
  }).join('');

  const moreBtn = hasMore ? `<div style="text-align:center;padding:14px"><button class="btn" onclick="loadMoreChangeLog()">Show ${Math.min(50, filtered.length - limit)} more (${filtered.length - limit} remaining)</button></div>` : '';

  return head + `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="left" style="width:90px">When</th>
          <th class="left" style="width:120px">Type</th>
          <th class="left">Action</th>
          <th class="left">Before</th>
          <th class="left">After</th>
          <th class="left">Reason</th>
          <th class="left" style="width:140px">By</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${moreBtn}
    <div class="footer-note">Showing ${visible.length} of ${filtered.length} entries (${allEntries.length} total). The change log is append-only — entries cannot be edited or deleted, even by admins.</div>
  `;
}

function renderModal() {
  const el = document.getElementById('modal-container');
  if (!state.modal) { el.innerHTML = ''; return; }
  if (state.modal.kind==='close') {
    const recon = state.allRecons[state.currentMonthCode];
    const comp = computeRecon(recon.rows, recon.tolerance_pct);
    const tierShiftImpact = (comp.tierShifted && comp.totalAct)
      ? (comp.tierAct.rate - comp.tierFC.rate) * comp.totalAct
      : 0;
    const tierMsg = comp.tierShifted
      ? `<span style="color:#e6b447">Shifted ₹${comp.tierFC.rate} → ₹${comp.tierAct.rate}/unit</span>`
      : `<span style="color:#7fb069">No tier change at ₹${comp.tierFC.rate}/unit</span>`;
    const nmCode = nextMC(recon.monthCode);
    const nmEx = state.allRecons[nmCode];
    const nmHas = nmEx && nmEx.rows.some(r => Number(r.forecast)>0);
    el.innerHTML = `<div class="modal-bg" onclick="closeModalIfBg(event)"><div class="modal" onclick="event.stopPropagation()">
