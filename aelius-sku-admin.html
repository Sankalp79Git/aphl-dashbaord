<style>
:root{--bg:#0a0e1a;--bg-2:#0f1421;--panel:#131829;--panel-2:#1a2034;
  --line:rgba(255,255,255,0.08);--ink:#e5e9f0;--ink-2:#9ba3b4;--ink-3:#5d6478;
  --accent:#d4ff3a;--accent-2:#a685ff;--good:#5dd39e;--warn:#ffb83a;--bad:#ff6b6b;
  --shadow:0 6px 24px rgba(0,0,0,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
.hidden{display:none !important}
.mono{font-family:'SF Mono',Monaco,monospace}
button{font-family:inherit;border-radius:5px;font-size:12px;padding:7px 12px;
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line);cursor:pointer}
button:hover:not(:disabled){background:var(--panel);border-color:rgba(255,255,255,0.2)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.primary{background:var(--accent);color:var(--bg);border:none;font-weight:600}
button.primary:hover:not(:disabled){background:#c4ef2a}
button.warn{background:var(--warn);color:var(--bg);border:none;font-weight:600}
button.danger{background:var(--bad);color:white;border:none}
input,select{font-family:inherit;background:var(--bg-2);color:var(--ink);
  border:1px solid var(--line);padding:7px 10px;font-size:12px;border-radius:4px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent)}
label{font-size:10px;color:var(--ink-2);text-transform:uppercase;
  letter-spacing:0.05em;display:block;margin-bottom:4px}

#login-screen{position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:36px 32px;width:380px;box-shadow:var(--shadow)}
.login-logo{font-size:11px;color:var(--accent);letter-spacing:0.15em;
  text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--ink-2);margin-bottom:24px}
.login-input{margin-bottom:12px;padding:10px 12px;font-size:13px}
.login-btn{width:100%;padding:11px;font-size:13px;font-weight:600;
  background:var(--accent);color:var(--bg);border:none;border-radius:5px;
  cursor:pointer;margin-top:8px}
.login-err{color:var(--bad);font-size:11px;margin-top:10px;min-height:14px}
.login-spinner{display:inline-block;width:12px;height:12px;
  border:2px solid currentColor;border-top-color:transparent;
  border-radius:50%;animation:spin 0.7s linear infinite;
  vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.header{display:flex;align-items:center;padding:14px 22px;
  background:var(--panel);border-bottom:1px solid var(--line);gap:16px}
.brand-mark{width:32px;height:32px;background:var(--accent);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--bg);font-size:14px}
.brand-text{line-height:1.2}
.brand-text .name{font-weight:600;font-size:13px}
.brand-text .sub{font-size:10px;color:var(--ink-3);letter-spacing:0.05em;text-transform:uppercase}
.tabs{display:flex;gap:2px;flex:1;margin-left:28px}
.tab{padding:7px 14px;font-size:12px;color:var(--ink-2);cursor:pointer;border-radius:4px}
.tab:hover{color:var(--ink);background:var(--panel-2)}
.tab.active{color:var(--accent);background:var(--panel-2);font-weight:500}
.user-chip{display:flex;align-items:center;gap:10px;
  padding:5px 12px 5px 6px;background:var(--panel-2);border-radius:18px}
.user-avatar{width:26px;height:26px;background:var(--accent-2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:var(--bg);font-weight:600;font-size:11px}
.user-info .email{font-size:11px}
.user-info .role{font-size:9px;color:var(--accent);letter-spacing:0.06em;text-transform:uppercase}
.logout-btn{padding:5px 10px;font-size:10px;background:transparent;
  border:1px solid var(--line);border-radius:4px;color:var(--ink-2)}

.main{padding:22px;max-width:1300px;margin:0 auto}
.page-title{margin-bottom:20px}
.page-title h1{font-size:20px;font-weight:600}
.page-title .sub{font-size:12px;color:var(--ink-2);margin-top:3px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:6px;
  padding:14px 16px;border-left:3px solid var(--accent)}
.kpi.warn{border-left-color:var(--warn)}.kpi.bad{border-left-color:var(--bad)}
.kpi.good{border-left-color:var(--good)}.kpi.info{border-left-color:var(--accent-2)}
.kpi-val{font-size:22px;font-weight:600;line-height:1}
.kpi-label{font-size:9px;color:var(--ink-2);text-transform:uppercase;
  letter-spacing:0.06em;margin-top:5px}
.kpi-sub{font-size:10px;color:var(--ink-3);margin-top:4px}

.banner{padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:12px}
.banner.info{background:rgba(166,133,255,0.08);border:1px solid rgba(166,133,255,0.3);color:var(--accent-2)}
.banner.warn{background:rgba(255,184,58,0.08);border:1px solid rgba(255,184,58,0.3);color:var(--warn)}
.banner.good{background:rgba(93,211,158,0.08);border:1px solid rgba(93,211,158,0.3);color:var(--good)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:14px}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:13px;font-weight:600}
.panel-body{padding:14px 16px}

.action-pill{font-size:9px;font-weight:700;text-transform:uppercase;
  padding:2px 7px;border-radius:8px;letter-spacing:0.05em;display:inline-block}
.action-ADD{background:rgba(93,211,158,0.15);color:var(--good)}
.action-UPDATE{background:rgba(255,184,58,0.15);color:var(--warn)}
.action-KEEP{background:rgba(155,163,180,0.15);color:var(--ink-2)}

.review-table{width:100%;border-collapse:collapse;font-size:11px}
.review-table th{background:var(--bg-2);padding:8px 10px;text-align:left;
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  color:var(--ink-2);position:sticky;top:0}
.review-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
.review-table tr:hover td{background:rgba(255,255,255,0.02)}
.review-list{max-height:520px;overflow-y:auto}

.filter-bar{display:flex;gap:8px;align-items:center;
  margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{width:auto}
.filter-bar input{min-width:240px}

.toggle-btn{background:var(--good);color:var(--bg);border:none;
  font-weight:600;padding:5px 12px;font-size:11px;border-radius:4px;cursor:pointer}
.toggle-btn.inactive{background:var(--ink-3);color:var(--ink)}
.toggle-btn.locked{background:var(--accent-2);color:var(--bg)}
.toggle-btn:disabled{opacity:0.4;cursor:not-allowed}

.row-inactive{opacity:0.55}
.lock-badge{display:inline-block;padding:1px 6px;border-radius:8px;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-left:6px;
  background:rgba(166,133,255,0.18);color:var(--accent-2)}

.audit-list{max-height:380px;overflow-y:auto}
.audit-row{padding:8px 10px;border-bottom:1px solid var(--line);font-size:11px;
  display:grid;grid-template-columns:120px 1fr 100px;gap:10px;align-items:center}
.audit-row .who{color:var(--accent);font-size:10px}
.audit-row .ts{color:var(--ink-3);font-size:10px;text-align:right}

.modal-backdrop{position:fixed;inset:0;background:rgba(5,8,15,0.85);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--line);
  border-radius:8px;max-width:600px;width:100%;box-shadow:var(--shadow)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:18px 20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);
  display:flex;gap:10px;justify-content:flex-end}

.empty{text-align:center;padding:30px 20px;color:var(--ink-3);font-style:italic;font-size:12px}
</style>
</head>

<script>
// ========= CONSTANTS =========
var ROLE_CONFIG = {
  FOUNDERS:    { label:'Founders', canMigrate:true,  canToggle:true,  canOverride:true  },
  PMS_TRACKER: { label:'PMS',      canMigrate:true,  canToggle:true,  canOverride:false },
  READONLY:    { label:'Read-only',canMigrate:false, canToggle:false, canOverride:false }
};

// ========= STATE =========
var db, auth;
var currentUser=null, currentRole=null, currentTab='migration';
var pmsData = { programmes: [] };
var productionData = { bulk: [], fp: [] };
var unsubPMS=null, unsubProduction=null;
var migrationData = [];

// ========= INIT =========
window.addEventListener('DOMContentLoaded', function() {
  // Load migration data
  try {
    var seedEl = document.getElementById('migration-data');
    migrationData = JSON.parse(seedEl.textContent);
    console.log('[ADMIN] Migration data loaded: ' + migrationData.length + ' rows');
  } catch(e) {
    console.error('[ADMIN] Failed to parse migration data:', e);
  }

  if (typeof firebase === 'undefined') {
    document.getElementById('login-err').textContent = 'Firebase SDK failed to load.';
    return;
  }
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    auth.onAuthStateChanged(function(user) {
      if (user) onLoggedIn(user);
      else showLoginScreen();
    });
  } catch(e) {
    document.getElementById('login-err').textContent = 'Firebase init failed: ' + e.message;
  }
});

function showLoginScreen() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
}

function doLogin() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  var err = document.getElementById('login-err');
  var btn = document.getElementById('login-btn');
  if (!email || !pass) { err.textContent = 'Email and password required'; return; }
  err.textContent = '';
  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>Signing in...';
  auth.signInWithEmailAndPassword(email, pass).catch(function(e) {
    err.textContent = 'Sign in failed: ' + (e.code === 'auth/invalid-credential' ? 'wrong email or password' : e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  });
}

function doLogout() {
  if (unsubPMS) unsubPMS();
  if (unsubProduction) unsubProduction();
  auth.signOut();
}

function onLoggedIn(user) {
  currentUser = user;
  var role = window.SKU_ADMIN_ROLE_MAP[user.email.toLowerCase()];
  if (!role) {
    document.getElementById('login-err').textContent = 'No SKU Admin role for ' + user.email;
    auth.signOut();
    return;
  }
  currentRole = role;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('user-avatar').textContent = user.email.charAt(0).toUpperCase();
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-role').textContent = ROLE_CONFIG[role].label;
  subscribeData();
  renderTabs();
  renderMain();
}

function subscribeData() {
  unsubPMS = db.collection('pms').doc('data').onSnapshot(function(snap) {
    pmsData = snap.exists ? (snap.data() || { programmes: [] }) : { programmes: [] };
    console.log('[ADMIN] PMS data: ' + (pmsData.programmes || []).length + ' programmes');
    renderMain();
  }, function(err) { console.error('[ADMIN] PMS subscribe error:', err); });

  unsubProduction = db.collection('production').doc('data').onSnapshot(function(snap) {
    var d = snap.exists ? snap.data() : {};
    productionData = { bulk: d.bulk || [], fp: d.fp || [] };
    console.log('[ADMIN] Production data: ' + productionData.bulk.length + ' bulk, ' + productionData.fp.length + ' fp');
    renderMain();
  }, function(err) { console.error('[ADMIN] Production subscribe error:', err); });
}

// ========= TABS =========
function renderTabs() {
  var tabs = [
    { id: 'migration', label: 'FG Migration' },
    { id: 'fg', label: 'FG Lifecycle' },
    { id: 'bulk', label: 'Bulk Lifecycle' },
    { id: 'audit', label: 'Audit Log' }
  ];
  document.getElementById('tabs').innerHTML = tabs.map(function(t) {
    return '<div class="tab '+(currentTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</div>';
  }).join('');
}

function switchTab(id) { currentTab = id; renderTabs(); renderMain(); }

function renderMain() {
  if (currentTab === 'migration') return renderMigrationTab();
  if (currentTab === 'fg') return renderFGTab();
  if (currentTab === 'bulk') return renderBulkTab();
  if (currentTab === 'audit') return renderAuditTab();
}

// ========= MIGRATION TAB =========
function renderMigrationTab() {
  var cfg = ROLE_CONFIG[currentRole];
  var main = document.getElementById('main');

  // Compute current PMS state vs proposed
  var allPmsFGs = collectAllPmsFGs();  // {name, programme, brand}[]
  var pmsNamesLower = {};
  allPmsFGs.forEach(function(f) { pmsNamesLower[f.name.toLowerCase().trim()] = f; });

  var migrated = pmsData._migrationApplied || false;

  var addRows = migrationData.filter(function(r) { return r.action === 'ADD'; });
  var updateRows = migrationData.filter(function(r) { return r.action === 'UPDATE'; });
  var keepRows = migrationData.filter(function(r) { return r.action === 'KEEP'; });

  // For UPDATE: check if currentPmsName actually exists in PMS
  var matchedUpdates = [];
  var unmatchedUpdates = [];
  updateRows.forEach(function(r) {
    var key = r.currentPmsName.toLowerCase().trim();
    if (pmsNamesLower[key]) matchedUpdates.push({ row: r, found: pmsNamesLower[key] });
    else unmatchedUpdates.push(r);
  });

  // For KEEP: verify they exist in PMS already
  var matchedKeeps = [];
  var missingKeeps = [];
  keepRows.forEach(function(r) {
    var key = r.currentPmsName.toLowerCase().trim();
    if (pmsNamesLower[key]) matchedKeeps.push({ row: r, found: pmsNamesLower[key] });
    else missingKeeps.push(r);
  });

  var html = '<div class="page-title"><h1>FG Migration</h1>' +
    '<div class="sub">Apply your canonical FG name list to PMS programmes. ' +
    (migrated ? '<span style="color:var(--good)">✓ Migration already applied</span>' : 'One-time operation.') +
    '</div></div>';

  // KPIs
  html += '<div class="kpi-row">' +
    '<div class="kpi info"><div class="kpi-val">'+migrationData.length+'</div><div class="kpi-label">Mapping rows</div><div class="kpi-sub">Total in canonical list</div></div>' +
    '<div class="kpi good"><div class="kpi-val">'+addRows.length+'</div><div class="kpi-label">To Add</div><div class="kpi-sub">New FGs into PMS</div></div>' +
    '<div class="kpi warn"><div class="kpi-val">'+updateRows.length+'</div><div class="kpi-label">To Rename</div><div class="kpi-sub">'+matchedUpdates.length+' matched in PMS</div></div>' +
    '<div class="kpi"><div class="kpi-val">'+keepRows.length+'</div><div class="kpi-label">No Change</div><div class="kpi-sub">'+matchedKeeps.length+' verified</div></div>' +
  '</div>';

  // Banners
  if (unmatchedUpdates.length > 0) {
    html += '<div class="banner warn">⚠ ' + unmatchedUpdates.length + ' UPDATE rows have a "current PMS name" that doesn\'t match anything in PMS. They will be added as new instead of renamed. Review below.</div>';
  }
  if (missingKeeps.length > 0) {
    html += '<div class="banner warn">⚠ ' + missingKeeps.length + ' KEEP rows have a "current PMS name" not found in PMS. They will be added as new.</div>';
  }
  if (allPmsFGs.length === 0) {
    html += '<div class="banner warn">⚠ PMS has 0 FG entries. Either PMS data is empty or there\'s an access issue. Check console (F12).</div>';
  }

  // Action buttons
  if (cfg.canMigrate && !migrated) {
    html += '<div style="margin-bottom:18px">' +
      '<button class="primary" onclick="confirmMigration()" '+(migrationData.length===0?'disabled':'')+' style="font-size:13px;padding:9px 18px">' +
      '⚡ Apply Migration to PMS' +
      '</button>' +
      '<button onclick="downloadMigrationPreview()" style="margin-left:8px">📥 Download CSV preview</button>' +
      '</div>';
  } else if (migrated) {
    html += '<div class="banner good">✓ Migration was applied on '+ formatTs(pmsData._migrationAppliedTs) +' by '+ escHtml(pmsData._migrationAppliedBy || 'unknown') +'</div>';
  } else if (!cfg.canMigrate) {
    html += '<div class="banner info">ℹ Your role ('+ROLE_CONFIG[currentRole].label+') is read-only for this operation. Only Founders or PMS can apply migration.</div>';
  }

  // Review table
  html += '<div class="panel"><div class="panel-hdr"><div class="panel-title">Review — All 126 rows</div></div>';
  html += '<div class="review-list"><table class="review-table">';
  html += '<thead><tr><th style="width:90px">Action</th><th>Current PMS Name</th><th>Canonical Name</th><th style="width:90px">Brand</th><th style="width:80px">Sub-Brand</th></tr></thead><tbody>';
  migrationData.forEach(function(r) {
    var pmsKey = (r.currentPmsName||'').toLowerCase().trim();
    var inPMS = pmsKey && pmsNamesLower[pmsKey];
    var actionDisplay = r.action;
    var actualAction = r.action;
    if (r.action === 'UPDATE' && !inPMS) actualAction = 'ADD'; // will be added since not found
    if (r.action === 'KEEP' && !inPMS) actualAction = 'ADD';

    html += '<tr>' +
      '<td><span class="action-pill action-'+actualAction+'">'+actualAction+'</span></td>' +
      '<td>' + (r.currentPmsName ? escHtml(r.currentPmsName) : '<span style="color:var(--ink-3);font-style:italic">(none)</span>') + '</td>' +
      '<td><strong>'+escHtml(r.canonicalName)+'</strong></td>' +
      '<td>'+escHtml(r.brand)+'</td>' +
      '<td>'+escHtml(r.subBrand)+'</td>' +
    '</tr>';
  });
  html += '</tbody></table></div></div>';

  main.innerHTML = html;
}

function collectAllPmsFGs() {
  var out = [];
  (pmsData.programmes || []).forEach(function(prog) {
    (prog.skus || []).forEach(function(sku) {
      if (sku.name) out.push({ name: sku.name, programme: prog.name, brand: prog.brand || inferBrand(prog.name), active: sku.active !== false });
    });
  });
  return out;
}

function inferBrand(s) {
  var brands = ['Azevita','DeadSea','KeraSoul','SeaSoul','Pilgrim','XYST','Bodycraft','Hyphen','Skinvest','Wiselife'];
  s = (s || '').toLowerCase();
  for (var i=0; i<brands.length; i++) {
    if (s.indexOf(brands[i].toLowerCase()) > -1) return brands[i];
  }
  return '';
}

function confirmMigration() {
  var html = '<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">';
  html += '<div class="modal">';
  html += '<div class="modal-hdr"><div class="modal-title">Confirm migration</div></div>';
  html += '<div class="modal-body">';
  html += '<p style="font-size:12px;margin-bottom:12px">This will modify the <code>pms/data</code> document in Firestore:</p>';
  html += '<ul style="font-size:12px;color:var(--ink-2);margin:0 0 14px 20px;line-height:1.8">';
  html += '<li>Rename matching FGs to canonical names</li>';

  html += '<li>Set <code>active: true</code> on all migrated items</li>';
  html += '<li>Write audit log to <code>migrations/{timestamp}</code></li>';
  html += '</ul>';
  html += '<p style="font-size:11px;color:var(--warn)">⚠ This is reversible only via the audit log. Run the export tool first if you want a snapshot.</p>';
  html += '<p style="font-size:11px;color:var(--ink-3);margin-top:10px">Type <strong>APPLY</strong> below to confirm:</p>';

  html += '</div>';

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function runMigration() {
  var input = document.getElementById('confirm-input').value.trim();
  var errEl = document.getElementById('migrate-err');
  if (input !== 'APPLY') { errEl.textContent = 'Type APPLY exactly to confirm'; return; }
  errEl.textContent = '';

  // Build rename map and add list
  var allPmsFGs = collectAllPmsFGs();
  var pmsNamesLower = {};
  allPmsFGs.forEach(function(f) { pmsNamesLower[f.name.toLowerCase().trim()] = f; });

  var renameMap = {}; // oldName -> newName
  var addList = [];   // canonical names to add
  var auditEntries = [];

  migrationData.forEach(function(r) {
    var pmsKey = (r.currentPmsName||'').toLowerCase().trim();
    var found = pmsKey && pmsNamesLower[pmsKey];
    if (r.action === 'ADD' || !found) {
      // Add as new (use canonical name)
      addList.push({
        canonical: r.canonicalName,
        brand: r.brand,
        subBrand: r.subBrand,
        brandInPms: r.brandInPms
      });
      auditEntries.push({
        type: 'ADD',
        canonical: r.canonicalName,
        brand: r.brand,
        subBrand: r.subBrand
      });
    } else if (r.action === 'UPDATE') {
      renameMap[found.name] = r.canonicalName;
      auditEntries.push({
        type: 'RENAME',
        from: found.name,
        to: r.canonicalName,
        programme: found.programme
      });
    } else if (r.action === 'KEEP') {
      // No-op, just verify and tag active
      auditEntries.push({
        type: 'KEEP',
        name: found.name,
        programme: found.programme
      });
    }
  });

  // Build new pmsData object
  var newPmsData = JSON.parse(JSON.stringify(pmsData));

  // 1. Apply renames in existing programmes
  (newPmsData.programmes || []).forEach(function(prog) {
    (prog.skus || []).forEach(function(sku) {
      if (sku.name && renameMap[sku.name]) {
        sku._previousName = sku.name;
        sku.name = renameMap[sku.name];
      }
      // Set active true if not present
      if (sku.active === undefined) sku.active = true;
    });
  });

  // 2. Add new FGs to a Master Reference programme
  if (addList.length > 0) {
    var ref = (newPmsData.programmes || []).find(function(p) { return p.name === 'SKU Master Reference'; });
    if (!ref) {
      ref = {
        name: 'SKU Master Reference',
        brand: 'Multi',
        skus: [],
        _isReference: true,
        notes: 'Auto-created by SKU Admin migration. Holds canonical FGs not yet scheduled for production.'
      };
      newPmsData.programmes = newPmsData.programmes || [];
      newPmsData.programmes.push(ref);
    }
    addList.forEach(function(a) {
      // Check duplicate before adding
      var exists = ref.skus.some(function(s) { return s.name === a.canonical; });
      if (!exists) {
        ref.skus.push({
          name: a.canonical,
          brand: a.subBrand,
          parentBrand: a.brand,
          active: true,
          source: 'migration',
          addedTs: Date.now()
        });
      }
    });
  }

  // Migration metadata
  newPmsData._migrationApplied = true;
  newPmsData._migrationAppliedTs = Date.now();
  newPmsData._migrationAppliedBy = currentUser.email;

  // Apply atomically
  var batch = db.batch();
  var pmsRef = db.collection('pms').doc('data');
  batch.set(pmsRef, newPmsData);

  var auditRef = db.collection('migrations').doc(String(Date.now()));
  batch.set(auditRef, {
    appliedTs: Date.now(),
    appliedBy: currentUser.email,
    role: currentRole,
    entriesCount: auditEntries.length,
    addCount: addList.length,
    renameCount: Object.keys(renameMap).length,
    keepCount: auditEntries.filter(function(e) { return e.type === 'KEEP'; }).length,
    entries: auditEntries
  });

  batch.commit().then(function() {
    closeModal();
    alert('Migration applied successfully!\n\n' +
      Object.keys(renameMap).length + ' renamed, ' +
      addList.length + ' added, ' +
      auditEntries.filter(function(e){return e.type==='KEEP';}).length + ' kept.\n\n' +
      'See Audit Log tab for details.');
    renderMain();
  }).catch(function(err) {
    errEl.textContent = 'Migration failed: ' + err.message;
    console.error('Migration error:', err);
  });
}

function downloadMigrationPreview() {
  var headers = ['action','currentPmsName','canonicalName','brand','subBrand','brandInPms'];
  var csv = headers.join(',') + '\n';
  migrationData.forEach(function(r) {
    csv += headers.map(function(h) {
      var v = String(r[h]||'');
      return v.indexOf(',') > -1 || v.indexOf('"') > -1 ? '"'+v.replace(/"/g,'""')+'"' : v;
    }).join(',') + '\n';
  });
  var blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'migration_preview.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

    html += '<tr><td colspan="5" class="empty">No FGs match the current filters</td></tr>';
  } else {
    visible.forEach(function(f) {

      html += '<tr class="'+(isActive?'':'row-inactive')+'">';
      html += '<td><strong>'+escHtml(f.name)+'</strong>'+(founderLocked ? '<span class="lock-badge">FOUNDERS LOCK</span>' : '')+'</td>';
      html += '<td>'+escHtml(f.brand||'—')+'</td>';
      html += '<td style="font-size:10px;color:var(--ink-3)">'+escHtml(f.programme||'—')+'</td>';

var _renderTimer;
function debounceRender() { clearTimeout(_renderTimer); _renderTimer = setTimeout(renderMain, 200); }

function toggleFG(name, newActive) {
  var newPmsData = JSON.parse(JSON.stringify(pmsData));
  var found = false;
  var prevState = null;
  (newPmsData.programmes || []).forEach(function(prog) {
    (prog.skus || []).forEach(function(sku) {
      if (sku.name === name) {
        if (sku.founderLocked && currentRole !== 'FOUNDERS') {
          alert('This FG is Founders-locked. Only Founders can change its status.');
          return;
        }
        prevState = (sku.active === false) ? 'inactive' : 'active';
        sku.active = newActive;
        sku.lastStatusChange = {
          ts: Date.now(),
          by: currentUser.email,
          role: currentRole,
          fromStatus: prevState,
          toStatus: newActive ? 'active' : 'inactive'
        };
        found = true;
      }
    });
  });
  if (!found) { alert('FG not found in PMS'); return; }

  var batch = db.batch();
  batch.set(db.collection('pms').doc('data'), newPmsData);
  batch.set(db.collection('sku_audit').doc(String(Date.now())), {
    ts: Date.now(),
    by: currentUser.email,
    role: currentRole,
    type: 'FG_TOGGLE',
    name: name,
    fromStatus: prevState,
    toStatus: newActive ? 'active' : 'inactive'
  });
  batch.commit().catch(function(e) { alert('Toggle failed: '+e.message); });
}

function lockFG(name, lock) {
  var newPmsData = JSON.parse(JSON.stringify(pmsData));
  var found = false;
  (newPmsData.programmes || []).forEach(function(prog) {
    (prog.skus || []).forEach(function(sku) {
      if (sku.name === name) {
        sku.founderLocked = lock;
        sku.lastLockChange = { ts: Date.now(), by: currentUser.email, locked: lock };
        found = true;
      }
    });
  });
  if (!found) return;
  var batch = db.batch();
  batch.set(db.collection('pms').doc('data'), newPmsData);
  batch.set(db.collection('sku_audit').doc(String(Date.now())), {
    ts: Date.now(),
    by: currentUser.email,
    role: currentRole,
    type: lock ? 'FG_LOCK' : 'FG_UNLOCK',
    name: name
  });
  batch.commit().catch(function(e) { alert('Lock change failed: '+e.message); });
}

function collectAllBulkProducts() {
  // Bulk lifecycle is tracked via a separate doc: production/data._bulkLifecycle = {productName: {active, founderLocked, ...}}
  var lifecycleMap = (productionData._bulkLifecycle) || {};
  var counts = {};
  (productionData.bulk || []).forEach(function(b) {
    var name = b.product || b.sfg || '';
    if (!name) return;
    var key = name.trim();
    if (!counts[key]) counts[key] = { name: key, brand: b.brand || '', batchCount: 0 };
    counts[key].batchCount++;
  });
  // Apply lifecycle state
  var out = [];
  Object.keys(counts).forEach(function(k) {
    var item = counts[k];
    var lc = lifecycleMap[k];
    item.active = lc ? (lc.active !== false) : true;
    item.founderLocked = lc ? !!lc.founderLocked : false;
    out.push(item);
  });
  out.sort(function(a, b) { return a.name.localeCompare(b.name); });
  return out;
}

function toggleBulk(name, newActive) {
  // Read latest, apply lifecycle, write back
  var ref = db.collection('production').doc('data');
  ref.get().then(function(snap) {
    var data = snap.exists ? snap.data() : { bulk: [], fp: [] };
    var lc = data._bulkLifecycle || {};
    var existing = lc[name] || { active: true };
    if (existing.founderLocked && currentRole !== 'FOUNDERS') {
      alert('This Bulk is Founders-locked. Only Founders can change its status.');
      return;
    }
    var prev = existing.active === false ? 'inactive' : 'active';
    lc[name] = {
      active: newActive,
      founderLocked: existing.founderLocked || false,
      lastChange: {
        ts: Date.now(),
        by: currentUser.email,
        role: currentRole,
        fromStatus: prev,
        toStatus: newActive ? 'active' : 'inactive'
      }
    };
    data._bulkLifecycle = lc;

    var batch = db.batch();
    batch.set(ref, data);
    batch.set(db.collection('sku_audit').doc(String(Date.now())), {
      ts: Date.now(),
      by: currentUser.email,
      role: currentRole,
      type: 'BULK_TOGGLE',
      name: name,
      fromStatus: prev,
      toStatus: newActive ? 'active' : 'inactive'
    });
    batch.commit().catch(function(e) { alert('Toggle failed: '+e.message); });
  });
}

function lockBulk(name, lock) {
  var ref = db.collection('production').doc('data');
  ref.get().then(function(snap) {
    var data = snap.exists ? snap.data() : { bulk: [], fp: [] };
    var lc = data._bulkLifecycle || {};
    var existing = lc[name] || { active: true };
    lc[name] = Object.assign({}, existing, {
      founderLocked: lock,
      lastLockChange: { ts: Date.now(), by: currentUser.email, locked: lock }
    });
    data._bulkLifecycle = lc;

    var batch = db.batch();
    batch.set(ref, data);
    batch.set(db.collection('sku_audit').doc(String(Date.now())), {
      ts: Date.now(),
      by: currentUser.email,
      role: currentRole,
      type: lock ? 'BULK_LOCK' : 'BULK_UNLOCK',
      name: name
    });
    batch.commit().catch(function(e) { alert('Lock change failed: '+e.message); });
  });
}

// ========= AUDIT TAB =========
function renderAuditTab() {
  var main = document.getElementById('main');
  main.innerHTML = '<div class="page-title"><h1>Audit Log</h1><div class="sub">Loading...</div></div>';

  Promise.all([
    db.collection('sku_audit').orderBy('ts', 'desc').limit(100).get(),
    db.collection('migrations').orderBy('appliedTs', 'desc').limit(20).get()
  ]).then(function(snaps) {
    var audits = [];
    snaps[0].forEach(function(d) { audits.push(Object.assign({ _src: 'sku_audit' }, d.data())); });
    snaps[1].forEach(function(d) {
      audits.push({
        _src: 'migration',
        ts: d.data().appliedTs,
        by: d.data().appliedBy,
        type: 'MIGRATION_APPLIED',
        addCount: d.data().addCount,
        renameCount: d.data().renameCount,
        keepCount: d.data().keepCount
      });
    });
    audits.sort(function(a, b) { return (b.ts||0) - (a.ts||0); });

    var html = '<div class="page-title"><h1>Audit Log</h1>' +
      '<div class="sub">Last 100 SKU lifecycle events + last 20 migrations.</div></div>';
    html += '<div class="panel"><div class="audit-list">';
    if (audits.length === 0) {
      html += '<div class="empty">No audit events yet</div>';
    } else {
      audits.forEach(function(a) {
        var desc = describeAudit(a);
        html += '<div class="audit-row">';
        html += '<div class="who">'+escHtml((a.role||'')+' · '+(a.by||'').split('@')[0])+'</div>';
        html += '<div>'+desc+'</div>';
        html += '<div class="ts">'+formatTs(a.ts)+'</div>';
        html += '</div>';
      });
    }
    html += '</div></div>';
    main.innerHTML = html;
  }).catch(function(e) {
    main.innerHTML = '<div class="banner warn">Failed to load audit log: '+escHtml(e.message)+'</div>';
  });
}

function describeAudit(a) {
  if (a.type === 'MIGRATION_APPLIED') {
    return '<strong style="color:var(--accent)">Migration applied</strong> — ' +
      a.addCount + ' added, ' + a.renameCount + ' renamed, ' + a.keepCount + ' kept';
  }
  if (a.type === 'FG_TOGGLE') return '<strong>'+escHtml(a.name)+'</strong> — FG '+(a.toStatus==='active'?'<span style="color:var(--good)">activated</span>':'<span style="color:var(--bad)">deactivated</span>');
  if (a.type === 'BULK_TOGGLE') return '<strong>'+escHtml(a.name)+'</strong> — Bulk '+(a.toStatus==='active'?'<span style="color:var(--good)">activated</span>':'<span style="color:var(--bad)">deactivated</span>');
  if (a.type === 'FG_LOCK') return '<strong>'+escHtml(a.name)+'</strong> — FG <span style="color:var(--accent-2)">founders-locked</span>';
  if (a.type === 'FG_UNLOCK') return '<strong>'+escHtml(a.name)+'</strong> — FG <span style="color:var(--ink-2)">unlocked</span>';
  if (a.type === 'BULK_LOCK') return '<strong>'+escHtml(a.name)+'</strong> — Bulk <span style="color:var(--accent-2)">founders-locked</span>';
  if (a.type === 'BULK_UNLOCK') return '<strong>'+escHtml(a.name)+'</strong> — Bulk <span style="color:var(--ink-2)">unlocked</span>';
  return JSON.stringify(a).slice(0, 100);
}

// ========= HELPERS =========
function uniqueValues(arr, key) {
  var s = {};
  arr.forEach(function(o) { if (o[key]) s[o[key]] = true; });
  return Object.keys(s).sort();
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }

function formatTs(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return d.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}
</script>
