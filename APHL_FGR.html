<style>
:root{--bg:#0a0e1a;--bg-2:#0f1421;--panel:#131829;--panel-2:#1a2034;
  --line:rgba(255,255,255,0.08);--ink:#e5e9f0;--ink-2:#9ba3b4;--ink-3:#5d6478;
  --accent:#d4ff3a;--accent-2:#a685ff;--good:#5dd39e;--warn:#ffb83a;--bad:#ff6b6b;
  --shadow:0 6px 24px rgba(0,0,0,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
.hidden{display:none !important}
.mono{font-family:'SF Mono',Monaco,monospace}
button{font-family:inherit;border-radius:5px;font-size:12px;padding:7px 12px;
  background:var(--panel-2);color:var(--ink);border:1px solid var(--line);cursor:pointer}
button:hover:not(:disabled){background:var(--panel)}
button:disabled{opacity:0.4;cursor:not-allowed}
button.primary{background:var(--accent);color:var(--bg);border:none;font-weight:600}
button.primary:hover:not(:disabled){background:#c4ef2a}
button.danger{background:var(--bad);color:white;border:none}
button.warn{background:var(--warn);color:var(--bg);border:none}
input,select,textarea{font-family:inherit;background:var(--bg-2);color:var(--ink);
  border:1px solid var(--line);padding:7px 10px;font-size:12px;border-radius:4px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label{font-size:10px;color:var(--ink-2);text-transform:uppercase;
  letter-spacing:0.05em;display:block;margin-bottom:4px}
textarea{resize:vertical;min-height:60px}

#login-screen{position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:36px 32px;width:380px;box-shadow:var(--shadow)}
.login-logo{font-size:11px;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--ink-2);margin-bottom:24px}
.pin-input{font-family:'SF Mono',Monaco,monospace;letter-spacing:0.5em;text-align:center;font-size:18px;padding:12px 16px;margin-bottom:12px}
.login-btn{width:100%;padding:11px;font-size:13px;font-weight:600;
  background:var(--accent);color:var(--bg);border:none;border-radius:5px;cursor:pointer;margin-top:8px}
.login-err{color:var(--bad);font-size:11px;margin-top:10px;min-height:14px}
.test-pin-hint{font-size:10px;color:var(--ink-3);margin-top:14px;padding:10px;background:var(--bg-2);border-radius:4px;border:1px dashed var(--line)}
.test-pin-hint code{color:var(--accent);font-family:'SF Mono',Monaco,monospace}

.header{display:flex;align-items:center;padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);gap:16px}
.brand-mark{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:14px}
.brand-text .name{font-weight:600;font-size:13px}
.brand-text .sub{font-size:10px;color:var(--ink-3);letter-spacing:0.05em;text-transform:uppercase}
.tabs{display:flex;gap:2px;flex:1;margin-left:28px;flex-wrap:wrap}
.tab{padding:7px 14px;font-size:12px;color:var(--ink-2);cursor:pointer;border-radius:4px;position:relative}
.tab:hover{color:var(--ink);background:var(--panel-2)}
.tab.active{color:var(--accent);background:var(--panel-2);font-weight:500}
.tab-badge{display:inline-block;background:var(--bad);color:white;border-radius:9px;font-size:9px;font-weight:700;padding:1px 6px;margin-left:5px;min-width:16px;text-align:center}
.user-chip{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 6px;background:var(--panel-2);border-radius:18px}
.user-avatar{width:26px;height:26px;background:var(--accent-2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:600;font-size:11px}
.user-info .role{font-size:10px;color:var(--accent);letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.user-info .label{font-size:10px;color:var(--ink-3)}
.logout-btn{padding:5px 10px;font-size:10px;background:transparent;border:1px solid var(--line);border-radius:4px;color:var(--ink-2)}

.main{padding:22px;max-width:1500px;margin:0 auto}
.page-title h1{font-size:20px;font-weight:600}
.page-title .sub{font-size:12px;color:var(--ink-2);margin-top:3px;margin-bottom:18px}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 14px;border-left:3px solid var(--accent)}
.kpi.good{border-left-color:var(--good)}
.kpi.warn{border-left-color:var(--warn)}
.kpi.info{border-left-color:var(--accent-2)}
.kpi.bad{border-left-color:var(--bad)}
.kpi-val{font-size:22px;font-weight:600;line-height:1}
.kpi-label{font-size:9px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;margin-top:5px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:14px}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:13px;font-weight:600}
.panel-body{padding:14px 16px}

.banner{padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:12px}
.banner.info{background:rgba(166,133,255,0.08);border:1px solid rgba(166,133,255,0.3);color:var(--accent-2)}
.banner.warn{background:rgba(255,184,58,0.08);border:1px solid rgba(255,184,58,0.3);color:var(--warn)}
.banner.good{background:rgba(93,211,158,0.08);border:1px solid rgba(93,211,158,0.3);color:var(--good)}
.banner.bad{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.3);color:var(--bad)}

.fg-table{width:100%;border-collapse:collapse;font-size:11px}
.fg-table th{background:var(--bg-2);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-2);position:sticky;top:0;z-index:1}
.fg-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
.fg-table tr:hover td{background:rgba(255,255,255,0.02)}
.table-wrap{max-height:580px;overflow:auto}

.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{width:auto}
.filter-bar input{min-width:240px}

.pill{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:8px;letter-spacing:0.05em;display:inline-block}
.pill-good{background:rgba(93,211,158,0.18);color:var(--good)}
.pill-warn{background:rgba(255,184,58,0.18);color:var(--warn)}
.pill-info{background:rgba(166,133,255,0.18);color:var(--accent-2)}
.pill-muted{background:rgba(155,163,180,0.18);color:var(--ink-2)}
.pill-bad{background:rgba(255,107,107,0.18);color:var(--bad)}

.empty{text-align:center;padding:50px 20px;color:var(--ink-3);font-style:italic;font-size:12px}
.empty-icon{font-size:30px;margin-bottom:10px;color:var(--ink-3)}

.row-actions{display:flex;gap:4px;flex-wrap:wrap}
.row-actions button{padding:3px 7px;font-size:10px}

.modal-bd{position:fixed;inset:0;background:rgba(5,8,15,0.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:8px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--line)}
.modal-title{font-size:14px;font-weight:600}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:span 2}
.form-row{margin-bottom:12px}
.form-hint{font-size:10px;color:var(--ink-3);margin-top:4px}

.proposal-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px;margin-bottom:12px}
.proposal-card.AWAITING{border-left:3px solid var(--warn)}
.proposal-card.APPROVED{border-left:3px solid var(--good)}
.proposal-card.REJECTED{border-left:3px solid var(--bad);opacity:0.7}
.proposal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.proposal-meta{font-size:10px;color:var(--ink-3)}
.proposal-meta strong{color:var(--accent)}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:11px;margin-top:8px}
.diff-col{padding:10px;border-radius:5px;background:var(--bg-2)}
.diff-col.before{border-left:3px solid var(--ink-3)}
.diff-col.after{border-left:3px solid var(--good)}
.diff-col h5{font-size:10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.diff-row{display:grid;grid-template-columns:90px 1fr;gap:6px;padding:3px 0;font-size:10px}
.diff-row .lbl{color:var(--ink-3)}
.diff-row .val{color:var(--ink);word-break:break-word}
.diff-row.changed .val{background:rgba(255,184,58,0.12);padding:2px 5px;border-radius:3px;color:var(--warn)}
.proposal-actions{display:flex;gap:6px;margin-top:10px}

.audit-row{padding:8px 12px;border-bottom:1px solid var(--line);font-size:11px;display:grid;grid-template-columns:130px 1fr 110px;gap:10px;align-items:center}
.audit-row .who{color:var(--accent);font-size:10px}
.audit-row .ts{color:var(--ink-3);font-size:10px;text-align:right}

.subbrand-pill{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:0.05em}
.sb-Azevita{background:rgba(166,133,255,0.2);color:var(--accent-2)}
.sb-DeadSea{background:rgba(93,211,158,0.2);color:var(--good)}
.sb-MakeUp{background:rgba(255,107,107,0.18);color:var(--bad)}
.sb-SeaSoul{background:rgba(212,255,58,0.2);color:var(--accent)}
.sb-KeraSoul{background:rgba(255,184,58,0.2);color:var(--warn)}
.sb-Amyyglow{background:rgba(255,140,180,0.22);color:#ff8cb4}
.sb-Pilgrim{background:rgba(155,163,180,0.18);color:var(--ink-2)}

.chev{display:inline-block;width:14px;text-align:center;cursor:pointer;
  color:var(--ink-3);font-size:10px;transition:transform 0.15s;user-select:none}
.chev:hover{color:var(--accent)}
.chev.open{transform:rotate(90deg);color:var(--accent)}

.history-row td{background:rgba(166,133,255,0.04);border-bottom:1px solid var(--line);padding:0 !important}
.history-wrap{padding:14px 18px}
.history-wrap h5{font-size:10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.history-empty{padding:8px 14px;color:var(--ink-3);font-size:11px;font-style:italic}
.history-loading{padding:14px;color:var(--ink-3);font-size:11px;text-align:center}

.history-event{display:grid;grid-template-columns:140px 1fr 80px;gap:12px;padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,0.04);font-size:11px;align-items:start}
.history-event:last-child{border-bottom:none}
.history-event .he-when{color:var(--ink-3);font-size:10px}
.history-event .he-when .who{color:var(--accent);font-weight:600;display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.04em}
.history-event .he-desc{color:var(--ink);line-height:1.5}
.history-event .he-action{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;text-align:right}
.he-action.add{color:var(--good)}
.he-action.edit{color:var(--warn)}
.he-action.alloc{color:var(--accent)}
.he-action.rel{color:var(--ink-2)}
.he-action.app{color:var(--good)}
.he-action.rej{color:var(--bad)}

.he-diff{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:10px;margin:1px 0}
.he-diff .field{color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-size:9px}
.he-diff .before{color:var(--ink-2);text-decoration:line-through;background:rgba(255,107,107,0.08);padding:1px 5px;border-radius:3px}
.he-diff .arrow{color:var(--ink-3)}
.he-diff .after{color:var(--good);background:rgba(93,211,158,0.1);padding:1px 5px;border-radius:3px}

.pkg-icon{display:inline-block;width:18px;text-align:center;cursor:pointer;
  font-size:11px;color:var(--ink-3);transition:color 0.15s;user-select:none;margin-left:2px}
.pkg-icon:hover{color:var(--accent-2)}
.pkg-icon.open{color:var(--accent-2)}
.pkg-icon.has-data{color:var(--accent-2)}
.pkg-icon.has-data:hover,.pkg-icon.has-data.open{color:var(--accent)}

.pkg-row td{background:rgba(166,133,255,0.06);border-bottom:1px solid var(--line);padding:0 !important}
.pkg-wrap{padding:14px 18px}
.pkg-wrap h5{font-size:10px;color:var(--accent-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pkg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pkg-field{display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center;padding:6px 8px;background:var(--bg-2);border-radius:4px;font-size:11px}
.pkg-field .pkg-lbl{color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
.pkg-field .pkg-val{color:var(--ink)}
.pkg-field .pkg-val.empty{color:var(--ink-3);font-style:italic}
.pkg-edit-input{font-size:11px;padding:5px 8px}
.pkg-actions{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}

.pill-launch{background:rgba(166,133,255,0.20);color:var(--accent-2)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">AeliusParallel</div>
    <div class="login-title">FG Registry</div>
    <div class="login-sub">Master FG database — single source of truth</div>
    <div style="margin-bottom:10px">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@aeliusparallel.com" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()"/>
    </div>
    <div style="margin-bottom:10px">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()" id="login-btn">Sign In →</button>
    <div class="login-err" id="login-err"></div>
    <div class="test-pin-hint" style="font-size:10px;line-height:1.6">
      <strong>Authorized users only.</strong><br>
      Forgot password? Contact Sankalp or Manisha to reset.<br>
      <span style="color:var(--ink-3)">If your email isn't recognized, you don't have access.</span>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="header">
    <div style="display:flex;align-items:center;gap:11px">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <div class="name">FG Registry</div>
        <div class="sub">AeliusParallel</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="role" id="user-role"></div>
        <div class="label" id="user-label"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
  <div class="main" id="main"></div>
</div>

<div id="modal-container"></div>

<script>
// ============= STATE =============
var db;
var currentRole = null;       // 'MGMT' / 'PMS_EDITOR' / 'VIEWER_ALL' / 'VIEWER_VERIDIAN'
var currentLabel = null;      // display name
var currentEmail = null;      // authenticated email
var currentUser = null;       // Firebase Auth user object
var currentTab = 'veridian';
var fgList = [];              // all FGs (Veridian + TPL combined, distinguished by 'type')
var barcodeList = [];         // 1000 barcodes from fg_registry_barcodes
var pendingList = [];         // proposals awaiting approval
var unsubFG = null, unsubBarcodes = null, unsubPending = null;
var importDraft = null;
var sessionId = null;         // pseudo-session for audit (since no real auth)

// Inline history state
var expandedRows = {};        // { 'fg-<id>': true, 'bc-<barcode>': true }
var historyCache = {};        // { 'fg-<id>': [events], 'bc-<barcode>': [events] }
var historyLoading = {};      // { 'fg-<id>': true } while fetching

// Packaging panel state (per FG)
var expandedPkg = {};         // { fgId: true }
var pkgEditMode = {};         // { fgId: true } when in edit mode

// ============= INIT =============
window.addEventListener('DOMContentLoaded', function() {
  if (typeof firebase === 'undefined') {
    document.getElementById('login-err').textContent = 'Firebase failed to load.';
    return;
  }
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    var auth = firebase.auth();
    // Listen to auth state — reuse session if user is already signed in
    auth.onAuthStateChanged(function(user) {
      if (user && user.email) {
        var emailLower = user.email.toLowerCase();
        var roleEntry = window.ROLE_MAP[emailLower];
        if (!roleEntry) {
          // Authenticated but not in role map — sign out
          document.getElementById('login-err').textContent = 'Email "' + user.email + '" is not authorized to access the FG Registry. Contact Management.';
          auth.signOut();
          return;
        }
        currentUser = user;
        currentEmail = emailLower;
        currentRole = roleEntry.role;
        currentLabel = roleEntry.label;
        sessionId = currentEmail + '_' + Date.now();
        onLoggedIn();
      } else {
        showLogin();
        var emailEl = document.getElementById('login-email');
        if (emailEl) emailEl.focus();
      }
    });
  } catch(e) {
    document.getElementById('login-err').textContent = 'Init failed: ' + e.message;
  }
});

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
}

function doLogin() {
  var email = (document.getElementById('login-email').value || '').trim().toLowerCase();
  var password = document.getElementById('login-password').value;
  var err = document.getElementById('login-err');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Email and password required'; return; }
  // Pre-check role map (faster feedback than waiting for Firebase to fail)
  if (!window.ROLE_MAP[email]) {
    err.textContent = 'Email not recognized. Contact Sankalp or Manisha.';
    return;
  }
  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-btn').textContent = 'Signing in…';
  firebase.auth().signInWithEmailAndPassword(email, password).then(function() {
    // onAuthStateChanged handles the rest
  }).catch(function(e) {
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In →';
    var msg = 'Login failed';
    if (e.code === 'auth/wrong-password') msg = 'Incorrect password';
    else if (e.code === 'auth/user-not-found') msg = 'No account for this email — contact admin';
    else if (e.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Try later.';
    else if (e.code === 'auth/invalid-email') msg = 'Invalid email format';
    else if (e.message) msg = e.message;
    err.textContent = msg;
  });
}

function doLogout() {
  if (unsubFG) { unsubFG(); unsubFG = null; }
  if (unsubBarcodes) { unsubBarcodes(); unsubBarcodes = null; }
  if (unsubPending) { unsubPending(); unsubPending = null; }
  currentRole = null;
  currentLabel = null;
  currentEmail = null;
  currentUser = null;
  sessionId = null;
  fgList = [];
  barcodeList = [];
  pendingList = [];
  expandedRows = {};
  historyCache = {};
  historyLoading = {};
  expandedPkg = {};
  pkgEditMode = {};
  firebase.auth().signOut().then(function() {
    var em = document.getElementById('login-email');
    var pw = document.getElementById('login-password');
    if (em) em.value = '';
    if (pw) pw.value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In →';
    showLogin();
    if (em) em.focus();
  });
}

function onLoggedIn() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  // Avatar uses first letter of name
  var firstLetter = (currentLabel || '?').charAt(0).toUpperCase();
  document.getElementById('user-avatar').textContent = firstLetter;
  var roleLabel = (window.ROLE_CONFIG[currentRole] && window.ROLE_CONFIG[currentRole].label) || currentRole;
  document.getElementById('user-role').textContent = roleLabel;
  document.getElementById('user-label').textContent = currentLabel + ' · ' + currentEmail;
  // Default tab depends on role
  currentTab = 'veridian';
  subscribeData();
  renderTabs();
  renderMain();
}

function subscribeData() {
  unsubFG = db.collection('fg_registry').onSnapshot(function(snap) {
    fgList = [];
    snap.forEach(function(doc) {
      fgList.push(Object.assign({ _id: doc.id }, doc.data()));
    });
    fgList.sort(function(a, b) {
      // Sort by type, then sub-brand, then sku_code
      var t = (a.type || '').localeCompare(b.type || '');
      if (t !== 0) return t;
      var s = (a.sub_brand || '').localeCompare(b.sub_brand || '');
      if (s !== 0) return s;
      return (a.sku_code || '').localeCompare(b.sku_code || '', undefined, { numeric: true });
    });
    console.log('[REGISTRY] FG list: ' + fgList.length);
    renderMain();
  }, function(err) { console.error('[REGISTRY] FG subscribe error:', err); });

  unsubBarcodes = db.collection('fg_registry_barcodes').onSnapshot(function(snap) {
    barcodeList = [];
    snap.forEach(function(doc) {
      barcodeList.push(Object.assign({ _id: doc.id }, doc.data()));
    });
    barcodeList.sort(function(a, b) { return (a.barcode || '').localeCompare(b.barcode || ''); });
    console.log('[REGISTRY] Barcodes: ' + barcodeList.length);
    if (currentTab === 'barcodes' || currentTab === 'veridian') renderMain();
  }, function(err) { console.error('[REGISTRY] Barcode subscribe error:', err); });

  unsubPending = db.collection('fg_registry_pending').where('status', '==', 'AWAITING').onSnapshot(function(snap) {
    pendingList = [];
    snap.forEach(function(doc) {
      pendingList.push(Object.assign({ _id: doc.id }, doc.data()));
    });
    pendingList.sort(function(a, b) { return (b.proposedTs || 0) - (a.proposedTs || 0); });
    console.log('[REGISTRY] Pending: ' + pendingList.length);
    renderTabs();
    if (currentTab === 'approvals' || currentTab === 'my_proposals') renderMain();
  }, function(err) { console.error('[REGISTRY] Pending subscribe error:', err); });
}

// ============= TABS =============
function renderTabs() {
  var cfg = window.ROLE_CONFIG[currentRole] || {};
  var pendingCount = pendingList.length;
  var myPendingCount = pendingList.filter(function(p) { return p.proposedEmail === currentEmail; }).length;

  var tabs = [
    { id: 'veridian',  label: 'Veridian FG' },
    cfg.canSeeTPL ? { id: 'tpl', label: 'TPL FG' } : null,
    { id: 'barcodes',  label: 'Barcodes' },
    cfg.canAdd ? { id: 'add_fg', label: '+ Add FG' } : null,
    cfg.canSeeApprovals ? { id: 'approvals', label: 'Approvals', badge: pendingCount } : null,
    cfg.canSeeMyProposals ? { id: 'my_proposals', label: 'My Proposals', badge: myPendingCount } : null,
    cfg.canSeeAudit ? { id: 'audit', label: 'Audit Log' } : null,
    cfg.canImport ? { id: 'import', label: 'Import' } : null
  ].filter(Boolean);

  document.getElementById('tabs').innerHTML = tabs.map(function(t) {
    var badgeHtml = (t.badge && t.badge > 0) ? '<span class="tab-badge">' + t.badge + '</span>' : '';
    return '<div class="tab ' + (currentTab === t.id ? 'active' : '') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + badgeHtml + '</div>';
  }).join('');
}

function switchTab(id) {
  // Guard: if user clicks a tab they don't have access to, default to Veridian
  var cfg = window.ROLE_CONFIG[currentRole] || {};
  if (id === 'tpl' && !cfg.canSeeTPL) id = 'veridian';
  if (id === 'add_fg' && !cfg.canAdd) id = 'veridian';
  if (id === 'approvals' && !cfg.canSeeApprovals) id = 'veridian';
  if (id === 'my_proposals' && !cfg.canSeeMyProposals) id = 'veridian';
  if (id === 'audit' && !cfg.canSeeAudit) id = 'veridian';
  if (id === 'import' && !cfg.canImport) id = 'veridian';
  currentTab = id;
  renderTabs();
  renderMain();
}

function renderMain() {
  if (currentTab === 'veridian') return renderVeridianFG();
  if (currentTab === 'tpl') return renderTPL();
  if (currentTab === 'barcodes') return renderBarcodes();
  if (currentTab === 'add_fg') return renderAddFG();
  if (currentTab === 'approvals') return renderApprovals();
  if (currentTab === 'my_proposals') return renderMyProposals();
  if (currentTab === 'audit') return renderAudit();
  if (currentTab === 'import') return renderImport();
}

// ============= HELPERS =============
function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g, '&#39;'); }
function formatTs(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  return d.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function uniqueValues(arr, key) {
  var s = {};
  arr.forEach(function(o) { if (o[key]) s[o[key]] = true; });
  return Object.keys(s).sort();
}
var _renderTimer;
function debounceRender() { clearTimeout(_renderTimer); _renderTimer = setTimeout(renderMain, 200); }

function isMgmt() { return currentRole === 'MGMT'; }
function requiresApproval() { var c = window.ROLE_CONFIG[currentRole]; return c && c.requiresApproval; }
function canEdit() { var c = window.ROLE_CONFIG[currentRole]; return c && c.canEdit; }
function canAdd() { var c = window.ROLE_CONFIG[currentRole]; return c && c.canAdd; }
function isViewer() {
  return currentRole === 'VIEWER_ALL' || currentRole === 'VIEWER_VERIDIAN';
}

function statusPill(status) {
  if (status === 'Active') return '<span class="pill pill-good">' + escHtml(status) + '</span>';
  if (status === 'To be Launched') return '<span class="pill pill-launch">' + escHtml(status) + '</span>';
  if (status === 'Discontinued') return '<span class="pill pill-warn">' + escHtml(status) + '</span>';
  if (status === 'Deactivated') return '<span class="pill pill-muted">' + escHtml(status) + '</span>';
  return '<span class="pill pill-muted">' + escHtml(status || '?') + '</span>';
}

function subBrandPill(sb) {
  if (!sb) return '';
  var cls = 'sb-Pilgrim';
  if (sb.indexOf('Azevita') > -1) cls = 'sb-Azevita';
  else if (sb.indexOf('DeadSea') > -1) cls = 'sb-DeadSea';
  else if (sb.indexOf('MakeUp') > -1) cls = 'sb-MakeUp';
  else if (sb.indexOf('SeaSoul') > -1) cls = 'sb-SeaSoul';
  else if (sb.indexOf('KeraSoul') > -1) cls = 'sb-KeraSoul';
  else if (sb.indexOf('Amyyglow') > -1) cls = 'sb-Amyyglow';
  return '<span class="subbrand-pill ' + cls + '">' + escHtml(sb) + '</span>';
}

// Auto-suggest next SKU code for a sub-brand (or Amyyglow product type)
function suggestNextSkuCode(subBrand, productType) {
  var prefix;
  if (subBrand === 'Amyyglow') {
    if (!productType) return '';
    prefix = window.AMYYGLOW_PRODUCT_TYPES[productType];
  } else {
    prefix = window.SUBBRAND_PREFIX[subBrand];
  }
  if (!prefix) return '';
  var maxNum = 0;
  fgList.forEach(function(f) {
    if (!f.sku_code) return;
    var m = f.sku_code.match(new RegExp('^' + prefix + '(\\d+)$'));
    if (m) {
      var n = parseInt(m[1], 10);
      if (n > maxNum) maxNum = n;
    }
  });
  return prefix + (maxNum + 1);
}

// Validate SKU code format
function validateSkuCode(code) {
  if (!code) return 'Code required';
  var prefixes = Object.values(window.SUBBRAND_PREFIX)
    .concat(Object.values(window.AMYYGLOW_PRODUCT_TYPES))
    .concat([window.LEGACY_PREFIX]);
  // Sort by length DESC so longer prefixes match first (avoid AMGR matching before AMGFK etc.)
  prefixes.sort(function(a, b) { return b.length - a.length; });
  var pattern = '^(' + prefixes.join('|') + ')\\d+$';
  if (!new RegExp(pattern).test(code)) {
    return 'Code must match prefix + number (e.g., SSAZ17, AMGFK3). Valid prefixes: ' + prefixes.join(', ');
  }
  return null;
}

// ============= INLINE HISTORY =============
function toggleHistory(rowKey, targetType, targetId) {
  if (expandedRows[rowKey]) {
    delete expandedRows[rowKey];
    renderMain();
    return;
  }
  expandedRows[rowKey] = true;
  if (historyCache[rowKey]) { renderMain(); return; }
  historyLoading[rowKey] = true;
  renderMain();
  fetchHistory(targetType, targetId).then(function(events) {
    historyCache[rowKey] = events;
    delete historyLoading[rowKey];
    renderMain();
  }).catch(function(err) {
    console.error('History fetch failed:', err);
    historyCache[rowKey] = [];
    delete historyLoading[rowKey];
    renderMain();
  });
}

function fetchHistory(targetType, targetId) {
  return db.collection('fg_registry_audit').orderBy('ts', 'desc').limit(500).get().then(function(snap) {
    var events = [];
    snap.forEach(function(doc) {
      var e = doc.data();
      e._id = doc.id;
      if (targetType === 'fg') {
        // Match if: target == fgId OR details.fgId == fgId OR e.fgId == fgId
        var match = (e.target === targetId) ||
                    (e.details && e.details.fgId === targetId) ||
                    (e.fgId === targetId);
        if (match) events.push(e);
      } else if (targetType === 'bc') {
        // ALLOCATE_BARCODE / RELEASE_BARCODE with matching barcode field
        if ((e.action === 'ALLOCATE_BARCODE' || e.action === 'RELEASE_BARCODE') && e.barcode === targetId) {
          events.push(e);
        }
      }
    });
    return events;
  });
}

function renderHistoryRow(rowKey, colSpan) {
  var loading = historyLoading[rowKey];
  var events = historyCache[rowKey];
  var inner;
  if (loading) {
    inner = '<div class="history-loading">Loading change history...</div>';
  } else if (!events || events.length === 0) {
    inner = '<div class="history-empty">No change history yet for this record.</div>';
  } else {
    inner = events.map(function(e) { return formatHistoryEvent(e); }).join('');
  }
  return '<tr class="history-row"><td colspan="' + colSpan + '">' +
    '<div class="history-wrap">' +
    '<h5>Change history' + (events ? ' (' + events.length + ' event' + (events.length !== 1 ? 's' : '') + ')' : '') + '</h5>' +
    inner +
    '</div></td></tr>';
}

function formatHistoryEvent(e) {
  var when = formatTs(e.ts);
  var who = escHtml(e.actorLabel || e.actorEmail || e.actorRole || '?');
  var desc = describeHistoryEvent(e);
  var actionBadge = '';
  var a = e.action || '';
  if (a.indexOf('ADD_') === 0) actionBadge = '<span class="he-action add">CREATED</span>';
  else if (a.indexOf('EDIT_') === 0) actionBadge = '<span class="he-action edit">EDIT</span>';
  else if (a === 'ALLOCATE_BARCODE') actionBadge = '<span class="he-action alloc">ALLOC</span>';
  else if (a === 'RELEASE_BARCODE') actionBadge = '<span class="he-action rel">RELEASE</span>';
  else if (a.indexOf('APPROVE_') === 0) actionBadge = '<span class="he-action app">APPROVED</span>';
  else if (a.indexOf('REJECT_') === 0) actionBadge = '<span class="he-action rej">REJECTED</span>';
  else if (a === 'IMPORT_MASTER') actionBadge = '<span class="he-action add">IMPORT</span>';
  return '<div class="history-event">' +
    '<div class="he-when"><span class="who">' + who + '</span>' + when + '</div>' +
    '<div class="he-desc">' + desc + '</div>' +
    '<div>' + actionBadge + '</div>' +
    '</div>';
}

function describeHistoryEvent(e) {
  var a = e.action || '';
  if (a === 'ADD_VERIDIAN_FG' || a === 'ADD_TPL_FG') {
    var d = e.details || {};
    var s = '';
    if (d.sku_code) s += '<strong style="color:var(--accent)">' + escHtml(d.sku_code) + '</strong> ';
    s += escHtml(d.name || '');
    if (d.sub_brand) s += ' <span style="color:var(--ink-3)">(' + escHtml(d.sub_brand) + (d.product_type ? ' / ' + escHtml(d.product_type) : '') + ')</span>';
    return s;
  }
  if (a === 'EDIT_VERIDIAN_FG' || a === 'EDIT_TPL_FG') {
    var before = e.before || {};
    var after = e.after || {};
    var fields = ['sku_code','name','brand','sub_brand','product_type','mrp','unit_size','status','barcode',
                  'pkg_bottle','pkg_closure','pkg_seal','pkg_label','pkg_inner','pkg_carton'];
    var fieldLabels = {
      pkg_bottle:'Bottle/Jar/Tube', pkg_closure:'Closure', pkg_seal:'Seal',
      pkg_label:'Label', pkg_inner:'Inner', pkg_carton:'Monocarton'
    };
    var changes = [];
    fields.forEach(function(f) {
      var b = before[f];
      var x = after[f];
      if (x === undefined) return;
      if (b === x) return;
      if ((b == null || b === '') && (x == null || x === '')) return;
      var bDisp = (b == null || b === '') ? '(empty)' : escHtml(String(b));
      var xDisp = (x == null || x === '') ? '(empty)' : escHtml(String(x));
      var labelDisp = fieldLabels[f] || f;
      changes.push('<div><span style="color:var(--accent)">' + escHtml(labelDisp) + ':</span> ' +
        '<span style="text-decoration:line-through;color:var(--ink-3)">' + bDisp + '</span> ' +
        '<span style="color:var(--ink-3)">→</span> ' +
        '<span style="color:var(--good)">' + xDisp + '</span></div>');
    });
    if (changes.length === 0) return '<span style="color:var(--ink-3)">(no field changes detected)</span>';
    var html = changes.join('');
    if (e.releasedBarcode) html += '<div style="margin-top:4px;color:var(--warn);font-size:10px">↳ Barcode auto-released to pool</div>';
    return html;
  }
  if (a === 'ALLOCATE_BARCODE') {
    return '<span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span> → <strong>' + escHtml(e.fgSkuCode || '') + '</strong>';
  }
  if (a === 'RELEASE_BARCODE') {
    return 'Released <span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span> from <strong>' + escHtml(e.fgSkuCode || '') + '</strong>';
  }
  if (a.indexOf('APPROVE_') === 0) {
    var what = a.replace('APPROVE_','').replace(/_/g,' ').toLowerCase();
    return escHtml(what) + ' <span style="color:var(--ink-3)">(originally proposed by ' + escHtml(e.proposedRole || '') + ')</span>';
  }
  if (a.indexOf('REJECT_') === 0) {
    var what2 = a.replace('REJECT_','').replace(/_/g,' ').toLowerCase();
    return escHtml(what2) + (e.reason ? ' <span style="color:var(--ink-3)">— "' + escHtml(e.reason) + '"</span>' : '');
  }
  if (a === 'IMPORT_MASTER') {
    return '<span style="color:var(--ink-3)">Created during master file import</span>';
  }
  return escHtml(a);
}

// ============= VERIDIAN FG TAB =============
function renderVeridianFG() {
  var main = document.getElementById('main');
  var search = (window._vSearch || '').toLowerCase().trim();
  var subBrandFilter = window._vSubBrand || 'all';
  var statusFilter = window._vStatus || 'all';

  var veridian = fgList.filter(function(f) { return f.type === 'veridian'; });
  var visible = veridian.filter(function(f) {
    if (subBrandFilter !== 'all' && f.sub_brand !== subBrandFilter) return false;
    if (statusFilter !== 'all' && f.status !== statusFilter) return false;
    if (search) {
      var hay = ((f.sku_code||'') + ' ' + (f.name||'') + ' ' + (f.barcode||'')).toLowerCase();
      if (hay.indexOf(search) === -1) return false;
    }
    return true;
  });

  var subBrands = uniqueValues(veridian, 'sub_brand');
  var activeCount = veridian.filter(function(f) { return f.status === 'Active'; }).length;
  var discCount = veridian.filter(function(f) { return f.status === 'Discontinued'; }).length;
  var deactCount = veridian.filter(function(f) { return f.status === 'Deactivated'; }).length;
  var withBarcode = veridian.filter(function(f) { return f.barcode; }).length;

  var html = '<div class="page-title"><h1>Veridian FG Register</h1>' +
    '<div class="sub">Master list of all Veridian Finished Goods (Azevita, DeadSea, KeraSoul, SeaSoul, MakeUp).</div></div>';

  html += '<div class="kpi-row">' +
    '<div class="kpi"><div class="kpi-val">' + veridian.length + '</div><div class="kpi-label">Total</div></div>' +
    '<div class="kpi good"><div class="kpi-val">' + activeCount + '</div><div class="kpi-label">Active</div></div>' +
    '<div class="kpi warn"><div class="kpi-val">' + discCount + '</div><div class="kpi-label">Discontinued</div></div>' +
    '<div class="kpi"><div class="kpi-val">' + deactCount + '</div><div class="kpi-label">Deactivated</div></div>' +
    '<div class="kpi info"><div class="kpi-val">' + withBarcode + '</div><div class="kpi-label">With Barcode</div></div>' +
    '</div>';

  if (veridian.length === 0) {
    html += '<div class="banner info">📦 No Veridian FGs yet. Use <strong>+ Add FG</strong> tab or <strong>Import</strong> to seed.</div>';
    main.innerHTML = html;
    return;
  }

  // Filter bar
  html += '<div class="filter-bar">';
  html += '<input placeholder="Search SKU code, name, barcode..." value="' + escAttr(window._vSearch || '') + '" oninput="window._vSearch=this.value;debounceRender()"/>';
  html += '<select onchange="window._vSubBrand=this.value;renderMain()"><option value="all">All sub-brands</option>';
  subBrands.forEach(function(b) { html += '<option value="' + escAttr(b) + '"' + (subBrandFilter === b ? ' selected' : '') + '>' + escHtml(b) + '</option>'; });
  html += '</select>';
  html += '<select onchange="window._vStatus=this.value;renderMain()"><option value="all">All statuses</option>';
  window.STATUS_OPTIONS.forEach(function(s) { html += '<option value="' + s + '"' + (statusFilter === s ? ' selected' : '') + '>' + s + '</option>'; });
  html += '</select>';
  html += '<button onclick="window._vSearch=null;window._vSubBrand=null;window._vStatus=null;renderMain()">Clear</button>';
  html += '<div style="margin-left:auto;font-size:11px;color:var(--ink-3)">Showing ' + visible.length + ' / ' + veridian.length + '</div>';
  html += '</div>';

  // Table
  html += '<div class="panel"><div class="table-wrap"><table class="fg-table">';
  html += '<thead><tr>' +
    '<th style="width:24px"></th>' +
    '<th style="width:80px">SKU Code</th>' +
    '<th>Canonical Name</th>' +
    '<th style="width:100px">Sub-Brand</th>' +
    '<th style="width:90px">Product Type</th>' +
    '<th style="width:120px">Barcode</th>' +
    '<th style="width:80px">MRP</th>' +
    '<th style="width:80px">Unit</th>' +
    '<th style="width:100px">Status</th>' +
    '<th style="width:200px">Actions</th>' +
    '</tr></thead><tbody>';

  if (visible.length === 0) {
    html += '<tr><td colspan="10" class="empty">No FGs match the current filters</td></tr>';
  } else {
    visible.forEach(function(f) {
      var rowKey = 'fg-' + f._id;
      var isOpen = !!expandedRows[rowKey];

function onAddSubBrandChange() {
  var sb = document.getElementById('add-subBrand').value;
  var codeInput = document.getElementById('add-skuCode');
  var hint = document.getElementById('add-codeHint');
  var ptWrap = document.getElementById('add-productType-wrap');
  var ptSelect = document.getElementById('add-productType');

  if (sb === 'Amyyglow') {
    // Show product type dropdown, clear SKU until type chosen
    ptWrap.style.display = '';
    ptSelect.value = '';
    codeInput.value = '';
    hint.innerHTML = 'Choose Product Type to get an SKU code suggestion.';
    return;
  } else {
    // Hide product type, suggest SKU directly
    ptWrap.style.display = 'none';
    ptSelect.value = '';
  }

  if (!sb) {
    codeInput.value = '';
    hint.textContent = '—';
    return;
  }
  var suggested = suggestNextSkuCode(sb);
  codeInput.value = suggested;
  hint.innerHTML = 'Suggested: <strong style="color:var(--accent)">' + suggested + '</strong> — you can override if needed.';
}

function submitAddVeridian() {
  var err = document.getElementById('add-err');
  err.textContent = '';
  var subBrand = document.getElementById('add-subBrand').value.trim();
  var productType = '';
  if (subBrand === 'Amyyglow') {
    productType = document.getElementById('add-productType').value.trim();
    if (!productType) return err.textContent = 'Product Type required for Amyyglow';
  }
  var skuCode = document.getElementById('add-skuCode').value.trim().toUpperCase();
  var name = document.getElementById('add-name').value.trim();
  var mrp = parseFloat(document.getElementById('add-mrp').value) || null;
  var unitSize = document.getElementById('add-unitSize').value.trim();
  var status = document.getElementById('add-status').value;

  if (!subBrand) return err.textContent = 'Sub-Brand required';
  if (!name) return err.textContent = 'Canonical name required';
  var codeErr = validateSkuCode(skuCode);
  if (codeErr) return err.textContent = codeErr;

  // Reject KSOL prefix for new SKUs
  if (skuCode.indexOf(window.LEGACY_PREFIX) === 0) {
    return err.textContent = 'KSOL prefix is legacy — cannot create new KSOL SKUs.';
  }

  // For Amyyglow: enforce that SKU code matches the picked product type prefix
  if (subBrand === 'Amyyglow' && productType) {
    var expectedPrefix = window.AMYYGLOW_PRODUCT_TYPES[productType];
    if (skuCode.indexOf(expectedPrefix) !== 0) {
      return err.textContent = 'SKU code must start with ' + expectedPrefix + ' for Amyyglow ' + productType + '.';
    }
  }

  // Uniqueness check
  if (fgList.some(function(f) { return (f.sku_code || '').toUpperCase() === skuCode; })) {
    return err.textContent = 'SKU code "' + skuCode + '" already exists.';
  }
  if (fgList.some(function(f) { return (f.name || '').toLowerCase() === name.toLowerCase(); })) {
    return err.textContent = 'A FG with this name already exists.';
  }

  var now = Date.now();
  var payload = {
    type: 'veridian',
    sku_code: skuCode,
    name: name,
    brand: 'Veridian',
    sub_brand: subBrand,
    product_type: productType || null,
    mrp: mrp,
    unit_size: unitSize,
    status: status,
    barcode: ''
  };

  // Capture packaging fields (all optional)
  window.PACKAGING_FIELDS.forEach(function(fld) {
    var inp = document.getElementById('add-' + fld.key);
    payload[fld.key] = inp ? inp.value.trim() : '';
  });

  if (requiresApproval()) {
    db.collection('fg_registry_pending').add({
      proposalType: 'ADD_FG',
      proposedRole: currentRole,
      proposedEmail: currentEmail,
      proposedLabel: currentLabel,
      proposedSession: sessionId,
      proposedTs: now,
      status: 'AWAITING',
      payload: payload
    }).then(function() {
      alert('Submitted for approval.\n\nFG: ' + skuCode + ' ' + name);
      var clearIds = ['add-subBrand','add-productType','add-skuCode','add-name','add-mrp','add-unitSize'];
      window.PACKAGING_FIELDS.forEach(function(fld) { clearIds.push('add-' + fld.key); });
      clearIds.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
      var ptWrap = document.getElementById('add-productType-wrap');
      if (ptWrap) ptWrap.style.display = 'none';
      currentTab = 'my_proposals';
      renderTabs(); renderMain();
    }).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  } else {
    payload.createdTs = now;
    payload.createdRole = currentRole;
    payload.createdSession = sessionId;
    payload.updatedTs = now;
    db.collection('fg_registry').add(payload).then(function(ref) {
      writeAudit('ADD_VERIDIAN_FG', { fgId: ref.id, sku_code: skuCode, name: name, sub_brand: subBrand, product_type: productType });
      alert('Added: ' + skuCode + ' ' + name);
      var clearIds = ['add-subBrand','add-productType','add-skuCode','add-name','add-mrp','add-unitSize'];
      window.PACKAGING_FIELDS.forEach(function(fld) { clearIds.push('add-' + fld.key); });
      clearIds.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.value = '';
      });
      var ptWrap = document.getElementById('add-productType-wrap');
      if (ptWrap) ptWrap.style.display = 'none';
      currentTab = 'veridian';
      renderTabs(); renderMain();
    }).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  }
}

function submitAddTPL() {
  var err = document.getElementById('addt-err');
  err.textContent = '';
  var name = document.getElementById('addt-name').value.trim();
  var brand = document.getElementById('addt-brand').value.trim();
  var subBrand = document.getElementById('addt-subBrand').value.trim();
  var unitSize = document.getElementById('addt-unitSize').value.trim();
  var status = document.getElementById('addt-status').value;

  if (!name) return err.textContent = 'Product name required';
  if (!brand) return err.textContent = 'Brand required';
  if (fgList.some(function(f) { return f.type === 'tpl' && (f.name || '').toLowerCase() === name.toLowerCase(); })) {
    return err.textContent = 'A TPL FG with this name already exists.';
  }

  var now = Date.now();
  var payload = {
    type: 'tpl',
    name: name,
    brand: brand,
    sub_brand: subBrand || brand,
    unit_size: unitSize,
    status: status
  };

  // Capture packaging fields (all optional)
  window.PACKAGING_FIELDS.forEach(function(fld) {
    var inp = document.getElementById('addt-' + fld.key);
    payload[fld.key] = inp ? inp.value.trim() : '';
  });

  function clearTplForm() {
    var clearIds = ['addt-name','addt-brand','addt-subBrand','addt-unitSize'];
    window.PACKAGING_FIELDS.forEach(function(fld) { clearIds.push('addt-' + fld.key); });
    clearIds.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
  }

  if (requiresApproval()) {
    db.collection('fg_registry_pending').add({
      proposalType: 'ADD_FG',
      proposedRole: currentRole,
      proposedEmail: currentEmail,
      proposedLabel: currentLabel,
      proposedSession: sessionId,
      proposedTs: now,
      status: 'AWAITING',
      payload: payload
    }).then(function() {
      alert('Submitted for approval.\n\nTPL FG: ' + name);
      clearTplForm();
      currentTab = 'my_proposals';
      renderTabs(); renderMain();
    }).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  } else {
    payload.createdTs = now;
    payload.createdRole = currentRole;
    payload.createdSession = sessionId;
    payload.updatedTs = now;
    db.collection('fg_registry').add(payload).then(function(ref) {
      writeAudit('ADD_TPL_FG', { fgId: ref.id, name: name, brand: brand });
      alert('Added: ' + name);
      clearTplForm();
      currentTab = 'tpl';
      renderTabs(); renderMain();
    }).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  }
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function saveEditFG(id) {
  var err = document.getElementById('ed-err');
  err.textContent = '';
  var f = fgList.find(function(x) { return x._id === id; });
  if (!f) return;
  var isVeridian = f.type === 'veridian';
  var name = document.getElementById('ed-name').value.trim();
  var status = document.getElementById('ed-status').value;
  var unitSize = document.getElementById('ed-unitSize').value.trim();

  var update = { name: name, status: status, unit_size: unitSize, updatedTs: Date.now() };

  if (isVeridian) {
    var skuCode = document.getElementById('ed-skuCode').value.trim().toUpperCase();
    var subBrand = document.getElementById('ed-subBrand').value.trim();
    var mrp = parseFloat(document.getElementById('ed-mrp').value) || null;
    var codeErr = validateSkuCode(skuCode);
    if (codeErr) return err.textContent = codeErr;
    update.sku_code = skuCode;
    update.sub_brand = subBrand;
    update.mrp = mrp;
    // Product type only for Amyyglow
    if (subBrand === 'Amyyglow') {
      var pt = document.getElementById('ed-productType').value.trim();
      if (!pt) return err.textContent = 'Product Type required for Amyyglow';
      update.product_type = pt;
    } else {
      update.product_type = null;
    }
  } else {
    var brand = document.getElementById('ed-brand').value.trim();
    var subBrand2 = document.getElementById('ed-subBrand').value.trim();
    if (!brand) return err.textContent = 'Brand required';
    update.brand = brand;
    update.sub_brand = subBrand2 || brand;
  }

  if (!name) return err.textContent = 'Name required';

  // Detect deactivation with barcode → ask about release
  var becomingDeactivated = (status === 'Deactivated' && f.status !== 'Deactivated');
  var hasBarcode = isVeridian && f.barcode;
  var releaseBarcode = false;
  if (becomingDeactivated && hasBarcode) {
    releaseBarcode = confirm('This FG has barcode ' + f.barcode + ' allocated.\n\nDeactivating: do you want to release the barcode back to the available pool?\n\nOK = Release\nCancel = Keep barcode allocated to this deactivated FG');
  }

  // Build the change set
  var original = {
    sku_code: f.sku_code, name: f.name, brand: f.brand, sub_brand: f.sub_brand,
    mrp: f.mrp, unit_size: f.unit_size, status: f.status, barcode: f.barcode
  };

  if (requiresApproval()) {
    db.collection('fg_registry_pending').add({
      proposalType: 'EDIT_FG',
      proposedRole: currentRole,
      proposedEmail: currentEmail,
      proposedLabel: currentLabel,
      proposedSession: sessionId,
      proposedTs: Date.now(),
      status: 'AWAITING',
      fgId: id,
      fgType: f.type,
      original: original,
      payload: update,
      releaseBarcodeOnApprove: releaseBarcode
    }).then(function() {
      closeModal();
      alert('Edit submitted for approval.');
    }).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  } else {
    var batch = db.batch();
    batch.update(db.collection('fg_registry').doc(id), update);
    if (releaseBarcode) {
      batch.update(db.collection('fg_registry').doc(id), { barcode: '' });
      // Find barcode doc and free it
      var bcDoc = barcodeList.find(function(b) { return b.barcode === f.barcode; });
      if (bcDoc) {
        batch.update(db.collection('fg_registry_barcodes').doc(bcDoc._id), {
          status: 'available', fgId: '', fgName: '', fgSubBrand: '', fgSkuCode: '',
          releasedTs: Date.now(), releasedBy: currentRole
        });
      }
    }
    var auditRef = db.collection('fg_registry_audit').doc(String(Date.now()));
    batch.set(auditRef, {
      ts: Date.now(), actorRole: currentRole, actorEmail: currentEmail, actorLabel: currentLabel, actorSession: sessionId,
      action: isVeridian ? 'EDIT_VERIDIAN_FG' : 'EDIT_TPL_FG',
      target: id, before: original, after: update, releasedBarcode: releaseBarcode
    });
    batch.commit().then(closeModal).catch(function(e) { err.textContent = 'Failed: ' + e.message; });
  }
}

// ============= INLINE HISTORY =============
function toggleHistory(rowKey, targetType, targetId) {
  if (expandedRows[rowKey]) {
    delete expandedRows[rowKey];
    renderMain();
    return;
  }
  expandedRows[rowKey] = true;
  if (historyCache[rowKey]) {
    renderMain();
    return;
  }
  if (historyLoading[rowKey]) return;
  historyLoading[rowKey] = true;
  renderMain();
  fetchHistory(targetType, targetId).then(function(events) {
    historyCache[rowKey] = events;
    delete historyLoading[rowKey];
    renderMain();
  }).catch(function(err) {
    console.error('History fetch error:', err);
    historyCache[rowKey] = [];
    delete historyLoading[rowKey];
    renderMain();
  });
}

function fetchHistory(targetType, targetId) {
  // Pull all audit entries and filter client-side (no composite index needed)
  return db.collection('fg_registry_audit').orderBy('ts', 'desc').limit(500).get().then(function(snap) {
    var events = [];
    snap.forEach(function(d) {
      var e = d.data();
      var match = false;
      if (targetType === 'fg') {
        // Match by direct target field OR details.fgId
        if (e.target === targetId) match = true;
        else if (e.details && e.details.fgId === targetId) match = true;
      } else if (targetType === 'bc') {
        // Barcode events: ALLOCATE_BARCODE / RELEASE_BARCODE — match by barcode field
        if ((e.action === 'ALLOCATE_BARCODE' || e.action === 'RELEASE_BARCODE') && e.barcode === targetId) match = true;
      }
      if (match) events.push(Object.assign({_id: d.id}, e));
    });
    return events;
  });
}

function renderHistoryRow(rowKey, colSpan) {
  if (!expandedRows[rowKey]) return '';
  var html = '<tr class="history-row"><td colspan="' + colSpan + '">';
  if (historyLoading[rowKey]) {
    html += '<div class="history-loading">⏳ Loading history…</div>';
  } else {
    var events = historyCache[rowKey] || [];
    if (events.length === 0) {
      html += '<div class="history-wrap"><h5>Change History</h5><div class="history-empty">No history events recorded for this record yet.</div></div>';
    } else {
      html += '<div class="history-wrap"><h5>Change History (' + events.length + ' events)</h5>';
      events.forEach(function(e) {
        html += formatHistoryEvent(e);
      });
      html += '</div>';
    }
  }
  html += '</td></tr>';
  return html;
}

function formatHistoryEvent(e) {
  var actorName = e.actorLabel || e.actorEmail || e.actorRole || '?';
  var ts = formatTs(e.ts);
  var html = '<div class="history-event">';
  html += '<div class="he-when"><span class="who">' + escHtml(actorName) + '</span>' + escHtml(ts) + '</div>';
  html += '<div class="he-desc">' + describeHistoryEvent(e) + '</div>';
  html += '<div class="he-action ' + actionTagClass(e.action) + '">' + escHtml(actionTagLabel(e.action)) + '</div>';
  html += '</div>';
  return html;
}

function actionTagClass(action) {
  if (!action) return '';
  if (action.indexOf('ADD_') === 0) return 'add';
  if (action.indexOf('EDIT_') === 0) return 'edit';
  if (action === 'ALLOCATE_BARCODE') return 'alloc';
  if (action === 'RELEASE_BARCODE') return 'rel';
  if (action.indexOf('APPROVE_') === 0) return 'app';
  if (action.indexOf('REJECT_') === 0) return 'rej';
  return '';
}

function actionTagLabel(action) {
  if (!action) return '';
  if (action === 'ADD_VERIDIAN_FG') return 'CREATE';
  if (action === 'ADD_TPL_FG') return 'CREATE';
  if (action === 'EDIT_VERIDIAN_FG') return 'EDIT';
  if (action === 'EDIT_TPL_FG') return 'EDIT';
  if (action === 'ALLOCATE_BARCODE') return 'ALLOC';
  if (action === 'RELEASE_BARCODE') return 'RELEASE';
  if (action === 'IMPORT_MASTER') return 'IMPORT';
  if (action.indexOf('APPROVE_') === 0) return 'APPROVED';
  if (action.indexOf('REJECT_') === 0) return 'REJECTED';
  return action.replace(/_/g, ' ');
}

function describeHistoryEvent(e) {
  var a = e.action || '';

  if (a === 'ADD_VERIDIAN_FG' || a === 'ADD_TPL_FG') {
    var d = e.details || {};
    var label = (a === 'ADD_VERIDIAN_FG') ? 'Created Veridian FG' : 'Created TPL FG';
    var bits = [];
    if (d.sku_code) bits.push('<span class="mono" style="color:var(--accent)">' + escHtml(d.sku_code) + '</span>');
    if (d.name) bits.push('<strong>' + escHtml(d.name) + '</strong>');
    if (d.brand && a === 'ADD_TPL_FG') bits.push('(' + escHtml(d.brand) + ')');
    if (d.sub_brand && d.sub_brand !== 'Veridian') bits.push('· ' + escHtml(d.sub_brand));
    if (d.product_type) bits.push('· ' + escHtml(d.product_type));
    return label + ': ' + bits.join(' ');
  }

  if (a === 'EDIT_VERIDIAN_FG' || a === 'EDIT_TPL_FG') {
    var before = e.before || {};
    var after = e.after || {};
    var diffs = [];
    var fieldsToWatch = ['sku_code','name','brand','sub_brand','product_type','mrp','unit_size','status','barcode',
                         'pkg_bottle','pkg_closure','pkg_seal','pkg_label','pkg_inner','pkg_carton'];
    var fldLabels = {
      pkg_bottle:'Bottle/Jar/Tube', pkg_closure:'Closure', pkg_seal:'Seal',
      pkg_label:'Label', pkg_inner:'Inner', pkg_carton:'Monocarton'
    };
    fieldsToWatch.forEach(function(k) {
      var bv = before[k]; var av = after[k];
      if (bv == null) bv = '';
      if (av == null) av = '';
      if (String(bv) !== String(av) && av !== undefined) {
        var lbl = fldLabels[k] || k;
        diffs.push('<div class="he-diff"><span class="field">' + escHtml(lbl) + '</span>' +
          '<span class="before">' + escHtml(bv || '—') + '</span>' +
          '<span class="arrow">→</span>' +
          '<span class="after">' + escHtml(av || '—') + '</span></div>');
      }
    });
    if (diffs.length === 0) {
      var note = e.releasedBarcode ? ' (released barcode)' : ' (no field-level changes recorded)';
      return 'Edited' + note;
    }
    var prefix = '';
    if (e.packagingOnly) prefix = '<span style="color:var(--accent-2)">📦 Packaging change</span><br>';
    else if (e.releasedBarcode) prefix = '<span style="color:var(--warn)">⚠ Edit + barcode released</span><br>';
    return prefix + diffs.join('');
  }

  if (a === 'ALLOCATE_BARCODE') {
    return 'Allocated barcode <span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span>' +
      (e.fgSkuCode ? ' to <strong>' + escHtml(e.fgSkuCode) + '</strong>' : '');
  }

  if (a === 'RELEASE_BARCODE') {
    return 'Released barcode <span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span>' +
      (e.fgSkuCode ? ' from <strong>' + escHtml(e.fgSkuCode) + '</strong>' : '') +
      ' back to available pool';
  }

  if (a.indexOf('APPROVE_') === 0) {
    var prop = a.replace('APPROVE_', '');
    return '<span style="color:var(--good)">✓ Approved</span> ' + escHtml(prop) + ' (originally proposed by ' + escHtml(e.proposedRole || '') + ')';
  }

  if (a.indexOf('REJECT_') === 0) {
    var prop2 = a.replace('REJECT_', '');
    return '<span style="color:var(--bad)">✗ Rejected</span> ' + escHtml(prop2) +
      (e.reason ? ' — <em>' + escHtml(e.reason) + '</em>' : '');
  }

  if (a === 'IMPORT_MASTER') {
    var dd = e.details || {};
    return '<strong style="color:var(--accent)">Bulk import</strong> from ' + escHtml(dd.fileName || 'master file') +
      ' (' + (dd.fgCount || 0) + ' FGs, ' + (dd.bcCount || 0) + ' barcodes)';
  }

  return escHtml(a) + (e.details ? ' — ' + escHtml(JSON.stringify(e.details).substring(0, 100)) : '');
}

// ============= PACKAGING PANEL =============
function togglePackaging(fgId) {
  if (expandedPkg[fgId]) {
    delete expandedPkg[fgId];
    delete pkgEditMode[fgId];
  } else {
    expandedPkg[fgId] = true;
  }
  renderMain();
}

function fgHasPackagingData(f) {
  if (!f) return false;
  for (var i = 0; i < window.PACKAGING_FIELDS.length; i++) {
    var v = f[window.PACKAGING_FIELDS[i].key];
    if (v && String(v).trim()) return true;
  }
  return false;
}

function renderPackagingRow(fgId, colSpan) {
  if (!expandedPkg[fgId]) return '';
  var f = fgList.find(function(x) { return x._id === fgId; });
  if (!f) return '';
  var inEdit = !!pkgEditMode[fgId];
  var canEditPkg = canEdit();

  var html = '<tr class="pkg-row"><td colspan="' + colSpan + '"><div class="pkg-wrap">';
  html += '<h5><span>📦 Packaging — ' + escHtml(f.sku_code || f.name || '') + '</span>';
  if (canEditPkg && !inEdit) {
    html += '<button onclick="startPkgEdit(\'' + fgId + '\')" style="font-size:10px;padding:4px 9px">Edit packaging</button>';
  }
  html += '</h5>';

  if (inEdit) {
    html += '<div class="pkg-grid">';
    window.PACKAGING_FIELDS.forEach(function(fld) {
      var current = f[fld.key] || '';
      html += '<div class="pkg-field">';
      html += '<div class="pkg-lbl">' + escHtml(fld.label) + '</div>';
      html += '<input class="pkg-edit-input" id="pkg-' + fgId + '-' + fld.key + '" value="' + escAttr(current) + '" placeholder="—"/>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="pkg-actions">';
    html += '<button onclick="cancelPkgEdit(\'' + fgId + '\')">Cancel</button>';
    html += '<button class="primary" onclick="savePackaging(\'' + fgId + '\')">' + (requiresApproval() ? 'Submit for Approval' : 'Save') + '</button>';
    html += '</div>';
    html += '<div id="pkg-err-' + fgId + '" style="color:var(--bad);font-size:11px;margin-top:6px"></div>';
  } else {
    html += '<div class="pkg-grid">';
    window.PACKAGING_FIELDS.forEach(function(fld) {
      var v = f[fld.key];
      var isEmpty = !v || !String(v).trim();
      html += '<div class="pkg-field">';
      html += '<div class="pkg-lbl">' + escHtml(fld.label) + '</div>';
      html += '<div class="pkg-val ' + (isEmpty ? 'empty' : '') + '">' + (isEmpty ? '—' : escHtml(v)) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div></td></tr>';
  return html;
}

function startPkgEdit(fgId) {
  pkgEditMode[fgId] = true;
  renderMain();
}

function cancelPkgEdit(fgId) {
  delete pkgEditMode[fgId];
  renderMain();
}

function savePackaging(fgId) {
  var f = fgList.find(function(x) { return x._id === fgId; });
  if (!f) return;
  var errEl = document.getElementById('pkg-err-' + fgId);
  if (errEl) errEl.textContent = '';

  // Build before/after snapshots
  var before = {};
  var after = {};
  var changed = false;
  window.PACKAGING_FIELDS.forEach(function(fld) {
    var current = f[fld.key] || '';
    var newVal = '';
    var input = document.getElementById('pkg-' + fgId + '-' + fld.key);
    if (input) newVal = input.value.trim();
    before[fld.key] = current;
    after[fld.key] = newVal;
    if (current !== newVal) changed = true;
  });

  if (!changed) {
    delete pkgEditMode[fgId];
    renderMain();
    return;
  }

  var now = Date.now();

  if (requiresApproval()) {
    db.collection('fg_registry_pending').add({
      proposalType: 'EDIT_PACKAGING',
      proposedRole: currentRole,
      proposedEmail: currentEmail,
      proposedLabel: currentLabel,
      proposedSession: sessionId,
      proposedTs: now,
      status: 'AWAITING',
      fgId: fgId,
      fgType: f.type,
      original: before,
      payload: after
    }).then(function() {
      delete pkgEditMode[fgId];
      alert('Packaging changes submitted for approval.');
      renderMain();
    }).catch(function(e) { if (errEl) errEl.textContent = 'Failed: ' + e.message; });
  } else {
    var update = Object.assign({}, after, { updatedTs: now });
    var batch = db.batch();
    batch.update(db.collection('fg_registry').doc(fgId), update);
    batch.set(db.collection('fg_registry_audit').doc(String(now)), {
      ts: now, actorRole: currentRole, actorEmail: currentEmail, actorLabel: currentLabel, actorSession: sessionId,
      action: f.type === 'veridian' ? 'EDIT_VERIDIAN_FG' : 'EDIT_TPL_FG',
      target: fgId, before: before, after: after, packagingOnly: true
    });
    batch.commit().then(function() {
      delete pkgEditMode[fgId];
      renderMain();
    }).catch(function(e) { if (errEl) errEl.textContent = 'Failed: ' + e.message; });
  }
}

// ============= APPROVALS (MGMT) =============
function renderApprovals() {
  var main = document.getElementById('main');
  if (!isMgmt()) {
    main.innerHTML = '<div class="banner warn">Management only.</div>';
    return;
  }
  var html = '<div class="page-title"><h1>Pending Approvals</h1>' +
    '<div class="sub">' + pendingList.length + ' proposals awaiting your decision.</div></div>';
  if (pendingList.length === 0) {
    html += '<div class="empty"><div class="empty-icon">✓</div>All caught up. No pending proposals.</div>';
  } else {
    pendingList.forEach(function(p) { html += renderProposalCard(p, true); });
  }
  main.innerHTML = html;
}

function renderMyProposals() {
  var main = document.getElementById('main');
  var myPending = pendingList.filter(function(p) { return p.proposedEmail === currentEmail; });
  var html = '<div class="page-title"><h1>My Proposals</h1>' +
    '<div class="sub">All proposals submitted by you. Pending await Management approval.</div></div>';
  if (myPending.length === 0) {
    html += '<div class="empty"><div class="empty-icon">📋</div>No pending proposals from you.</div>';
  } else {
    html += '<h3 style="font-size:13px;margin-bottom:10px">Pending (' + myPending.length + ')</h3>';
    myPending.forEach(function(p) { html += renderProposalCard(p, false); });
  }
  main.innerHTML = html;

  // Async: load this user's history (approved/rejected)
  db.collection('fg_registry_pending')
    .where('proposedEmail', '==', currentEmail)
    .orderBy('proposedTs', 'desc')
    .limit(100).get().then(function(snap) {
      var history = [];
      snap.forEach(function(d) {
        var data = d.data();
        if (data.status !== 'AWAITING') history.push(Object.assign({_id:d.id}, data));
      });
      if (history.length > 0) {
        var hh = '<h3 style="font-size:13px;margin:24px 0 10px">My recent history (' + history.length + ')</h3>';
        history.forEach(function(p) { hh += renderProposalCard(p, false); });
        main.innerHTML += hh;
      }
    }).catch(function(e) { console.warn('History fetch error:', e.message); });
}

function renderProposalCard(p, showActions) {
  var statusBadge = '<span class="pill pill-' +
    (p.status === 'AWAITING' ? 'warn' : p.status === 'APPROVED' ? 'good' : 'muted') + '">' + p.status + '</span>';
  var typeLabel = {
    'ADD_FG': 'Add new FG', 'EDIT_FG': 'Edit FG', 'EDIT_PACKAGING': 'Edit packaging',
    'ALLOCATE_BARCODE': 'Allocate barcode', 'RELEASE_BARCODE': 'Release barcode'
  }[p.proposalType] || p.proposalType;

  var html = '<div class="proposal-card ' + p.status + '">';
  html += '<div class="proposal-hdr"><div><strong style="font-size:13px;color:var(--accent)">' + escHtml(typeLabel) + '</strong> ' + statusBadge;
  html += '<div class="proposal-meta">Proposed by <strong>' + escHtml(p.proposedLabel || p.proposedEmail || p.proposedRole) + '</strong> · ' + formatTs(p.proposedTs) + '</div></div></div>';

  if (p.proposalType === 'ADD_FG' && p.payload) {
    var pl = p.payload;
    html += '<div style="font-size:11px;margin-top:6px"><strong>' + escHtml(pl.name || '') + '</strong> ' + (pl.type === 'veridian' ? '(Veridian)' : '(TPL)') + '</div>';
    if (pl.sku_code) html += '<div class="diff-row"><span class="lbl">SKU Code</span><span class="val mono">' + escHtml(pl.sku_code) + '</span></div>';
    html += '<div class="diff-row"><span class="lbl">Brand/Sub</span><span class="val">' + escHtml(pl.brand || '') + ' / ' + escHtml(pl.sub_brand || '') + '</span></div>';
    if (pl.mrp) html += '<div class="diff-row"><span class="lbl">MRP</span><span class="val">₹' + escHtml(pl.mrp) + '</span></div>';
    if (pl.unit_size) html += '<div class="diff-row"><span class="lbl">Unit</span><span class="val">' + escHtml(pl.unit_size) + '</span></div>';
    html += '<div class="diff-row"><span class="lbl">Status</span><span class="val">' + escHtml(pl.status || '') + '</span></div>';
  } else if (p.proposalType === 'EDIT_FG' && p.payload) {
    html += '<div class="diff-grid">';
    html += '<div class="diff-col before"><h5>Current</h5>';
    if (p.original) {
      ['sku_code','name','brand','sub_brand','mrp','unit_size','status','barcode'].forEach(function(k) {
        if (p.original[k] !== undefined) {
          var changed = p.original[k] !== p.payload[k];
          html += '<div class="diff-row ' + (changed ? 'changed' : '') + '"><span class="lbl">' + k + '</span><span class="val">' + escHtml(p.original[k] || '—') + '</span></div>';
        }
      });
    }
    html += '</div>';
    html += '<div class="diff-col after"><h5>Proposed</h5>';
    Object.keys(p.payload).forEach(function(k) {
      if (k === 'updatedTs') return;
      var changed = !p.original || p.original[k] !== p.payload[k];
      html += '<div class="diff-row ' + (changed ? 'changed' : '') + '"><span class="lbl">' + k + '</span><span class="val">' + escHtml(p.payload[k] || '—') + '</span></div>';
    });
    html += '</div></div>';
    if (p.releaseBarcodeOnApprove) {
      html += '<div class="banner warn" style="margin-top:8px;padding:8px">⚠ Approving will also release barcode back to available pool.</div>';
    }
  } else if (p.proposalType === 'EDIT_PACKAGING' && p.payload) {
    // Find the FG name for context
    var fgRef = fgList.find(function(x) { return x._id === p.fgId; });
    html += '<div style="font-size:11px;margin-top:6px"><span style="color:var(--accent-2)">📦 Packaging change</span>' +
      (fgRef ? ' for <strong>' + escHtml(fgRef.sku_code || '') + ' ' + escHtml(fgRef.name || '') + '</strong>' : '') + '</div>';
    html += '<div class="diff-grid">';
    html += '<div class="diff-col before"><h5>Current</h5>';
    if (p.original) {
      window.PACKAGING_FIELDS.forEach(function(fld) {
        var bv = p.original[fld.key] || '';
        var av = p.payload[fld.key] || '';
        if (bv === av && !bv) return;  // skip both-empty
        var changed = bv !== av;
        html += '<div class="diff-row ' + (changed ? 'changed' : '') + '"><span class="lbl">' + escHtml(fld.label) + '</span><span class="val">' + escHtml(bv || '—') + '</span></div>';
      });
    }
    html += '</div>';
    html += '<div class="diff-col after"><h5>Proposed</h5>';
    window.PACKAGING_FIELDS.forEach(function(fld) {
      var bv = (p.original || {})[fld.key] || '';
      var av = p.payload[fld.key] || '';
      if (bv === av && !av) return;
      var changed = bv !== av;
      html += '<div class="diff-row ' + (changed ? 'changed' : '') + '"><span class="lbl">' + escHtml(fld.label) + '</span><span class="val">' + escHtml(av || '—') + '</span></div>';
    });
    html += '</div></div>';
  } else if (p.proposalType === 'ALLOCATE_BARCODE' && p.payload) {
    html += '<div style="font-size:11px;margin-top:6px"><span class="mono" style="color:var(--accent)">' + escHtml(p.payload.barcode || '') + '</span> → <strong>' + escHtml(p.payload.fgSkuCode || '') + ' ' + escHtml(p.payload.fgName || '') + '</strong></div>';
  } else if (p.proposalType === 'RELEASE_BARCODE' && p.payload) {
    html += '<div style="font-size:11px;margin-top:6px">Release <span class="mono" style="color:var(--accent)">' + escHtml(p.payload.previousBarcode || '') + '</span> from <strong>' + escHtml(p.payload.fgSkuCode || '') + '</strong></div>';
  }

  if (p.rejectionReason) html += '<div style="margin-top:10px;padding:8px;background:rgba(255,107,107,0.08);border-radius:4px;font-size:11px"><strong>Reason:</strong> ' + escHtml(p.rejectionReason) + '</div>';
  if (p.approvedTs) html += '<div style="margin-top:8px;font-size:10px;color:var(--ink-3)">Approved by ' + escHtml(p.approvedLabel || p.approvedEmail || p.approvedRole || '') + ' · ' + formatTs(p.approvedTs) + '</div>';
  if (p.rejectedTs) html += '<div style="margin-top:8px;font-size:10px;color:var(--ink-3)">Rejected by ' + escHtml(p.rejectedLabel || p.rejectedEmail || p.rejectedRole || '') + ' · ' + formatTs(p.rejectedTs) + '</div>';

  if (showActions && p.status === 'AWAITING') {
    html += '<div class="proposal-actions">';
    html += '<button class="primary" onclick="approveProposal(\'' + p._id + '\')">✓ Approve</button>';
    html += '<button class="danger" onclick="rejectProposalPrompt(\'' + p._id + '\')">✗ Reject</button>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function approveProposal(proposalId) {
  var p = pendingList.find(function(x) { return x._id === proposalId; });
  if (!p) return;
  if (!confirm('Approve and apply: ' + p.proposalType + '?')) return;

  var now = Date.now();
  var batch = db.batch();

  if (p.proposalType === 'ADD_FG') {
    var newDoc = Object.assign({}, p.payload, {
      createdTs: now, createdRole: p.proposedRole,
      updatedTs: now, approvedRole: currentRole, approvedEmail: currentEmail, approvedLabel: currentLabel, approvedTs: now
    });
    var newRef = db.collection('fg_registry').doc();
    batch.set(newRef, newDoc);
  } else if (p.proposalType === 'EDIT_FG') {
    var update = Object.assign({}, p.payload, { updatedTs: now });
    batch.update(db.collection('fg_registry').doc(p.fgId), update);
    if (p.releaseBarcodeOnApprove && p.original && p.original.barcode) {
      batch.update(db.collection('fg_registry').doc(p.fgId), { barcode: '' });
      var bcDoc = barcodeList.find(function(b) { return b.barcode === p.original.barcode; });
      if (bcDoc) {
        batch.update(db.collection('fg_registry_barcodes').doc(bcDoc._id), {
          status: 'available', fgId: '', fgName: '', fgSubBrand: '', fgSkuCode: '',
          releasedTs: now, releasedBy: currentRole
        });
      }
    }
  } else if (p.proposalType === 'EDIT_PACKAGING') {
    var pkgUpdate = Object.assign({}, p.payload, { updatedTs: now });
    batch.update(db.collection('fg_registry').doc(p.fgId), pkgUpdate);
  } else if (p.proposalType === 'ALLOCATE_BARCODE') {
    batch.update(db.collection('fg_registry').doc(p.fgId), { barcode: p.payload.barcode, updatedTs: now });
    batch.update(db.collection('fg_registry_barcodes').doc(p.barcodeDocId), {
      status: 'allocated', fgId: p.fgId,
      fgName: p.payload.fgName, fgSkuCode: p.payload.fgSkuCode, fgSubBrand: p.payload.fgSubBrand,
      allocatedTs: now, allocatedBy: p.proposedRole
    });
  } else if (p.proposalType === 'RELEASE_BARCODE') {
    batch.update(db.collection('fg_registry').doc(p.fgId), { barcode: '', updatedTs: now });
    if (p.barcodeDocId) {
      batch.update(db.collection('fg_registry_barcodes').doc(p.barcodeDocId), {
        status: 'available', fgId: '', fgName: '', fgSkuCode: '', fgSubBrand: '',
        releasedTs: now, releasedBy: p.proposedRole
      });
    }
  }

  batch.update(db.collection('fg_registry_pending').doc(proposalId), {
    status: 'APPROVED', approvedRole: currentRole, approvedEmail: currentEmail, approvedLabel: currentLabel, approvedSession: sessionId, approvedTs: now
  });
  // Determine target for audit linking
  var auditTarget = p.fgId || '';
  var auditBarcode = '';
  if (p.proposalType === 'ALLOCATE_BARCODE' && p.payload) auditBarcode = p.payload.barcode;
  if (p.proposalType === 'RELEASE_BARCODE' && p.payload) auditBarcode = p.payload.previousBarcode;
  var auditEntry = {
    ts: now, actorRole: currentRole, actorEmail: currentEmail, actorLabel: currentLabel, actorSession: sessionId,
    action: 'APPROVE_' + p.proposalType, proposalId: proposalId, proposedRole: p.proposedRole
  };
  if (auditTarget) auditEntry.target = auditTarget;
  if (auditBarcode) auditEntry.barcode = auditBarcode;
  batch.set(db.collection('fg_registry_audit').doc(String(now)), auditEntry);
  batch.commit().catch(function(e) { alert('Approve failed: ' + e.message); });
}

function rejectProposalPrompt(proposalId) {
  var reason = prompt('Reason for rejection (visible to proposer):');
  if (reason === null) return;
  if (!reason.trim()) { alert('Reason required'); return; }
  var now = Date.now();
  var p = pendingList.find(function(x) { return x._id === proposalId; });
  var batch = db.batch();
  batch.update(db.collection('fg_registry_pending').doc(proposalId), {
    status: 'REJECTED', rejectedRole: currentRole, rejectedEmail: currentEmail, rejectedLabel: currentLabel, rejectedSession: sessionId,
    rejectedTs: now, rejectionReason: reason.trim()
  });
  var auditTargetR = p && p.fgId ? p.fgId : '';
  var auditBarcodeR = '';
  if (p && p.proposalType === 'ALLOCATE_BARCODE' && p.payload) auditBarcodeR = p.payload.barcode;
  if (p && p.proposalType === 'RELEASE_BARCODE' && p.payload) auditBarcodeR = p.payload.previousBarcode;
  var rejectEntry = {
    ts: now, actorRole: currentRole, actorEmail: currentEmail, actorLabel: currentLabel, actorSession: sessionId,
    action: 'REJECT_' + (p ? p.proposalType : 'UNKNOWN'),
    proposalId: proposalId, reason: reason.trim()
  };
  if (auditTargetR) rejectEntry.target = auditTargetR;
  if (auditBarcodeR) rejectEntry.barcode = auditBarcodeR;
  batch.set(db.collection('fg_registry_audit').doc(String(now)), rejectEntry);
  batch.commit().catch(function(e) { alert('Reject failed: ' + e.message); });
}

    var entries = [];
