    var html = '<div class="page-title"><h1>Audit Log</h1>' +
      '<div class="sub">Last 150 changes to the FG Registry.</div></div>';
    html += '<div class="panel">';
    if (entries.length === 0) {
      html += '<div class="empty"><div class="empty-icon">📋</div>No audit events yet</div>';
    } else {
      entries.forEach(function(e) {
        html += '<div class="audit-row">';
        html += '<div class="who">' + escHtml(e.actorLabel || e.actorEmail || e.actorRole || '') + '</div>';
        html += '<div>' + describeAuditEntry(e) + '</div>';
        html += '<div class="ts">' + formatTs(e.ts) + '</div>';
        html += '</div>';
      });
    }
    html += '</div>';
    main.innerHTML = html;
  }).catch(function(err) {
    main.innerHTML = '<div class="banner bad">Failed: ' + escHtml(err.message) + '</div>';
  });
}

function describeAuditEntry(e) {
  var a = e.action || '';
  if (a.indexOf('ADD_VERIDIAN_FG') === 0) return '<strong>Added Veridian FG:</strong> ' + escHtml((e.details && (e.details.sku_code + ' ' + e.details.name)) || '');
  if (a.indexOf('ADD_TPL_FG') === 0) return '<strong>Added TPL FG:</strong> ' + escHtml((e.details && (e.details.brand + ' / ' + e.details.name)) || '');
  if (a.indexOf('EDIT_VERIDIAN_FG') === 0) return '<strong>Edited Veridian FG</strong>' + (e.releasedBarcode ? ' <span style="color:var(--warn)">(released barcode)</span>' : '');
  if (a.indexOf('EDIT_TPL_FG') === 0) return '<strong>Edited TPL FG</strong>';
  if (a === 'ALLOCATE_BARCODE') return 'Allocated <span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span> → <strong>' + escHtml(e.fgSkuCode || '') + '</strong>';
  if (a === 'RELEASE_BARCODE') return 'Released <span class="mono" style="color:var(--accent)">' + escHtml(e.barcode || '') + '</span> from <strong>' + escHtml(e.fgSkuCode || '') + '</strong>';
  if (a.indexOf('APPROVE_') === 0) return '<span style="color:var(--good)">✓ Approved</span> ' + escHtml(a.replace('APPROVE_','')) + ' (proposed by ' + escHtml(e.proposedRole || '') + ')';
  if (a.indexOf('REJECT_') === 0) return '<span style="color:var(--bad)">✗ Rejected</span> ' + escHtml(a.replace('REJECT_','')) + ' — ' + escHtml(e.reason || '');
  if (a === 'IMPORT_MASTER') return '<strong style="color:var(--accent)">Master file imported</strong> — ' + (e.details && e.details.fgCount ? e.details.fgCount + ' FGs, ' + e.details.bcCount + ' barcodes' : '');
  return escHtml(a);
}

// ============= IMPORT TAB (MGMT only) =============
function renderImport() {
  var main = document.getElementById('main');
  if (!isMgmt()) {
    main.innerHTML = '<div class="banner warn">Management only.</div>';
    return;
  }

  var html = '<div class="page-title"><h1>Import Master File</h1>' +
    '<div class="sub">Seed Firestore from your master Excel. Expected sheets: <code>Barcode</code>, <code>Veridian_FG</code>, <code>TPL_FG</code>.</div></div>';

  if (fgList.length > 0 || barcodeList.length > 0) {
    html += '<div class="banner warn">⚠ Registry already has data: ' + fgList.length + ' FGs, ' + barcodeList.length + ' barcodes. Re-importing will ADD records (not replace). Duplicates by SKU code or barcode will be skipped.</div>';
  }

  html += '<div class="panel"><div class="panel-body">';
  if (!importDraft) {
    html += '<div style="font-size:11px;color:var(--ink-2);margin-bottom:10px">Upload <code>MASTER_BARCODE_and_FG_ALLOCATION_REGSITER_*.xlsx</code> with the 3 sheets.</div>';
    html += '<input type="file" id="imp-file" accept=".xlsx,.xls" onchange="handleImportFile(event)" style="padding:8px"/>';
    html += '<div id="imp-err" class="banner bad" style="display:none;margin-top:10px"></div>';
  } else {
    var d = importDraft;
    html += '<div style="font-size:11px;margin-bottom:10px">Loaded <code>' + escHtml(d.filename) + '</code></div>';
    html += '<div style="display:flex;gap:14px;margin:10px 0;font-size:11px;flex-wrap:wrap">';
    html += '<div>Veridian: <strong style="color:var(--accent)">' + d.veridianRows.length + '</strong></div>';
    html += '<div>TPL: <strong style="color:var(--accent)">' + d.tplRows.length + '</strong></div>';
    html += '<div>Barcodes: <strong style="color:var(--accent)">' + d.barcodeRows.length + '</strong></div>';
    html += '</div>';

    // Existing records check (dedup keys)
    var existingSku = {};
    fgList.filter(function(f){return f.type==='veridian';}).forEach(function(f) { if (f.sku_code) existingSku[f.sku_code.toUpperCase()] = true; });
    var existingTplName = {};
    fgList.filter(function(f){return f.type==='tpl';}).forEach(function(f) { existingTplName[(f.name||'').toLowerCase()] = true; });
    var existingBc = {};
    barcodeList.forEach(function(b) { existingBc[b.barcode] = true; });

    var newV = d.veridianRows.filter(function(r) { return !existingSku[(r.sku_code||'').toUpperCase()]; }).length;
    var newT = d.tplRows.filter(function(r) { return !existingTplName[(r.name||'').toLowerCase()]; }).length;
    var newB = d.barcodeRows.filter(function(r) { return !existingBc[r.barcode]; }).length;
    var allocations = d.veridianRows.filter(function(r) { return r.barcode; }).length;

    html += '<div style="font-size:11px;margin:10px 0;padding:10px;background:var(--bg-2);border-radius:4px">';
    html += '<div><span style="color:var(--good)">New Veridian:</span> ' + newV + ' (' + (d.veridianRows.length - newV) + ' duplicates skipped)</div>';
    html += '<div><span style="color:var(--good)">New TPL:</span> ' + newT + ' (' + (d.tplRows.length - newT) + ' duplicates skipped)</div>';
    html += '<div><span style="color:var(--good)">New Barcodes:</span> ' + newB + ' (' + (d.barcodeRows.length - newB) + ' duplicates skipped)</div>';
    html += '<div><span style="color:var(--accent-2)">Pre-allocations from file:</span> ' + allocations + ' Veridian FGs have a barcode that will be auto-linked</div>';
    html += '</div>';

    html += '<div style="margin-top:14px;display:flex;gap:8px;align-items:center">';
    html += '<button class="primary" onclick="executeImport()">⚡ Seed Firestore (' + (newV + newT + newB) + ' new records)</button>';
    html += '<button onclick="importDraft=null;renderMain()">Cancel</button>';
    html += '<span id="imp-progress" style="font-size:11px;color:var(--ink-2)"></span>';
    html += '</div>';
  }
  html += '</div></div>';
  main.innerHTML = html;
}

function handleImportFile(ev) {
  var f = ev.target.files[0];
  if (!f) return;
  var errEl = document.getElementById('imp-err');
  errEl.style.display = 'none';
  if (typeof XLSX === 'undefined') {
    errEl.textContent = 'Excel parser not loaded'; errEl.style.display = 'block'; return;
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array' });
      var required = ['Barcode', 'Veridian_FG', 'TPL_FG'];
      var missing = required.filter(function(s) { return wb.SheetNames.indexOf(s) === -1; });
      if (missing.length > 0) throw new Error('Missing sheets: ' + missing.join(', ') + '. Found: ' + wb.SheetNames.join(', '));

      var bcRows = parseSheetRows(wb, 'Barcode');
      var vRows = parseSheetRows(wb, 'Veridian_FG');
      var tRows = parseSheetRows(wb, 'TPL_FG');

      // Process Barcode rows
      var barcodeRows = [];
      bcRows.forEach(function(r) {
        var bc = String(r['GTIN'] || '').replace(/\D/g, '');
        if (bc.length !== 13) return;
        barcodeRows.push({
          barcode: bc,
          status: r['Product Name'] ? 'allocated' : 'available',
          fgName: cleanStr(r['Product Name']),
          fgSubBrand: cleanStr(r['Sub Brand']),
          fgBrand: cleanStr(r['Brand'])
        });
      });

      // Status normalizer (handles common typos like "Discountinued")
      function normStatus(raw) {
        var s = (raw || '').toLowerCase().trim();
        if (!s) return 'Active';
        if (s.indexOf('discont') > -1 || s.indexOf('discount') > -1) return 'Discontinued';
        if (s.indexOf('deactiv') > -1) return 'Deactivated';
        if (s.indexOf('launch') > -1 || s.indexOf('to be') > -1) return 'To be Launched';
        if (s.indexOf('on-demand') > -1 || s === 'on demand' || s === 'tbd') return 'Active';
        if (s === 'active') return 'Active';
        return raw; // pass-through unknown
      }

      // Process Veridian rows
      var veridianRows = [];
      vRows.forEach(function(r) {
        var sku = cleanStr(r['SKU Code']);
        var name = cleanStr(r['Canonical Name Final']);
        if (!sku || !name) return;
        var bc = String(r['Barcode'] || '').replace(/\D/g, '');
        if (bc && bc.length !== 13) bc = '';
        var status = normStatus(cleanStr(r['Status']));
        var row = {
          type: 'veridian',
          sku_code: sku,
          name: name,
          brand: cleanStr(r['Brand']) || 'Veridian',
          sub_brand: cleanStr(r['Sub-Brand']) || '',
          barcode: bc,
          status: status,
          mrp: parseFloat(r['MRP']) || null,
          unit_size: cleanStr(r['Unit Size']),
          // Packaging fields
          pkg_bottle:  cleanStr(r['Bottle Type / Jar/ Tube Type']),
          pkg_closure: cleanStr(r['_pkg_closure_combined'] || r['Cap/Pump/  Vad/Stopper'] || r['Cap/Pump/'] || ''),
          pkg_seal:    cleanStr(r['Sealing Foil']),
          pkg_label:   cleanStr(r['Label / Printed']),
          pkg_inner:   cleanStr(r['Inner']),
          pkg_carton:  cleanStr(r['Monocarton'])
        };
        veridianRows.push(row);
      });

      // Process TPL rows
      var tplRows = [];
      tRows.forEach(function(r) {
        var name = cleanStr(r['Product Name']);
        if (!name) return;
        var status = normStatus(cleanStr(r['Status']));
        tplRows.push({
          type: 'tpl',
          name: name,
          brand: cleanStr(r['Brand']),
          sub_brand: cleanStr(r['Sub Brand']) || cleanStr(r['Brand']),
          unit_size: cleanStr(r['Unit Size']),
          status: status,
          // Packaging fields (TPL also has them)
          pkg_bottle:  cleanStr(r['Bottle Type / Jar/ Tube Type']),
          pkg_closure: cleanStr(r['_pkg_closure_combined'] || r['Cap/Pump/  Vad/Stopper'] || r['Cap/Pump/'] || ''),
          pkg_seal:    cleanStr(r['Sealing Foil']),
          pkg_label:   cleanStr(r['Label / Printed']),
          pkg_inner:   cleanStr(r['Inner']),
          pkg_carton:  cleanStr(r['Monocarton'])
        });
      });

      importDraft = {
        filename: f.name,
        barcodeRows: barcodeRows,
        veridianRows: veridianRows,
        tplRows: tplRows
      };
      console.log('[REGISTRY] Import draft:', importDraft);
      renderMain();
    } catch (err) {
      errEl.textContent = 'Failed: ' + err.message;
      errEl.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(f);
}

function parseSheetRows(wb, sheetName) {
  var ws = wb.Sheets[sheetName];
  // First read raw 2D array to detect header row
  var raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  if (raw.length === 0) return [];

  // Pick header row: try row 0 first; if it has too many empty/Unnamed-style cells but row 1 looks rich, use row 1
  var headerRowIdx = 0;
  if (raw.length > 1) {
    var row0 = raw[0].map(function(c) { return String(c || '').trim(); });
    var row1 = raw[1].map(function(c) { return String(c || '').trim(); });
    var row0NonEmpty = row0.filter(Boolean).length;
    var row1NonEmpty = row1.filter(Boolean).length;
    // If row 0 has fewer real headers than row 1 AND row 1 has clear field names, use row 1
    if (row1NonEmpty > row0NonEmpty * 1.5 && row1NonEmpty >= 5) {
      headerRowIdx = 1;
    }
  }

  var headers = (raw[headerRowIdx] || []).map(function(c) { return String(c || '').trim(); });
  // Build rows from data rows (after header)
  var dataRows = raw.slice(headerRowIdx + 1);
  var result = [];
  dataRows.forEach(function(arr) {
    if (!arr || !arr.some(function(v) { return v != null && String(v).trim() !== ''; })) return;
    var obj = {};
    for (var i = 0; i < headers.length; i++) {
      var h = headers[i];
      if (!h) continue;
      // If the same header appears multiple times (e.g., the "Cap/Pump/" / "Vad/Stopper" split), prefer
      // the first non-empty value
      if (obj[h] == null || obj[h] === '') {
        obj[h] = arr[i];
      } else if (arr[i] != null && String(arr[i]).trim() !== '') {
        // Append if both have data (rare)
        obj[h] = obj[h] + ' ' + arr[i];
      }
    }
    // Special handling: the Cap/Pump column is merged into 2 cells. Combine "Cap/Pump/" and "Vad/Stopper" if separate.
    var capPump = '';
    if (headers.indexOf('Cap/Pump/') > -1 && headers.indexOf('Vad/Stopper') > -1) {
      var idxA = headers.indexOf('Cap/Pump/');
      var idxB = headers.indexOf('Vad/Stopper');
      var partA = arr[idxA] != null ? String(arr[idxA]).trim() : '';
      var partB = arr[idxB] != null ? String(arr[idxB]).trim() : '';
      if (partA || partB) capPump = (partA + ' ' + partB).trim();
      obj['_pkg_closure_combined'] = capPump;
    } else if (headers.indexOf('Cap/Pump/  Vad/Stopper') > -1) {
      // Variant where it's a single column
      obj['_pkg_closure_combined'] = String(obj['Cap/Pump/  Vad/Stopper'] || '').trim();
    }
    result.push(obj);
  });
  return result;
}

function cleanStr(v) {
  if (v == null) return '';
  return String(v).replace(/_x000D_/g, '').replace(/\r/g, '').trim();
}

function executeImport() {
  var d = importDraft;
  if (!d) return;
  var progEl = document.getElementById('imp-progress');

  // Build dedup sets
  var existingSku = {}, existingTplName = {}, existingBc = {};
  fgList.filter(function(f){return f.type==='veridian';}).forEach(function(f) { if (f.sku_code) existingSku[f.sku_code.toUpperCase()] = true; });
  fgList.filter(function(f){return f.type==='tpl';}).forEach(function(f) { existingTplName[(f.name||'').toLowerCase()] = true; });
  barcodeList.forEach(function(b) { existingBc[b.barcode] = true; });

  var newBc = d.barcodeRows.filter(function(r) { return !existingBc[r.barcode]; });
  var newV = d.veridianRows.filter(function(r) { return !existingSku[(r.sku_code||'').toUpperCase()]; });
  var newT = d.tplRows.filter(function(r) { return !existingTplName[(r.name||'').toLowerCase()]; });

  if (newBc.length + newV.length + newT.length === 0) {
    alert('Nothing new to import.'); return;
  }

  if (!confirm('Import ' + newBc.length + ' barcodes + ' + newV.length + ' Veridian + ' + newT.length + ' TPL into Firestore?')) return;

  var BATCH_SIZE = 400;
  var imported = { bc: 0, v: 0, t: 0 };
  var now = Date.now();
  var importTs = now;

  // We import in 3 phases: barcodes first, Veridian second (with barcode auto-link), TPL third
  function importChunk(arr, idx, kind, onDone) {
    if (idx >= arr.length) { onDone(); return; }
    var batch = db.batch();
    var chunk = arr.slice(idx, idx + BATCH_SIZE);
    chunk.forEach(function(r) {
      if (kind === 'bc') {
        var ref = db.collection('fg_registry_barcodes').doc(r.barcode);
        batch.set(ref, {
          barcode: r.barcode,
          status: 'available',  // start all as available; Veridian phase will set allocation
          fgId: '', fgName: '', fgSkuCode: '', fgSubBrand: '',
          createdTs: now, importTs: importTs
        });
      } else if (kind === 'v') {
        var ref = db.collection('fg_registry').doc();
        var doc = Object.assign({}, r, {
          createdTs: now, updatedTs: now, importTs: importTs
        });
        // Don't include the barcode field as a Veridian-FG-only allocation — handled separately
        // (We store it but barcode collection update happens after FG creation)
        batch.set(ref, doc);
      } else if (kind === 't') {
        var ref = db.collection('fg_registry').doc();
        batch.set(ref, Object.assign({}, r, { createdTs: now, updatedTs: now, importTs: importTs }));
      }
    });
    batch.commit().then(function() {
      imported[kind] += chunk.length;
      if (progEl) progEl.textContent = 'BC ' + imported.bc + '/' + newBc.length + ' · V ' + imported.v + '/' + newV.length + ' · T ' + imported.t + '/' + newT.length;
      importChunk(arr, idx + BATCH_SIZE, kind, onDone);
    }).catch(function(err) {
      if (progEl) progEl.textContent = 'Error: ' + err.message;
      console.error(err);
    });
  }

  // Sequential pipeline
  importChunk(newBc, 0, 'bc', function() {
    importChunk(newV, 0, 'v', function() {
      importChunk(newT, 0, 't', function() {
        // Now reconcile barcode allocations: for each Veridian FG with barcode, link the barcode doc
        reconcileBarcodeAllocations(newV, importTs, function() {
          // Audit
          db.collection('fg_registry_audit').doc(String(Date.now())).set({
            ts: Date.now(), actorRole: currentRole, actorEmail: currentEmail, actorLabel: currentLabel, actorSession: sessionId,
            action: 'IMPORT_MASTER',
            details: { fgCount: imported.v + imported.t, bcCount: imported.bc, fileName: d.filename, importTs: importTs }
          });
          if (progEl) progEl.textContent = 'Done. Imported ' + imported.bc + ' barcodes, ' + imported.v + ' Veridian FGs, ' + imported.t + ' TPL FGs.';
          alert('Import complete!\n\nBarcodes: ' + imported.bc + '\nVeridian FGs: ' + imported.v + '\nTPL FGs: ' + imported.t);
          importDraft = null;
          currentTab = 'veridian';
          renderTabs(); renderMain();
        });
      });
    });
  });
}

function reconcileBarcodeAllocations(veridianRows, importTs, onDone) {
  // Wait for snapshot to populate fgList (the onSnapshot will have fired)
  // Then for each veridian row that had a barcode, find the FG doc and the barcode doc, link them
  setTimeout(function() {
    var toLink = veridianRows.filter(function(r) { return r.barcode && r.barcode.length === 13; });
    if (toLink.length === 0) { onDone(); return; }

    // Get fresh snapshot of FGs by importTs
    db.collection('fg_registry').where('importTs', '==', importTs).get().then(function(snap) {
      var fgsByCode = {};
      snap.forEach(function(d) {
        var data = d.data();
        if (data.sku_code) fgsByCode[data.sku_code.toUpperCase()] = { id: d.id, data: data };
      });

      var batch = db.batch();
      var linkCount = 0;
      toLink.forEach(function(r) {
        var fg = fgsByCode[r.sku_code.toUpperCase()];
        if (!fg) return;
        // Update FG (already has barcode from import, but ensure)
        // Update barcode doc to allocated
        batch.update(db.collection('fg_registry_barcodes').doc(r.barcode), {
          status: 'allocated', fgId: fg.id, fgName: r.name,
          fgSkuCode: r.sku_code, fgSubBrand: r.sub_brand,
          allocatedTs: Date.now(), allocatedBy: 'IMPORT'
        });
        linkCount++;
      });
      if (linkCount === 0) { onDone(); return; }
      batch.commit().then(onDone).catch(function(e) {
        console.error('Reconcile error:', e);
        onDone();
      });
    }).catch(function(e) {
      console.error('Reconcile fetch error:', e);
      onDone();
    });
  }, 1500);  // wait for snapshot updates
}
